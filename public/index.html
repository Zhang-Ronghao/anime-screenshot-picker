<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anime Screenshot Picker</title>
  <style>
    :root {
      --bg: #f7f7f8;
      --panel: #ffffff;
      --text: #222222;
      --muted: #666666;
      --border: #e2e2e2;
      --soft: #f1f1f1;
      --dark: #333333;
      --dark-hover: #111111;
      --secondary: #777777;
      --selected: #111111;
    }

    * { box-sizing: border-box; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 1200px;
      margin: 32px auto;
      padding: 0 18px 56px;
      background: var(--bg);
      color: var(--text);
    }

    h1 {
      font-size: 23px;
      margin: 0 0 14px;
    }

    h2 {
      font-size: 18px;
      margin: 0 0 14px;
    }

    h3 {
      font-size: 16px;
      margin: 0 0 10px;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-top: 16px;
    }

    .row,
    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    input,
    select {
      padding: 10px 12px;
      border: 1px solid #cccccc;
      border-radius: 8px;
      font-size: 15px;
      background: #ffffff;
    }

    input:focus,
    select:focus {
      outline: 2px solid #d8d8d8;
      border-color: #999999;
    }

    #keyword {
      flex: 1;
      min-width: 260px;
    }

    #proxyInput {
      width: 100%;
    }

    #proxyPreset {
      width: 100%;
    }

    .proxy-settings-grid {
      display: grid;
      grid-template-columns: minmax(180px, 260px) 1fr;
      gap: 10px;
      margin-top: 10px;
      align-items: end;
    }

    .proxy-field label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }

    @media (max-width: 720px) {
      .proxy-settings-grid {
        grid-template-columns: 1fr;
      }
    }

    button,
    a.button,
    label.button {
      padding: 9px 12px;
      border: none;
      border-radius: 8px;
      background: var(--dark);
      color: white;
      cursor: pointer;
      font-size: 14px;
      text-decoration: none;
      display: inline-block;
      line-height: 1.2;
    }

    button:hover,
    a.button:hover,
    label.button:hover {
      background: var(--dark-hover);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    button.secondary,
    a.secondary,
    label.secondary {
      background: var(--secondary);
    }

    button.light,
    a.light,
    label.light {
      background: #e7e7e7;
      color: #222222;
      border: 1px solid #cccccc;
    }

    button.light:hover,
    a.light:hover,
    label.light:hover {
      background: #dcdcdc;
    }

    .status {
      margin: 12px 0 0;
      color: var(--muted);
      font-size: 14px;
      min-height: 20px;
    }

    details {
      margin-top: 10px;
    }

    summary {
      cursor: pointer;
      color: var(--muted);
      font-size: 13px;
      user-select: none;
    }

    .proxy-current {
      margin-top: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      padding: 8px 10px;
      background: #fafafa;
      border: 1px solid var(--border);
      border-radius: 10px;
    }

    .proxy-current strong {
      color: #222222;
      font-weight: 700;
    }

    .proxy-current button {
      padding: 5px 9px;
      font-size: 12px;
    }

    .proxy-summary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 11px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fafafa;
      color: #333333;
      font-size: 13px;
      font-weight: 600;
      list-style: none;
    }

    .proxy-summary:hover {
      background: #f0f0f0;
    }

    .proxy-summary::-webkit-details-marker {
      display: none;
    }

    .proxy-details[open] .proxy-summary {
      background: #eeeeee;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
      gap: 12px;
    }

    .card {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      min-height: 112px;
    }

    .card:hover,
    .result-card:hover,
    .image-card:hover {
      border-color: #999999;
    }

    .cover {
      width: 64px;
      height: 90px;
      object-fit: cover;
      border-radius: 6px;
      background: #eeeeee;
      flex-shrink: 0;
    }

    .title {
      font-weight: 700;
      margin-bottom: 4px;
      line-height: 1.35;
    }

    .sub {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--soft);
      border-radius: 999px;
      padding: 6px 8px 6px 10px;
      margin: 4px;
      font-size: 14px;
    }

    .tag button,
    .tag a.button {
      padding: 4px 8px;
      font-size: 12px;
      border-radius: 999px;
    }

    .result-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 12px;
    }

    .result-section {
      margin-top: 12px;
    }

    .result-section-title {
      font-weight: 700;
      margin: 10px 0 8px;
    }

    .result-details {
      margin-top: 14px;
      border-top: 1px solid #eeeeee;
      padding-top: 10px;
    }

    .result-details summary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 11px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: #fafafa;
      color: #333333;
      font-size: 13px;
      font-weight: 600;
      list-style: none;
    }

    .result-details summary::-webkit-details-marker {
      display: none;
    }

    .result-details[open] summary {
      background: #eeeeee;
    }

    .result-card {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
      display: grid;
      grid-template-columns: 116px 1fr;
      gap: 12px;
      min-height: 124px;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 4px;
    }

    .preview-grid img {
      width: 100%;
      height: 52px;
      object-fit: cover;
      border-radius: 5px;
      background: #eeeeee;
      display: block;
    }

    .preview-empty {
      width: 116px;
      height: 108px;
      border-radius: 8px;
      background: #eeeeee;
      color: #888888;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8px;
    }

    .episode-block {
      margin-top: 18px;
      padding-top: 14px;
      border-top: 1px solid #eeeeee;
    }

    .episode-detail {
      display: none;
      margin-top: 12px;
      padding: 12px;
      border: 1px solid #eeeeee;
      border-radius: 10px;
      background: #fafafa;
    }

    .episode-detail-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .episode-detail-page {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #eeeeee;
    }

    .page-selector {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
      margin: 10px 0 12px;
    }

    .page-btn {
      min-width: 34px;
      padding: 6px 9px;
      border-radius: 8px;
    }

    .page-btn.active {
      background: var(--selected);
      color: #ffffff;
      border-color: var(--selected);
    }


    .episode-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .episode-title {
      font-size: 16px;
      font-weight: 700;
    }

    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }

    .image-card {
      background: #ffffff;
      border: 1px solid #dddddd;
      border-radius: 10px;
      padding: 8px;
      display: block;
      cursor: pointer;
      transition: border-color 0.12s ease, box-shadow 0.12s ease;
    }

    .image-card.selected {
      border-color: var(--selected);
      box-shadow: 0 0 0 2px rgba(0,0,0,0.08);
    }

    .image-card img {
      width: 100%;
      height: 118px;
      object-fit: cover;
      border-radius: 6px;
      background: #eeeeee;
      display: block;
      margin-bottom: 7px;
    }

    .image-card input {
      margin-right: 6px;
    }

    .stats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 10px 0 12px;
    }

    .pill {
      background: #eeeeee;
      border: 1px solid #dddddd;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 13px;
      color: #444444;
    }


    .basket-panel {
      border-color: #d6d6d6;
    }

    .basket-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      flex-wrap: wrap;
    }

    .basket-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(118px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .basket-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 7px;
      background: #ffffff;
      position: relative;
    }

    .basket-card img {
      width: 100%;
      height: 78px;
      object-fit: cover;
      border-radius: 6px;
      background: #eeeeee;
      display: block;
      margin-bottom: 6px;
    }

    .basket-remove {
      position: absolute;
      top: 5px;
      right: 5px;
      padding: 3px 6px;
      border-radius: 999px;
      font-size: 12px;
      background: rgba(0,0,0,0.72);
      color: #ffffff;
    }

    .basket-remove:hover {
      background: rgba(0,0,0,0.9);
    }

    .loading-line {
      height: 6px;
      border-radius: 999px;
      background: #eeeeee;
      overflow: hidden;
      margin-top: 12px;
    }

    .loading-line > div {
      height: 100%;
      width: 0%;
      background: #333333;
      transition: width 0.2s ease;
    }

    .empty {
      color: var(--muted);
      font-size: 14px;
      padding: 8px 0;
    }

    .fineprint {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      margin-top: 8px;
    }



    .floating-nav {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 999;
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      padding: 10px;
      border: 1px solid #d8d8d8;
      border-radius: 14px;
      background: rgba(255,255,255,0.94);
      box-shadow: 0 8px 28px rgba(0,0,0,0.12);
      backdrop-filter: blur(8px);
    }

    .floating-nav button {
      padding: 8px 10px;
      font-size: 13px;
    }

    .step-note {
      margin-top: 10px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .hint {
      margin: 10px 0 8px;
      color: #444444;
      font-size: 14px;
      line-height: 1.45;
    }

    button.quiet,
    a.quiet,
    label.quiet {
      background: transparent;
      color: #555555;
      border: 1px solid #d4d4d4;
    }

    button.quiet:hover,
    a.quiet:hover,
    label.quiet:hover {
      background: #f0f0f0;
      color: #111111;
    }



    .subject-step-layout {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-top: 14px;
    }

    .subject-main-flow,
    .subject-side-flow {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      background: #ffffff;
    }

    .subject-main-flow {
      border-color: #d0d0d0;
    }

    .subject-side-flow {
      background: #fafafa;
      color: #444444;
    }

    .side-title {
      font-weight: 700;
      font-size: 15px;
      margin-bottom: 8px;
      color: #333333;
    }

    .section-headline {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .source-note {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    .side-action-stack {
      display: flex;
      gap: 7px;
      margin-top: 10px;
      flex-wrap: wrap;
    }

    .side-action-stack button,
    .side-action-stack a.button,
    .side-action-stack label.button {
      text-align: center;
      justify-content: center;
    }

    .compact-details {
      margin-top: 10px;
    }

    .compact-details summary {
      font-size: 12px;
      color: #666666;
    }

    @media (max-width: 640px) {
      body {
        margin-top: 22px;
        padding-left: 12px;
        padding-right: 12px;
      }

      .grid,
      .result-list,
      .basket-grid {
        grid-template-columns: 1fr;
      }

      .result-card {
        grid-template-columns: 100px 1fr;
      }

      .preview-empty {
        width: 100px;
      }

      .image-grid {
        grid-template-columns: repeat(auto-fill, minmax(145px, 1fr));
      }

      .floating-nav {
        left: 12px;
        right: 12px;
        bottom: 12px;
        justify-content: space-between;
      }
    }


    .mode-panel {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .mode-button {
      min-width: 120px;
    }

    .mode-button.active {
      background: var(--selected);
      color: #ffffff;
    }

    .auto-form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      align-items: end;
      margin-top: 12px;
    }

    .auto-field label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 5px;
    }

    .auto-field input,
    .auto-field select {
      width: 100%;
    }

    .auto-draft-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 12px;
      margin-top: 14px;
    }

    .auto-draft-bottom-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      justify-content: flex-start;
      flex-wrap: wrap;
      margin-top: 14px;
      padding-top: 12px;
      border-top: 1px solid #eeeeee;
    }

    .auto-loading-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
    }

    .auto-loading-pill::before {
      content: "";
      width: 10px;
      height: 10px;
      border: 2px solid #d0d0d0;
      border-top-color: #333333;
      border-radius: 999px;
      display: inline-block;
      animation: auto-spin 0.85s linear infinite;
    }

    @keyframes auto-spin {
      to { transform: rotate(360deg); }
    }


    .draft-card {
      background: #ffffff;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
    }

    .draft-card img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      border-radius: 7px;
      background: #eeeeee;
      display: block;
      margin-bottom: 8px;
    }

    .draft-title {
      font-weight: 700;
      font-size: 14px;
      line-height: 1.35;
      min-height: 38px;
      margin-bottom: 6px;
    }

    .draft-meta {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      margin-bottom: 8px;
    }

    .draft-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .draft-actions button {
      padding: 6px 8px;
      font-size: 12px;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 1200;
      background: rgba(0,0,0,0.38);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal-box {
      width: min(980px, 100%);
      max-height: min(760px, 92vh);
      overflow: auto;
      background: #ffffff;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.22);
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 12px;
    }

    .modal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
    }

    .modal-choice {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px;
      background: #ffffff;
    }

    .modal-choice img {
      width: 100%;
      height: 105px;
      object-fit: cover;
      border-radius: 7px;
      background: #eeeeee;
      display: block;
      margin-bottom: 8px;
    }

    .modal-choice-title {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.35;
      min-height: 36px;
      margin-bottom: 6px;
    }

    .modal-choice button {
      width: 100%;
      padding: 7px 8px;
      font-size: 12px;
    }


    .mode-prompt {
      color: var(--muted);
      font-size: 13px;
    }

    .auto-year-range {
      grid-column: span 3;
      min-width: min(100%, 520px);
    }

    .year-range-line {
      display: grid;
      grid-template-columns: auto minmax(220px, 1fr) auto;
      gap: 12px;
      align-items: center;
      margin-top: 8px;
    }

    .year-range-label {
      white-space: nowrap;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.3;
    }

    .year-range-label strong {
      color: #222222;
      font-weight: 700;
    }

    .dual-range-wrap {
      position: relative;
      height: 28px;
    }

    .dual-range-track,
    .dual-range-active {
      position: absolute;
      left: 0;
      right: 0;
      top: 13px;
      height: 3px;
      border-radius: 999px;
      background: #dddddd;
      pointer-events: none;
    }

    .dual-range-active {
      left: var(--year-active-left, 0%);
      right: var(--year-active-right, 0%);
      background: #333333;
    }

    .dual-range-input {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 28px;
      padding: 0;
      border: none;
      background: transparent;
      pointer-events: none;
      appearance: none;
      -webkit-appearance: none;
    }

    .dual-range-input::-webkit-slider-runnable-track {
      height: 3px;
      background: transparent;
    }

    .dual-range-input::-webkit-slider-thumb {
      width: 15px;
      height: 15px;
      border-radius: 999px;
      border: 2px solid #333333;
      background: #ffffff;
      cursor: pointer;
      pointer-events: auto;
      appearance: none;
      -webkit-appearance: none;
      margin-top: -6px;
    }

    .dual-range-input::-moz-range-track {
      height: 3px;
      background: transparent;
    }

    .dual-range-input::-moz-range-thumb {
      width: 15px;
      height: 15px;
      border-radius: 999px;
      border: 2px solid #333333;
      background: #ffffff;
      cursor: pointer;
      pointer-events: auto;
    }

    #autoYearFromRange { z-index: 2; }
    #autoYearToRange { z-index: 3; }

    @media (max-width: 640px) {
      .auto-year-range {
        grid-column: span 1;
      }
      .year-range-line {
        grid-template-columns: 1fr;
        gap: 6px;
      }
      .year-range-label:last-child {
        text-align: right;
      }
    }

  </style>
</head>
<body>
  <div id="topAnchor"></div>
  <h1>Anime Screenshot Picker</h1>

  <div id="selectedBasket"></div>

  <div id="modePanel" class="panel mode-panel">
    <button id="manualModeBtn" class="mode-button light" onclick="switchMode('manual')">手动出题</button>
    <button id="autoModeBtn" class="mode-button light" onclick="switchMode('auto')">自动出题</button>
    <span class="mode-prompt">请选择出题方式。</span>
  </div>

  <div id="autoPanel" class="panel" style="display: none;">
    <h2>自动出题</h2>
    <div class="sub">从 FanCaps 动画截图中随机生成题单。填写 Bangumi 用户 ID 后，只从该用户看过的动画中随机；留空则从全部范围随机。</div>

    <div class="auto-form-grid">
      <div class="auto-field">
        <label for="autoBangumiUser">Bangumi 用户 ID（可选）</label>
        <input id="autoBangumiUser" placeholder="例如：123456" />
      </div>
      <div class="auto-field auto-year-range">
        <label>年份范围</label>
        <div class="year-range-line">
          <span class="year-range-label">起始：<strong id="autoYearFromLabel">2010</strong></span>
          <div class="dual-range-wrap" id="autoYearRangeWrap">
            <div class="dual-range-track"></div>
            <div class="dual-range-active" id="autoYearActiveTrack"></div>
            <input id="autoYearFromRange" class="dual-range-input" type="range" min="1999" max="2026" step="1" value="2010" oninput="syncAutoYearRangeLabels('from')" aria-label="起始年份" />
            <input id="autoYearToRange" class="dual-range-input" type="range" min="2000" max="2027" step="1" value="2027" oninput="syncAutoYearRangeLabels('to')" aria-label="结束年份" />
          </div>
          <span class="year-range-label">结束：<strong id="autoYearToLabel">不限</strong></span>
        </div>
      </div>
      <div class="auto-field">
        <label for="autoMinDone">最低看过人数</label>
        <input id="autoMinDone" type="number" min="0" step="1000" placeholder="不限" />
      </div>
      <div class="auto-field">
        <label for="autoQuestionCount">题目数量</label>
        <input id="autoQuestionCount" type="number" min="1" max="100" value="20" />
      </div>
    </div>

    <div class="toolbar" style="margin-top: 12px;">
      <button id="generateAutoDraftBtn" onclick="generateAutoDraft()">生成题单</button>
      <button class="light" onclick="addAutoDraftToSelected()" id="addAutoDraftBtn" disabled>加入已选截图</button>
      <span class="pill" id="autoPoolInfo">尚未生成</span>
      <span class="pill auto-loading-pill" id="autoGenerateStatus" style="display: none;">正在生成题单...</span>
    </div>

    <div id="autoDraftArea"></div>
  </div>

  <div id="autoChoiceModal" class="modal-backdrop" onclick="handleModalBackdropClick(event)">
    <div class="modal-box">
      <div class="modal-head">
        <div>
          <h2 id="autoModalTitle">选择</h2>
          <div class="sub" id="autoModalHint"></div>
        </div>
        <div class="toolbar">
          <button class="quiet" onclick="refreshAutoModalBatch()">换一批</button>
          <button onclick="closeAutoModal()">关闭</button>
        </div>
      </div>
      <div id="autoModalChoices" class="modal-grid"></div>
    </div>
  </div>


  <div id="searchPanel" class="panel" style="display: none;">
    <div class="row">
      <input id="keyword" placeholder="输入中文名，例如：芙莉莲、金牌得主、孤独摇滚" />
      <button id="searchBangumiBtn">搜索 Bangumi</button>
      <button class="light" onclick="clearAll()">清空</button>
    </div>

    <div class="proxy-current">
      <span>当前代理：<strong id="currentProxyLabel">Cloudflare Pages Function（推荐）</strong></span>
      <button class="light" type="button" onclick="toggleProxyPanel()">切换代理</button>
    </div>
    <div id="proxyDetails" class="proxy-details" style="display: none;">
      <div class="proxy-settings-grid">
        <div class="proxy-field">
          <label for="proxyPreset">代理选项</label>
          <select id="proxyPreset">
            <option value="/proxy?url=">Cloudflare Pages Function /proxy?url=（推荐）</option>
            <option value="https://corsproxy.io/?url=">corsproxy.io（公共备用）</option>
            <option value="https://api.allorigins.win/raw?url=">AllOrigins raw（公共备用）</option>
            <option value="https://api.codetabs.com/v1/proxy?quest=">CodeTabs Proxy（公共备用）</option>
            <option value="custom">自定义</option>
          </select>
        </div>
        <div class="proxy-field">
          <label for="proxyInput">代理前缀</label>
          <input id="proxyInput" />
        </div>
      </div>
      <div class="toolbar" style="margin-top: 10px;">
        <button class="light" onclick="resetProxyToDefault()">恢复默认代理</button>
      </div>
      <div class="fineprint">默认使用本站 Cloudflare Pages Function。公共代理只作为临时保险，速度和稳定性不保证。</div>
    </div>

    <div id="status" class="status"></div>
    <div id="progressWrap" class="loading-line" style="display: none;">
      <div id="progressBar"></div>
    </div>
  </div>
  <div id="bangumiResults" class="grid"></div>
  <div id="subjectDetail"></div>
  <div id="fanCapsResults"></div>
  <div id="imagePanel"></div>

  <div class="floating-nav" id="floatingNav">
    <button onclick="scrollToTopSearch()">返回顶部搜索</button>
    <button onclick="scrollToBasket()">查看/导出已选（<span id="floatSelectedCount" class="selectedCount">0</span>）</button>
  </div>

  <script>
    const BGM_API = "https://api.bgm.tv";
    const FANCAPS_BASE = "https://fancaps.net";
    const ANIDB_TITLES_URL = "https://anidb.net/api/anime-titles.xml.gz";
    const ANIDB_LOCAL_DUMP_MONTH = "2026-05";
    const ANIDB_LOCAL_TITLE_PATHS = [
      "./anime-titles.xml",
      "./anime-titles.xml.gz"
    ];
    const ANIME_MAP_PATH = "./anime_map.json";
    const FANCAPS_AUTO_DATA_PATH = "./fancaps_anime_images.jsonl";
    const DEFAULT_PROXY = "/proxy?url=";
    const TOP_IMAGES_PER_EPISODE = 4;
    const MAX_SHOW_PAGES = 30;

    const keywordInput = document.getElementById("keyword");
    const proxyInput = document.getElementById("proxyInput");
    const proxyPreset = document.getElementById("proxyPreset");
    const currentProxyLabel = document.getElementById("currentProxyLabel");
    const statusEl = document.getElementById("status");
    const progressWrapEl = document.getElementById("progressWrap");
    const progressBarEl = document.getElementById("progressBar");
    const bangumiResultsEl = document.getElementById("bangumiResults");
    const subjectDetailEl = document.getElementById("subjectDetail");
    const fanCapsResultsEl = document.getElementById("fanCapsResults");
    const imagePanelEl = document.getElementById("imagePanel");
    const selectedBasketEl = document.getElementById("selectedBasket");
    const searchPanelEl = document.getElementById("searchPanel");
    const modePanelEl = document.getElementById("modePanel");
    const manualModeBtn = document.getElementById("manualModeBtn");
    const autoModeBtn = document.getElementById("autoModeBtn");
    const autoPanelEl = document.getElementById("autoPanel");
    const autoDraftAreaEl = document.getElementById("autoDraftArea");
    const autoPoolInfoEl = document.getElementById("autoPoolInfo");
    const generateAutoDraftBtn = document.getElementById("generateAutoDraftBtn");
    const autoGenerateStatusEl = document.getElementById("autoGenerateStatus");
    const addAutoDraftBtn = document.getElementById("addAutoDraftBtn");
    const autoChoiceModalEl = document.getElementById("autoChoiceModal");
    const autoModalTitleEl = document.getElementById("autoModalTitle");
    const autoModalHintEl = document.getElementById("autoModalHint");
    const autoModalChoicesEl = document.getElementById("autoModalChoices");
    const autoYearFromRangeEl = document.getElementById("autoYearFromRange");
    const autoYearToRangeEl = document.getElementById("autoYearToRange");
    const autoYearFromLabelEl = document.getElementById("autoYearFromLabel");
    const autoYearToLabelEl = document.getElementById("autoYearToLabel");

    let selectedImages = new Map();
    let imageItemsById = new Map();
    let episodeDetailStates = new Map();
    let currentSubject = null;
    let currentLoadedAnimeLabel = "";
    let anidbTitleIndex = null;
    let anidbTitleIndexPromise = null;
    let anidbTitleIndexSource = "";
    let animeMapIndex = null;
    let animeMapIndexPromise = null;
    let animeMapIndexSource = "";
    let autoDataset = null;
    let autoDatasetPromise = null;
    let autoFilteredPool = [];
    let autoDraft = [];
    let autoModalState = null;
    let autoGenerating = false;

    proxyInput.value = DEFAULT_PROXY;
    proxyPreset.value = DEFAULT_PROXY;
    updateCurrentProxyLabel();
    proxyPreset.addEventListener("change", handleProxyPresetChange);
    proxyInput.addEventListener("input", syncProxyPresetByInput);
    renderSelectedBasket();
    syncAutoYearRangeLabels("init");

    document.getElementById("searchBangumiBtn").addEventListener("click", searchBangumi);
    keywordInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") searchBangumi();
    });


    function switchMode(mode) {
      const isAuto = mode === "auto";

      autoPanelEl.style.display = isAuto ? "block" : "none";
      searchPanelEl.style.display = isAuto ? "none" : "block";

      const manualEls = [bangumiResultsEl, subjectDetailEl, fanCapsResultsEl, imagePanelEl];
      for (const el of manualEls) {
        if (isAuto) hideElement(el);
        else showElement(el);
      }

      manualModeBtn.className = isAuto ? "mode-button light" : "mode-button active";
      autoModeBtn.className = isAuto ? "mode-button active" : "mode-button light";

      setStatus(isAuto ? "已切换到自动出题。" : "已切换到手动出题。");
      scrollToElement(isAuto ? autoPanelEl : searchPanelEl);
    }


    function syncAutoYearRangeLabels(changed = "") {
      if (!autoYearFromRangeEl || !autoYearToRangeEl) return;

      let from = Number(autoYearFromRangeEl.value || 1999);
      let to = Number(autoYearToRangeEl.value || 2027);
      const fromLimit = from === 1999 ? 0 : from;
      const toLimit = to === 2027 ? 0 : to;

      if (fromLimit && toLimit && fromLimit > toLimit) {
        if (changed === "from") {
          autoYearToRangeEl.value = String(fromLimit);
          to = fromLimit;
        } else {
          autoYearFromRangeEl.value = String(toLimit);
          from = toLimit;
        }
      }

      if (autoYearFromLabelEl) autoYearFromLabelEl.textContent = from === 1999 ? "不限" : String(from);
      if (autoYearToLabelEl) autoYearToLabelEl.textContent = to === 2027 ? "不限" : String(to);

      updateAutoYearActiveTrack();
    }

    function updateAutoYearActiveTrack() {
      const track = document.getElementById("autoYearActiveTrack");
      if (!track || !autoYearFromRangeEl || !autoYearToRangeEl) return;

      const min = 1999;
      const max = 2027;
      const fromRaw = Number(autoYearFromRangeEl.value || min);
      const toRaw = Number(autoYearToRangeEl.value || max);
      const fromForTrack = fromRaw === 1999 ? min : fromRaw;
      const toForTrack = toRaw === 2027 ? max : toRaw;
      const left = ((fromForTrack - min) / (max - min)) * 100;
      const right = 100 - ((toForTrack - min) / (max - min)) * 100;

      track.style.setProperty("--year-active-left", `${Math.max(0, Math.min(100, left))}%`);
      track.style.setProperty("--year-active-right", `${Math.max(0, Math.min(100, right))}%`);
    }

    function getAutoYearFromValue() {
      const value = Number(autoYearFromRangeEl?.value || 1999);
      return value === 1999 ? 0 : value;
    }

    function getAutoYearToValue() {
      const value = Number(autoYearToRangeEl?.value || 2027);
      return value === 2027 ? 0 : value;
    }

    async function loadAutoDataset() {
      if (autoDataset) return autoDataset;
      if (autoDatasetPromise) return autoDatasetPromise;

      autoDatasetPromise = (async () => {
        const res = await fetch(FANCAPS_AUTO_DATA_PATH, { cache: "force-cache" });
        if (!res.ok) throw new Error(`FanCaps 截图读取失败：HTTP ${res.status}`);

        const text = await res.text();
        const records = [];
        const lines = text.split(/\r?\n/).filter(line => line.trim());

        for (let i = 0; i < lines.length; i++) {
          try {
            const raw = JSON.parse(lines[i]);
            const images = Array.isArray(raw.images)
              ? raw.images.map(x => String(x || "").trim()).filter(Boolean)
              : [];
            if (!images.length) continue;

            const bgmId = String(raw.bgm_id || raw.bangumi_id || "").trim();
            if (!bgmId) continue;

            const year = extractYear(raw.date);
            const doneCount = Number(raw.done_count || 0) || 0;

            records.push({
              bgmId,
              anidbId: raw.anidb_id ? String(raw.anidb_id) : "",
              title: clean(raw.label_text || raw.name_cn || raw.name || `Bangumi ${bgmId}`),
              date: raw.date || "",
              year,
              doneCount,
              ratingCount: Number(raw.rating_count || 0) || 0,
              imageCount: images.length,
              images
            });
          } catch (err) {
            console.warn("skip bad jsonl line", i + 1, err);
          }
        }

        autoDataset = records;
        return records;
      })();

      return autoDatasetPromise;
    }

    function extractYear(dateText) {
      const m = String(dateText || "").match(/(19|20)\d{2}/);
      return m ? Number(m[0]) : 0;
    }

    function setAutoGenerating(isGenerating) {
      autoGenerating = Boolean(isGenerating);
      if (generateAutoDraftBtn) {
        generateAutoDraftBtn.disabled = autoGenerating;
        generateAutoDraftBtn.textContent = autoGenerating ? "生成中..." : "生成题单";
      }
      if (autoGenerateStatusEl) {
        autoGenerateStatusEl.style.display = autoGenerating ? "inline-flex" : "none";
      }
    }

    async function generateAutoDraft() {
      if (autoGenerating) return;

      setAutoGenerating(true);
      setStatus("正在生成题单...");
      setProgress(8, true);

      try {
        const dataset = await loadAutoDataset();
        setProgress(32, true);

        const pool = await buildAutoCandidatePool(dataset);
        autoFilteredPool = pool;

        const count = clampNumber(Number(document.getElementById("autoQuestionCount").value || 20), 1, 100);
        const sampleCount = Math.min(count, pool.length);

        if (!pool.length) {
          autoDraft = [];
          renderAutoDraft();
          setStatus("当前筛选条件下没有可用截图。请放宽条件。");
          setProgress(100, false);
          return;
        }

        setProgress(72, true);
        autoDraft = sampleUnique(pool, sampleCount).map(record => makeAutoDraftItem(record));
        renderAutoDraft();
        setStatus(`已生成 ${autoDraft.length} 题。`);
        setProgress(100, false);
        scrollToElement(autoDraftAreaEl);
      } catch (err) {
        console.error(err);
        setProgress(0, false);
        setStatus("自动出题失败：" + err.message);
      } finally {
        setAutoGenerating(false);
      }
    }

    async function buildAutoCandidatePool(dataset) {
      const yearFrom = getAutoYearFromValue();
      const yearTo = getAutoYearToValue();
      const minDone = Number(document.getElementById("autoMinDone").value || 0) || 0;
      const user = clean(document.getElementById("autoBangumiUser").value || "");

      let allowedIds = null;
      if (user) {
        setStatus("正在读取 Bangumi 用户收藏...");
        allowedIds = await fetchBangumiWatchedIds(user);
      }

      const pool = dataset.filter(record => {
        if (allowedIds && !allowedIds.has(record.bgmId)) return false;
        if (minDone && record.doneCount < minDone) return false;
        if (yearFrom && (!record.year || record.year < yearFrom)) return false;
        if (yearTo && (!record.year || record.year > yearTo)) return false;
        return record.images && record.images.length;
      });

      const scope = user ? `用户收藏交集：${pool.length} 部` : `可用动画：${pool.length} 部`;
      if (autoPoolInfoEl) autoPoolInfoEl.textContent = scope;
      return pool;
    }

    async function fetchBangumiWatchedIds(username) {
      const ids = new Set();
      const limit = 50;
      let offset = 0;
      let guard = 0;

      while (guard < 80) {
        guard += 1;
        const url = `${BGM_API}/v0/users/${encodeURIComponent(username)}/collections?subject_type=2&type=2&limit=${limit}&offset=${offset}`;
        const res = await fetch(url, { headers: { "Accept": "application/json" } });
        if (!res.ok) throw new Error(`读取用户收藏失败：HTTP ${res.status}`);
        const json = await res.json();
        const data = Array.isArray(json.data) ? json.data : [];

        for (const item of data) {
          const id = item.subject_id || item.subject?.id || item.id;
          if (id) ids.add(String(id));
        }

        if (data.length < limit) break;
        offset += limit;
        await sleep(160);
      }

      return ids;
    }

    function makeAutoDraftItem(record, imageUrl = "") {
      const chosen = imageUrl || randomOne(record.images) || "";
      return {
        uid: `draft_${record.bgmId}_${hashString(chosen)}_${Math.random().toString(36).slice(2, 7)}`,
        bgmId: record.bgmId,
        title: record.title,
        date: record.date,
        year: record.year,
        doneCount: record.doneCount,
        imageUrl: chosen,
        record
      };
    }

    function renderAutoDraft() {
      if (addAutoDraftBtn) addAutoDraftBtn.disabled = !autoDraft.length;

      if (!autoDraft.length) {
        autoDraftAreaEl.innerHTML = `<div class="empty" style="margin-top: 12px;">还没有题单。设置条件后点击“生成题单”。</div>`;
        return;
      }

      autoDraftAreaEl.innerHTML = `
        <div class="result-section">
          <div class="section-headline">
            <div>
              <h2>题单草稿</h2>
            </div>
            <span class="pill">${autoDraft.length} 题</span>
          </div>
          <div class="auto-draft-grid">
            ${autoDraft.map((item, idx) => renderAutoDraftCard(item, idx)).join("")}
          </div>
          <div class="auto-draft-bottom-actions">
            <button type="button" class="light" onclick="addAutoDraftToSelected()">加入已选截图</button>
            <button type="button" onclick="copyAutoDraftJsonl()">复制当前题单 JSONL</button>
            <button type="button" onclick="exportAutoDraftJsonl()">导出当前题单 JSONL</button>
          </div>
        </div>
      `;
      updateSelectedCount();
    }

    function renderAutoDraftCard(item, idx) {
      return `
        <div class="draft-card" id="${escapeHtml(item.uid)}">
          <img src="${escapeHtml(originalToFanCapsThumbnailUrl(item.imageUrl))}" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.display='none'">
          <div class="draft-title">${idx + 1}. ${escapeHtml(item.title)}</div>
          <div class="draft-meta">${escapeHtml(item.date || "日期未知")} · 看过 ${Number(item.doneCount || 0).toLocaleString()}</div>
          <div class="draft-actions">
            <button onclick="openChangeImageModal('${escapeJsString(item.uid)}')">换图</button>
            <button class="quiet" onclick="openChangeAnimeModal('${escapeJsString(item.uid)}')">换动画</button>
            <button class="quiet" onclick="removeAutoDraftItem('${escapeJsString(item.uid)}')">移除</button>
          </div>
        </div>
      `;
    }

    function regenerateAutoDraft() {
      if (!autoFilteredPool.length) {
        generateAutoDraft();
        return;
      }
      const count = clampNumber(Number(document.getElementById("autoQuestionCount").value || 20), 1, 100);
      autoDraft = sampleUnique(autoFilteredPool, Math.min(count, autoFilteredPool.length)).map(record => makeAutoDraftItem(record));
      renderAutoDraft();
      setStatus("已重新随机。");
    }

    function removeAutoDraftItem(uid) {
      autoDraft = autoDraft.filter(item => item.uid !== uid);
      renderAutoDraft();
      setStatus("已移除 1 题。");
    }

    function openChangeImageModal(uid) {
      const item = autoDraft.find(x => x.uid === uid);
      if (!item) return;

      autoModalState = {
        type: "image",
        uid,
        shownImageUrls: new Set([item.imageUrl])
      };
      autoModalTitleEl.textContent = "选择一张图";
      autoModalHintEl.textContent = item.title;
      renderChangeImageChoices(item);
      showAutoModal();
    }

    function renderChangeImageChoices(item) {
      const state = autoModalState && autoModalState.type === "image" && autoModalState.uid === item.uid
        ? autoModalState
        : null;
      const allImages = unique((item.record.images || []).map(url => String(url || "").trim()).filter(Boolean));
      const candidates = allImages.filter(url => url !== item.imageUrl);

      if (!candidates.length) {
        autoModalHintEl.textContent = item.title;
        autoModalChoicesEl.innerHTML = `<div class="empty">这部动画没有其它可换图片。</div>`;
        return;
      }

      let unseen = candidates.filter(url => !state || !state.shownImageUrls.has(url));
      let restarted = false;
      if (!unseen.length) {
        restarted = true;
        if (state) state.shownImageUrls = new Set([item.imageUrl]);
        unseen = candidates;
      }

      const finalChoices = sampleUnique(unseen, Math.min(5, unseen.length));
      if (state) {
        for (const url of finalChoices) state.shownImageUrls.add(url);
      }

      autoModalHintEl.textContent = restarted
        ? `${item.title} · 所有图片都随机完了，开始重新随机。`
        : item.title;

      autoModalChoicesEl.innerHTML = finalChoices.map(url => `
        <div class="modal-choice">
          <img src="${escapeHtml(originalToFanCapsThumbnailUrl(url))}" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.display='none'">
          <div class="modal-choice-title">${escapeHtml(item.title)}</div>
          <button onclick="chooseAutoImage('${escapeJsString(item.uid)}', '${escapeJsString(url)}')">选择这张</button>
        </div>
      `).join("");
    }

    function chooseAutoImage(uid, url) {
      const idx = autoDraft.findIndex(x => x.uid === uid);
      if (idx < 0) return;
      const record = autoDraft[idx].record;
      autoDraft[idx] = makeAutoDraftItem(record, url);
      renderAutoDraft();
      closeAutoModal();
      setStatus("已更换图片。");
    }

    function openChangeAnimeModal(uid) {
      const item = autoDraft.find(x => x.uid === uid);
      if (!item) return;

      autoModalState = {
        type: "anime",
        uid,
        currentBgmId: item.bgmId,
        shownAnimeIds: new Set([item.bgmId])
      };
      autoModalTitleEl.textContent = "选择一部动画";
      autoModalHintEl.textContent = "从当前筛选范围中随机给出 5 部。";
      renderChangeAnimeChoices(uid);
      showAutoModal();
    }

    function renderChangeAnimeChoices(uid) {
      const state = autoModalState && autoModalState.type === "anime" && autoModalState.uid === uid
        ? autoModalState
        : null;
      const currentBgmId = state?.currentBgmId || "";
      const used = new Set(autoDraft.filter(item => item.uid !== uid).map(item => item.bgmId));
      const pool = autoFilteredPool.filter(record => !used.has(record.bgmId) && record.bgmId !== currentBgmId);

      if (!pool.length) {
        autoModalHintEl.textContent = "当前筛选范围没有更多动画。";
        autoModalChoicesEl.innerHTML = `<div class="empty">当前筛选范围没有更多动画。</div>`;
        return;
      }

      let unseen = pool.filter(record => !state || !state.shownAnimeIds.has(record.bgmId));
      let restarted = false;
      if (!unseen.length) {
        restarted = true;
        if (state) state.shownAnimeIds = new Set([currentBgmId].filter(Boolean));
        unseen = pool;
      }

      const choices = sampleUnique(unseen, Math.min(5, unseen.length));
      if (state) {
        for (const record of choices) state.shownAnimeIds.add(record.bgmId);
      }

      autoModalHintEl.textContent = restarted
        ? "所有动画都随机完了，开始重新随机。"
        : "从当前筛选范围中随机给出 5 部。";

      autoModalChoicesEl.innerHTML = choices.map(record => {
        const image = randomOne(record.images);
        return `
          <div class="modal-choice">
            <img src="${escapeHtml(originalToFanCapsThumbnailUrl(image))}" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.display='none'">
            <div class="modal-choice-title">${escapeHtml(record.title)}</div>
            <div class="draft-meta">${escapeHtml(record.date || "日期未知")} · 看过 ${Number(record.doneCount || 0).toLocaleString()}</div>
            <button onclick="chooseAutoAnime('${escapeJsString(uid)}', '${escapeJsString(record.bgmId)}', '${escapeJsString(image)}')">选择这部</button>
          </div>
        `;
      }).join("");
    }

    function chooseAutoAnime(uid, bgmId, imageUrl) {
      const idx = autoDraft.findIndex(x => x.uid === uid);
      const record = autoFilteredPool.find(x => x.bgmId === bgmId);
      if (idx < 0 || !record) return;
      autoDraft[idx] = makeAutoDraftItem(record, imageUrl || randomOne(record.images));
      renderAutoDraft();
      closeAutoModal();
      setStatus("已更换动画。 ");
    }

    function originalToFanCapsThumbnailUrl(url) {
      const text = String(url || "").trim();
      if (!text) return "";
      if (/^https?:\/\/ant\.fancaps\.net\/\d+\.jpg(?:[?#].*)?$/i.test(text)) return text;

      const id = getFanCapsImageIdFromUrl(text);
      if (id) return `https://ant.fancaps.net/${id}.jpg`;

      return text;
    }

    function getFanCapsImageIdFromUrl(url) {
      const text = String(url || "");
      const direct = text.match(/\/([0-9]{4,})\.jpg(?:[?#].*)?$/i);
      if (direct) return direct[1];

      const encoded = decodeURIComponentSafe(text);
      const decoded = encoded.match(/\/([0-9]{4,})\.jpg(?:[?#].*)?$/i);
      return decoded ? decoded[1] : "";
    }

    function sampleUnique(items, count) {
      const arr = [...items];
      shuffleArray(arr);
      return arr.slice(0, Math.max(0, count));
    }

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function randomOne(items) {
      if (!items || !items.length) return "";
      return items[Math.floor(Math.random() * items.length)];
    }

    function clampNumber(value, min, max) {
      if (!Number.isFinite(value)) return min;
      return Math.max(min, Math.min(max, value));
    }

    async function autoResolveAndSearchFanCaps(subject) {
      if (!subject) {
        setStatus("请先选择一个 Bangumi 条目。");
        return false;
      }

      const bangumiTitles = getBangumiAllTitleCandidates(subject);

      setProgress(8, true);
      setStatus("正在自动查找截图...");
      setAutoMatchMessage("正在自动查找...");

      try {
        const mapHit = await findAniDbIdFromAnimeMap(subject);

        if (mapHit && mapHit.anidbId) {
          setAutoMatchMessage("已找到匹配，正在搜索截图...");
          setStatus("已找到匹配，正在搜索 FanCaps...");

          const results = await searchFanCaps(String(mapHit.anidbId), {
            auto: true,
            autoLoadImages: true,
            quiet: true,
            sourceLabel: "auto-map"
          });

          if (Array.isArray(results) && results.length > 0) {
            setProgress(100, false);
            return true;
          }

          setAutoMatchMessage("继续尝试其它匹配方式...");
        } else {
          setAutoMatchMessage("继续尝试其它匹配方式...");
        }
      } catch (err) {
        console.warn("anime_map match failed:", err);
        setAutoMatchMessage("继续尝试其它匹配方式...");
      }

      if (!bangumiTitles.length) {
        setProgress(0, false);
        setStatus("未自动找到截图，请手动搜索。");
        setAutoMatchMessage("未自动找到截图。请选择一个标题手动搜索。", "empty");
        showManualTitleSearch();
        return false;
      }

      try {
        setProgress(38, true);
        setStatus("正在尝试备用匹配...");
        const index = await loadAniDbTitleIndex();
        setProgress(72, true);

        const best = findBestAniDbMatchByExactTitles(bangumiTitles, index);
        renderAutoTitleExactMatchResult(best, bangumiTitles);

        if (!best) {
          setProgress(0, false);
          setStatus("未自动找到截图，请手动搜索。");
          setAutoMatchMessage("未自动找到截图。请选择一个标题手动搜索。", "empty");
          showManualTitleSearch();
          return false;
        }

        setStatus("已找到匹配，正在搜索 FanCaps...");
        setAutoMatchMessage("已找到匹配，正在搜索截图...");

        const results = await searchFanCaps(String(best.aid), {
          auto: true,
          autoLoadImages: true,
          quiet: true,
          sourceLabel: "auto-title"
        });

        setProgress(100, false);

        if (Array.isArray(results) && results.length > 0) {
          return true;
        }

        setStatus("未自动找到截图，请手动搜索。");
        setAutoMatchMessage("未自动找到截图。请选择一个标题手动搜索。", "empty");
        showManualTitleSearch();
        return false;
      } catch (err) {
        console.error(err);
        setProgress(0, false);
        setStatus("未自动找到截图，请手动搜索。");
        setAutoMatchMessage("未自动找到截图。请选择一个标题手动搜索。", "empty");
        showManualTitleSearch();
        return false;
      }
    }

    async function loadAnimeMapIndex() {
      if (animeMapIndex) return animeMapIndex;
      if (animeMapIndexPromise) return await animeMapIndexPromise;

      animeMapIndexPromise = (async () => {
        const res = await fetch(ANIME_MAP_PATH, { method: "GET", cache: "force-cache" });
        if (!res.ok) throw new Error(`anime_map.json 请求失败：HTTP ${res.status}`);

        const data = await res.json();
        const rows = Array.isArray(data)
          ? data
          : Array.isArray(data?.items)
            ? data.items
            : Object.values(data || {});

        const byBgmId = new Map();
        for (const row of rows) {
          if (!row) continue;
          const bgmId = row.bgm_id ?? row.bangumi_id ?? row.bgmId ?? row.id;
          if (bgmId === undefined || bgmId === null || bgmId === "") continue;
          byBgmId.set(String(bgmId), row);
        }

        animeMapIndexSource = `同目录 ${ANIME_MAP_PATH.replace(/^\.\//, "")}`;
        return {
          byBgmId,
          rowCount: rows.length
        };
      })();

      try {
        animeMapIndex = await animeMapIndexPromise;
        return animeMapIndex;
      } catch (err) {
        animeMapIndexPromise = null;
        throw err;
      }
    }

    async function findAniDbIdFromAnimeMap(subject) {
      const bgmId = String(subject?.id ?? "");
      if (!bgmId) return null;

      const index = await loadAnimeMapIndex();
      const row = index.byBgmId.get(bgmId);
      if (!row) return null;

      const anidbId = row.anidb_id ?? row.anidbId ?? row.aid ?? "";
      if (anidbId === undefined || anidbId === null || String(anidbId).trim() === "") {
        return { bgmId, row, anidbId: "" };
      }

      return {
        bgmId,
        row,
        anidbId: String(anidbId).trim()
      };
    }

    function findBestAniDbMatchByExactTitles(bangumiTitles, index) {
      const matchesByAid = new Map();

      for (let order = 0; order < bangumiTitles.length; order++) {
        const queryTitle = bangumiTitles[order];
        const key = normalizeTitleForFullMatch(queryTitle);
        if (!key) continue;

        const hits = index.titleMap.get(key) || [];
        for (const hit of hits) {
          if (!matchesByAid.has(hit.aid)) {
            matchesByAid.set(hit.aid, {
              aid: hit.aid,
              matched: [],
              queryKeys: new Set(),
              matchCount: 0,
              score: 0,
              firstOrder: order
            });
          }

          const item = matchesByAid.get(hit.aid);
          const duplicate = item.matched.some(x =>
            x.queryTitle === queryTitle &&
            x.anidbTitle === hit.title &&
            x.type === hit.type &&
            x.lang === hit.lang
          );

          if (!duplicate) {
            item.matched.push({
              queryTitle,
              anidbTitle: hit.title,
              type: hit.type,
              lang: hit.lang
            });
          }

          item.queryKeys.add(key);
          item.matchCount = item.queryKeys.size;
          item.score += scoreAniDbHit(hit, queryTitle);
          item.firstOrder = Math.min(item.firstOrder, order);
        }
      }

      const matches = [...matchesByAid.values()].sort((a, b) => {
        if (b.matchCount !== a.matchCount) return b.matchCount - a.matchCount;
        if (b.score !== a.score) return b.score - a.score;
        if (a.firstOrder !== b.firstOrder) return a.firstOrder - b.firstOrder;
        return Number(a.aid) - Number(b.aid);
      });

      return matches[0] || null;
    }

    async function fetchAniDbTitlesXmlPreferLocal() {
      const failures = [];

      try {
        return await fetchAniDbTitlesXmlFromSameDir();
      } catch (err) {
        failures.push(`同目录文件：${err.message}`);
      }

      throw new Error(
        `无法加载 AniDB title dump。${failures.join("；")}。` +
        `请确认网站同目录存在 anime-titles.xml 或 anime-titles.xml.gz；如果默认文件不可用，请打开“更新 AniDB 标题库”，下载最新 GZ 后上传。`
      );
    }

    async function fetchAniDbTitlesXmlFromSameDir() {
      const failures = [];

      for (const path of ANIDB_LOCAL_TITLE_PATHS) {
        try {
          const res = await fetch(path, { method: "GET", cache: "force-cache" });
          if (!res.ok) {
            failures.push(`${path}: HTTP ${res.status}`);
            continue;
          }

          const buffer = await res.arrayBuffer();
          const xmlText = await decodeMaybeGzipText(buffer);
          return { xmlText, sourceLabel: `同目录 ${path.replace(/^\.\//, "")}` };
        } catch (err) {
          failures.push(`${path}: ${err.message}`);
        }
      }

      throw new Error(failures.join("；") || "未找到同目录 AniDB 文件");
    }

      const buffer = await res.arrayBuffer();
      return {
        xmlText: await decodeMaybeGzipText(buffer),

    async function decodeMaybeGzipText(buffer) {
      const bytes = new Uint8Array(buffer);
      const decoded = new TextDecoder("utf-8").decode(buffer);
      if (decoded.trimStart().startsWith("<")) return decoded;

      const isGzip = bytes.length >= 2 && bytes[0] === 0x1f && bytes[1] === 0x8b;
      if (!isGzip) {
        throw new Error("返回内容不像 XML，也不像 gzip。请检查代理是否正确返回 AniDB dump。");
      }

      if (typeof DecompressionStream === "undefined") {
        throw new Error("当前浏览器不支持 DecompressionStream，无法直接解压 .gz。请换用新版 Chrome/Edge，或让代理在服务端解压。");
      }

      const stream = new Blob([buffer]).stream().pipeThrough(new DecompressionStream("gzip"));
      return await new Response(stream).text();
    }

    function buildAniDbTitleIndex(xmlText) {
      const xml = new DOMParser().parseFromString(xmlText, "application/xml");
      const parseError = xml.querySelector("parsererror");
      if (parseError) throw new Error("AniDB title dump XML 解析失败。");

      const titleMap = new Map();
      const aidMap = new Map();
      const animeNodes = [...xml.querySelectorAll("anime")];

      for (const anime of animeNodes) {
        const aid = anime.getAttribute("aid");
        if (!aid) continue;

        const titles = [];
        for (const titleNode of [...anime.querySelectorAll("title")]) {
          const title = clean(titleNode.textContent);
          if (!title) continue;

          const type = titleNode.getAttribute("type") || "";
          const lang = titleNode.getAttribute("xml:lang") ||
            titleNode.getAttributeNS("http://www.w3.org/XML/1998/namespace", "lang") ||
            titleNode.getAttribute("lang") || "";
          const record = { aid, title, type, lang };
          titles.push(record);

          const key = normalizeTitleForFullMatch(title);
          if (!key) continue;
          if (!titleMap.has(key)) titleMap.set(key, []);
          titleMap.get(key).push(record);
        }

        if (titles.length) {
          aidMap.set(aid, { aid, titles });
        }
      }

      return {
        titleMap,
        aidMap,
        animeCount: aidMap.size,
        titleCount: [...titleMap.values()].reduce((sum, items) => sum + items.length, 0)
      };
    }

    function findAniDbMatchesByTitles(bangumiTitles, index) {
      const matchesByAid = new Map();

      for (const queryTitle of bangumiTitles) {
        const key = normalizeTitleForFullMatch(queryTitle);
        if (!key) continue;

        const hits = index.titleMap.get(key) || [];
        for (const hit of hits) {
          if (!matchesByAid.has(hit.aid)) {
            matchesByAid.set(hit.aid, {
              aid: hit.aid,
              matched: [],
              score: 0
            });
          }

          const item = matchesByAid.get(hit.aid);
          const duplicated = item.matched.some(x =>
            x.queryTitle === queryTitle && x.anidbTitle === hit.title && x.type === hit.type && x.lang === hit.lang
          );
          if (!duplicated) {
            item.matched.push({
              queryTitle,
              anidbTitle: hit.title,
              type: hit.type,
              lang: hit.lang
            });
          }
          item.score = Math.max(item.score, scoreAniDbHit(hit, queryTitle));
        }
      }

      return [...matchesByAid.values()].sort((a, b) => {
        if (b.score !== a.score) return b.score - a.score;
        return Number(a.aid) - Number(b.aid);
      });
    }

    function scoreAniDbHit(hit, queryTitle) {
      let score = 0;
      if (hit.type === "main") score += 10;
      if (hit.type === "official") score += 7;
      if (hit.type === "synonym" || hit.type === "short") score += 4;
      if (["ja", "zh-Hans", "zh-Hant", "zh", "x-jat", "en"].includes(hit.lang)) score += 2;
      if (hit.title === queryTitle) score += 3;
      return score;
    }

    function renderAniDbMatchResults(matches, bangumiTitles) {
      const panel = document.getElementById("anidbMatchResults");
      if (!panel) return;

      if (!matches.length) {

      panel.innerHTML = `

        <div class="fineprint">命中 ${matches.length} 个 aid。只有命中唯一 aid 时会自动搜 FanCaps；多个 aid 时需要手动选择。</div>

    function renderAniDbMatchItem(match) {
      const first = match.matched[0] || {};
      const matchedLines = match.matched.slice(0, 4).map(item => {
        const meta = [item.type, item.lang].filter(Boolean).join(" / ");
        return `${item.queryTitle} → ${item.anidbTitle}${meta ? ` (${meta})` : ""}`;
      });
      const more = match.matched.length > matchedLines.length ? `；另有 ${match.matched.length - matchedLines.length} 条匹配` : "";
      const aidQuery = `${match.aid}`;

            <br><span class="sub">${escapeHtml(matchedLines.join("；") + more)}</span>
          </span>
          <button onclick="searchFanCaps('${escapeJsString(aidQuery)}')">搜 FanCaps</button>

    function buildFanCapsSearchUrl(query) {
      const q = encodeURIComponent(query.trim());
      return `${FANCAPS_BASE}/search.php?q=${q}&animeCB=Anime&submit=Submit`;

    async function searchFanCaps(query, options = {}) {
      const searchUrl = buildFanCapsSearchUrl(query);
      const isAuto = Boolean(options.auto);
      const shouldAutoLoadImages = Boolean(options.autoLoadImages);

      fanCapsResultsEl.innerHTML = "";
      imagePanelEl.innerHTML = "";
      showElement(fanCapsResultsEl);
      hideElement(imagePanelEl);
      imageItemsById.clear();
      episodeDetailStates.clear();
      if (!isAuto) setProgress(0, false);
      setStatus("正在搜索 FanCaps...");

      try {
        const pageHtml = await fetchViaProxy(searchUrl);
        const doc = parseHtml(pageHtml);
        const results = parseFanCapsAnimeResults(doc, searchUrl);

        renderFanCapsResults(query, searchUrl, results, options);
        showElement(subjectDetailEl);
        showElement(fanCapsResultsEl);

        if (results.length) {
          if (shouldAutoLoadImages && results.length === 1) {
            const item = results[0];
            setStatus("已找到结果，正在加载图片...");
            await sleep(120);
            await loadFanCapsImages(item.url, item.title, { auto: true });
          } else if (shouldAutoLoadImages && results.length > 1) {
            setStatus(`找到 ${results.length} 个结果，请选择正确条目。`);
            scrollToElement(fanCapsResultsEl);
          } else {
            setStatus(`找到 ${results.length} 个结果，请选择正确条目。`);
            scrollToElement(fanCapsResultsEl);
          }
        } else {
          setStatus(isAuto ? "继续尝试其它匹配方式..." : "没有找到结果，可以换一个标题搜索。");
          scrollToElement(fanCapsResultsEl);
        }

        return results;
      } catch (err) {
        console.error(err);
        setStatus("FanCaps 解析失败：" + err.message);
        showElement(fanCapsResultsEl);
        fanCapsResultsEl.innerHTML = `
          <div class="panel">
            <h2>搜索失败</h2>
            <div class="sub">当前无法读取 FanCaps 页面，可以稍后重试或打开原页面。</div>
            <div class="toolbar" style="margin-top: 12px;">
              <a class="button" href="${escapeHtml(searchUrl)}" target="_blank" rel="noopener noreferrer">打开 FanCaps 搜索页</a>
            </div>
          </div>
        `;
        scrollToElement(fanCapsResultsEl);
        if (isAuto) return null;
        return null;
      }
    }

    function parseFanCapsAnimeResults(doc, baseUrl) {
      const map = new Map();
      const links = [...doc.querySelectorAll("a")];

      for (const a of links) {
        const href = a.getAttribute("href") || "";
        const lowerHref = href.toLowerCase();
        if (!lowerHref.includes("anime/showimages.php") && !lowerHref.includes("/anime/showimages.php")) continue;

        const url = toAbsoluteUrl(href, baseUrl);
        const title = clean(a.textContent) || titleFromFanCapsUrl(url) || "Anime Result";
        if (!url || !title) continue;
        if (isBadResultTitle(title)) continue;

        const previews = extractSearchResultPreviews(a, baseUrl);

        if (!map.has(url)) {
          map.set(url, {
            title,
            url,
            previews
          });
        } else {
          const item = map.get(url);
          if (title.length > item.title.length && !isBadResultTitle(title)) item.title = title;
          item.previews = unique([...item.previews, ...previews]).slice(0, 4);
        }
      }

      return [...map.values()]
        .filter(item => !isBadResultTitle(item.title))
        .map(item => ({
          ...item,
          previews: unique(item.previews).slice(0, 4)
        }));
    }

    function extractSearchResultPreviews(anchor, baseUrl) {
      const collected = [];

      // 先向上找局部结果块。限制图片数量，避免拿到整个页面的广告或导航图。
      let node = anchor.parentElement;
      for (let depth = 0; depth < 8 && node; depth++) {
        const imgs = collectImageUrlsFromRoot(node, baseUrl).filter(url => !isBadUiImage(url));
        const showLinks = [...node.querySelectorAll("a")].filter(a => {
          const href = (a.getAttribute("href") || "").toLowerCase();
          return href.includes("anime/showimages.php") || href.includes("/anime/showimages.php");
        });

        if (imgs.length >= 1 && imgs.length <= 16 && showLinks.length <= 4) {
          collected.push(...imgs);
          break;
        }

        node = node.parentElement;
      }

      // 兜底：从当前链接后面的少量相邻节点里找图，直到下一个 showimages 标题出现。
      if (!collected.length) {
        let block = anchor.closest("div,td,li,section,article,p") || anchor.parentElement;
        let next = block ? block.nextElementSibling : null;
        let guard = 0;

        while (next && guard < 8 && collected.length < 4) {
          const hasOtherShow = [...next.querySelectorAll("a")].some(a => {
            const href = (a.getAttribute("href") || "").toLowerCase();
            return href.includes("anime/showimages.php") || href.includes("/anime/showimages.php");
          });

          if (hasOtherShow && collected.length) break;

          collected.push(...collectImageUrlsFromRoot(next, baseUrl).filter(url => !isBadUiImage(url)));
          next = next.nextElementSibling;
          guard += 1;
        }
      }

      return unique(collected).slice(0, 4);
    }

    function collectImageUrlsFromRoot(root, baseUrl) {
      const urls = [];

      for (const img of [...root.querySelectorAll("img")]) {
        const src =
          img.getAttribute("data-src") ||
          img.getAttribute("data-original") ||
          img.getAttribute("data-lazy-src") ||
          img.getAttribute("src") ||
          "";

        if (!src) continue;
        const url = toAbsoluteUrl(src, baseUrl);
        if (!looksLikeFanCapsImage(url)) continue;
        urls.push(url);
      }

      return unique(urls);
    }

      const hintText = isAuto

          <div class="toolbar" style="margin-top: 12px;">
            <a class="button quiet" href="${escapeHtml(searchUrl)}" target="_blank" rel="noopener noreferrer">打开 FanCaps 搜索页</a>

    async function loadFanCapsImages(pageUrl, title = "", options = {}) {
      const labelText = getAnimationLabelText(title);
      currentLoadedAnimeLabel = labelText;
      imagePanelEl.innerHTML = "";
      showElement(imagePanelEl);
      imageItemsById.clear();
      episodeDetailStates.clear();
      setProgress(0, false);
      setStatus("正在读取 FanCaps 作品页图片...");

      try {
        const episodeGroups = await collectEpisodeTopImages(pageUrl);
        renderEpisodeImagePanel(pageUrl, title, episodeGroups, labelText);
        hideElement(subjectDetailEl);
        hideElement(fanCapsResultsEl);
        showElement(imagePanelEl);
        const imageCount = episodeGroups.reduce((sum, ep) => sum + ep.images.length, 0);
        setProgress(100, false);
        setStatus(`${options.auto ? "已自动加载图片" : "加载完成"}：${episodeGroups.length} 个分组，${imageCount} 张图片。`);

      } catch (err) {

        setProgress(0, false);
        setStatus("图片解析失败：" + err.message);
        showElement(imagePanelEl);
        imagePanelEl.innerHTML = `
          <div class="panel">
            <h2>图片解析失败</h2>
            <div class="sub">可能是代理失败、FanCaps 页面结构变化，或请求被限制。</div>
            <div class="toolbar" style="margin-top: 12px;">
              <a class="button" href="${escapeHtml(pageUrl)}" target="_blank" rel="noopener noreferrer">打开 FanCaps 条目页</a>
            </div>
          </div>
        `;
        scrollToElement(imagePanelEl);
      }
    }

    async function collectEpisodeTopImages(pageUrl) {
      const allGroups = [];
      const visitedPages = new Set();
      let currentUrl = pageUrl;
      let pageIndex = 1;

      while (currentUrl && !visitedPages.has(currentUrl) && pageIndex <= MAX_SHOW_PAGES) {
        visitedPages.add(currentUrl);
        setStatus(`正在读取 FanCaps 第 ${pageIndex} 页，已解析 ${allGroups.length} 个分组...`);

        const html = await fetchViaProxy(currentUrl);
        const doc = parseHtml(html);

        const isEpisodeOrMovieImagePage =
          currentUrl.includes("episodeimages.php") ||
          currentUrl.includes("MovieImages.php") ||
          currentUrl.includes("movieimages.php");

        if (isEpisodeOrMovieImagePage) {
          const group = parseSingleEpisodeTopImages(doc, currentUrl, "Current Page", 1);
          return group.images.length ? [group] : [];
        }

        const pageGroups = parseShowPageEpisodeTopImagesSequential(doc, currentUrl, allGroups.length);
        allGroups.push(...pageGroups);

        const nextPageUrl = findNextShowImagesPageUrl(doc, currentUrl);
        if (!nextPageUrl || visitedPages.has(nextPageUrl)) break;

        currentUrl = nextPageUrl;
        pageIndex += 1;
        setProgress(Math.min(95, pageIndex * 8), true);
        await sleep(300);
      }

      if (allGroups.length) return allGroups;

      const html = await fetchViaProxy(pageUrl);
      const doc = parseHtml(html);
      const group = parseSingleEpisodeTopImages(doc, pageUrl, "Current Page", 1);
      return group.images.length ? [group] : [];
    }

    function parseShowPageEpisodeTopImagesSequential(doc, baseUrl, startIndex = 0) {
      const links = [...doc.querySelectorAll("a")];
      const groups = [];
      const seenEpisodeUrls = new Set();
      let currentGroup = null;

      function flushCurrentGroup() {
        if (!currentGroup) return;

        currentGroup.images = dedupeImageCandidates(currentGroup.images)
          .filter(item => !isBadUiImage(item.thumbUrl))
          .slice(0, TOP_IMAGES_PER_EPISODE);

        if (currentGroup.images.length) {
          currentGroup.index = startIndex + groups.length + 1;
          groups.push(currentGroup);
        }

        currentGroup = null;
      }

      for (const a of links) {
        const href = a.getAttribute("href") || "";
        const text = clean(a.textContent);
        const lowerHref = href.toLowerCase();

        if (isShowPageStopLinkOrSection(a)) break;

        const isEpisodeLink =
          lowerHref.includes("episodeimages.php") ||
          lowerHref.includes("movieimages.php");

        if (isEpisodeLink) {
          const episodeUrl = toAbsoluteUrl(href, baseUrl);
          if (!episodeUrl || episodeUrl.toLowerCase().includes("search.php")) continue;

          if (currentGroup && currentGroup.url === episodeUrl) continue;
          if (seenEpisodeUrls.has(episodeUrl)) continue;

          flushCurrentGroup();

          seenEpisodeUrls.add(episodeUrl);
          currentGroup = {
            title: normalizeEpisodeTitle(text, episodeUrl),
            url: episodeUrl,
            index: 0,
            images: []
          };

          continue;
        }

        if (!currentGroup) continue;
        if (currentGroup.images.length >= TOP_IMAGES_PER_EPISODE) continue;

        const imageItem = parseImageCandidateFromAnchor(a, baseUrl);
        if (!imageItem) continue;

        imageItem.sourcePage = baseUrl;
        imageItem.episodePageUrl = currentGroup.url;
        currentGroup.images.push(imageItem);
      }

      flushCurrentGroup();
      return groups;
    }

    function parseImageCandidateFromAnchor(a, baseUrl) {
      const href = a.getAttribute("href") || "";
      const img = a.querySelector("img");
      if (!img) return null;

      const src =
        img.getAttribute("data-src") ||
        img.getAttribute("data-original") ||
        img.getAttribute("data-lazy-src") ||
        img.getAttribute("src") ||
        "";

      if (!src) return null;

      const thumbUrl = toAbsoluteUrl(src, baseUrl);
      if (!looksLikeFanCapsImage(thumbUrl)) return null;
      if (isBadUiImage(thumbUrl)) return null;

      const picturePageUrl = href.toLowerCase().includes("picture.php")
        ? toAbsoluteUrl(href, baseUrl)
        : "";

      return {
        id: "",
        episodeTitle: "",
        thumbUrl,
        picturePageUrl,
        originalUrl: "",
        sourcePage: baseUrl
      };
    }

    function findNextShowImagesPageUrl(doc, baseUrl) {
      const links = [...doc.querySelectorAll("a")];

      for (const a of links) {
        const text = clean(a.textContent).toLowerCase();
        const href = a.getAttribute("href") || "";
        const lowerHref = href.toLowerCase();
        if (!href) continue;

        const isNextText = text === "next >" || text === "next" || text.includes("next");
        if (!isNextText) continue;

        if ((lowerHref.includes("showimages.php") || lowerHref.includes("movieimages.php")) && !lowerHref.includes("episodeimages.php")) {
          return toAbsoluteUrl(href, baseUrl);
        }
      }

      return "";
    }

    function isShowPageStopLinkOrSection(a) {
      const text = clean(a.textContent).toLowerCase();
      if (!text) return false;

      return (
        text.includes("more popular images") ||
        text.includes("banning media") ||
        text.includes("privacy policy") ||
        text.includes("support us") ||
        text.includes("advertising")
      );
    }

    function normalizeEpisodeTitle(text, url) {
      let title = clean(text);
      const decoded = decodeURIComponentSafe(url);

      if (!title || title.length < 2 || /see more|images|view/i.test(title)) {
        const m1 = decoded.match(/Episode[_\s-]*(\d+)/i);
        if (m1) title = `Episode ${m1[1]}`;
      }

      if (!title) title = "Episode";
      return title;
    }

    function parseSingleEpisodeTopImages(doc, pageUrl, episodeTitle, episodeIndex) {
      const images = parseImageCandidatesFromRoot(doc.body || doc, pageUrl)
        .filter(item => !isBadUiImage(item.thumbUrl))
        .slice(0, TOP_IMAGES_PER_EPISODE);

      return {
        title: episodeTitle,
        url: pageUrl,
        index: episodeIndex,
        images
      };
    }

    function parseImageCandidatesFromRoot(root, baseUrl) {
      const images = [];

      for (const a of [...root.querySelectorAll("a")]) {
        const item = parseImageCandidateFromAnchor(a, baseUrl);
        if (item) images.push(item);
      }

      return dedupeImageCandidates(images);
    }

    function renderEpisodeImagePanel(sourceUrl, title, episodeGroups, labelText = "") {

          </div>

              : `<div class="empty">没有解析到图片。</div>`

            <a class="button quiet" href="${escapeHtml(sourceUrl)}" target="_blank" rel="noopener noreferrer">打开 FanCaps</a>
          </div>
        </div>

    }

    function renderEpisodeGroup(group) {

    async function toggleImageById(id, checked) {
      const item = imageItemsById.get(id);
      if (!item) return;

      const card = document.getElementById(`card_${id}`);

      if (!checked) {
        selectedImages.delete(id);
        updateImageState(id, "未选择");
        if (card) card.classList.remove("selected");
        updateSelectedCount();
        renderSelectedBasket();
        return;
      }

      selectedImages.set(id, item);
      if (card) card.classList.add("selected");
      updateSelectedCount();
      renderSelectedBasket();

      if (item.originalUrl) {
        updateImageState(id, "已选择");
        return;
      }

      updateImageState(id, "解析原图...");

      try {
        item.originalUrl = await resolveOriginalImageUrl(item);
        selectedImages.set(id, item);
        updateImageState(id, "已选择");
        renderSelectedBasket();
      } catch (err) {
        console.warn("resolve original failed:", err);
        item.originalUrl = upgradeFanCapsThumbUrl(item.thumbUrl) || item.thumbUrl;
        selectedImages.set(id, item);
        updateImageState(id, "已选择");
        renderSelectedBasket();
      }

      updateSelectedCount();
    }

    async function resolveOriginalImageUrl(item) {
      if (item.picturePageUrl) {
        const html = await fetchViaProxy(item.picturePageUrl);
        const doc = parseHtml(html);

        const fromMeta = parseOriginalFromPicturePageMeta(doc, item.picturePageUrl);
        if (fromMeta) return fromMeta;

        const fromImgs = parseOriginalFromPicturePageImages(doc, item.picturePageUrl, item.thumbUrl);
        if (fromImgs) return fromImgs;

        const fromLinks = parseOriginalFromPicturePageLinks(doc, item.picturePageUrl, item.thumbUrl);
        if (fromLinks) return fromLinks;
      }

      return upgradeFanCapsThumbUrl(item.thumbUrl) || item.thumbUrl;
    }

    function parseOriginalFromPicturePageMeta(doc, baseUrl) {
      const metaSelectors = [
        'meta[property="og:image"]',
        'meta[name="twitter:image"]',
        'link[rel="image_src"]'
      ];

      for (const selector of metaSelectors) {
        const el = doc.querySelector(selector);
        if (!el) continue;

        const raw = el.getAttribute("content") || el.getAttribute("href") || "";
        if (!raw) continue;

        const url = toAbsoluteUrl(raw, baseUrl);
        if (looksLikeFanCapsImage(url)) return url;
      }

      return "";
    }

    function parseOriginalFromPicturePageImages(doc, baseUrl, thumbUrl) {
      const candidates = [];

      for (const img of [...doc.querySelectorAll("img")]) {
        const src =
          img.getAttribute("data-src") ||
          img.getAttribute("data-original") ||
          img.getAttribute("data-lazy-src") ||
          img.getAttribute("src") ||
          "";

        if (!src) continue;
        const url = toAbsoluteUrl(src, baseUrl);
        if (!looksLikeFanCapsImage(url)) continue;
        if (isBadUiImage(url)) continue;
        candidates.push(url);
      }

      return pickBestOriginalCandidate(candidates, thumbUrl);
    }

    function parseOriginalFromPicturePageLinks(doc, baseUrl, thumbUrl) {
      const candidates = [];

      for (const a of [...doc.querySelectorAll("a")]) {
        const href = a.getAttribute("href") || "";
        if (!href) continue;
        const url = toAbsoluteUrl(href, baseUrl);
        if (!looksLikeFanCapsImage(url)) continue;
        if (isBadUiImage(url)) continue;
        candidates.push(url);
      }

      return pickBestOriginalCandidate(candidates, thumbUrl);
    }

    function pickBestOriginalCandidate(candidates, thumbUrl) {
      const uniqueCandidates = unique(candidates);
      if (!uniqueCandidates.length) return "";

      const nonThumb = uniqueCandidates.find(url => !isLikelyThumbnailUrl(url));
      if (nonThumb) return nonThumb;

      const different = uniqueCandidates.find(url => url !== thumbUrl);
      if (different) return different;

      return uniqueCandidates[0];
    }

    function isLikelyThumbnailUrl(url) {
      const u = String(url).toLowerCase();
      return (
        u.includes("/thumb") ||
        u.includes("thumb_") ||
        u.includes("_thumb") ||
        u.includes("small") ||
        u.includes("thumbnail") ||
        u.includes("/mini")
      );
    }

    function upgradeFanCapsThumbUrl(url) {
      if (!url) return "";
      let u = String(url);
      const replacements = [
        ["/thumbs/", "/"],
        ["/thumb/", "/"],
        ["/thumbnail/", "/"],
        ["/thumbnails/", "/"],
        ["_thumb.", "."],
        ["-thumb.", "."],
        ["_small.", "."],
        ["-small.", "."],
        ["_mini.", "."],
        ["-mini.", "."]
      ];

      for (const [from, to] of replacements) {
        if (u.includes(from)) return u.replace(from, to);
      }

      return u;
    }

    async function toggleEpisodeDetail(detailId, episodeUrl, episodeTitle, labelText = "") {

      if (!episodeDetailStates.has(detailId)) {
        const pageUrl = buildEpisodeDetailPageUrl(episodeUrl, 1);
        episodeDetailStates.set(detailId, {
          detailId,
          episodeTitle,
          labelText: labelText || currentLoadedAnimeLabel || getAnimationLabelText(""),
          baseEpisodeUrl: stripFanCapsPageParam(episodeUrl),
          currentPage: 1,
          totalPages: null,
          knownPages: new Set([1]),
          pageUrls: new Map([[1, pageUrl]]),
          pageCache: new Map(),
