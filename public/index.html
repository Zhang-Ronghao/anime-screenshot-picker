<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>动画截图出题工具</title>
  <style>
    :root {
      --bg: oklch(0.986 0.006 343);
      --panel: oklch(0.993 0.007 350);
      --panel-rgb: 255 251 252;
      --panel-soft: oklch(0.958 0.012 340);
      --panel-soft-hover: oklch(0.938 0.018 338);
      --text: oklch(0.225 0.024 303);
      --muted: oklch(0.49 0.028 305);
      --border: oklch(0.875 0.022 330);
      --soft: oklch(0.956 0.012 326);
      --dark: oklch(0.31 0.075 292);
      --dark-hover: oklch(0.245 0.085 292);
      --secondary: oklch(0.36 0.065 250);
      --secondary-hover: oklch(0.29 0.072 250);
      --info: oklch(0.50 0.105 231);
      --info-border: oklch(0.78 0.065 226);
      --info-wash: oklch(0.958 0.03 228);
      --success: oklch(0.46 0.088 158);
      --success-border: oklch(0.77 0.066 158);
      --success-wash: oklch(0.962 0.026 158);
      --warning: oklch(0.56 0.116 76);
      --warning-border: oklch(0.80 0.094 76);
      --warning-wash: oklch(0.968 0.036 76);
      --danger: oklch(0.50 0.145 24);
      --danger-hover: oklch(0.42 0.15 24);
      --selected: oklch(0.55 0.17 352);
      --selected-border: oklch(0.80 0.085 352);
      --selected-wash: oklch(0.958 0.034 352);
      --focus-ring: oklch(0.74 0.12 352);
      --focus-ring-soft: oklch(0.74 0.12 352 / 0.25);
      --sky-wash: oklch(0.956 0.036 219);
      --lilac-wash: oklch(0.955 0.036 302);
      --mint-wash: oklch(0.961 0.03 166);
      --anime-bg-image: url("background.jpg");
      --shadow-ink: 42 32 50;
      --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
      --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
      --ease-out-expo: cubic-bezier(0.16, 1, 0.3, 1);
      --motion-fast: 150ms;
      --motion-base: 220ms;
      --motion-slow: 340ms;
      --control-height: 38px;
      --touch-target: 44px;
      --space-2xs: 4px;
      --space-xs: 8px;
      --space-sm: 12px;
      --space-md: 16px;
      --space-lg: 24px;
      --space-xl: 32px;
      --space-2xl: 48px;
      --page-max: 1240px;
      --z-floating: 40;
      --z-modal: 80;
      --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
      --text-xs: 0.75rem;
      --text-sm: 0.8125rem;
      --text-ui: 0.875rem;
      --text-control: 0.9375rem;
      --text-body: 1rem;
      --text-title: 1.125rem;
      --text-heading: 1.375rem;
      --text-display: 2rem;
      --leading-tight: 1.15;
      --leading-title: 1.25;
      --leading-ui: 1.35;
      --leading-body: 1.55;
      --weight-regular: 400;
      --weight-medium: 550;
      --weight-semibold: 650;
      --weight-bold: 750;
    }

    * { box-sizing: border-box; }

    html {
      font-size: 100%;
      text-size-adjust: 100%;
      -webkit-text-size-adjust: 100%;
      background: var(--bg);
    }

    body {
      position: relative;
      font-family: var(--font-ui);
      font-size: var(--text-body);
      font-weight: var(--weight-regular);
      line-height: var(--leading-body);
      font-kerning: normal;
      text-rendering: optimizeLegibility;
      min-height: 100vh;
      margin: 0;
      padding: 34px 18px 112px;
      overflow-x: hidden;
      background:
        radial-gradient(circle at 10% 0%, oklch(0.992 0.018 350 / 0.42), transparent 32rem),
        radial-gradient(circle at 90% 16%, oklch(0.982 0.022 220 / 0.30), transparent 30rem),
        linear-gradient(180deg, oklch(0.992 0.006 350), var(--bg) 34rem);
      color: var(--text);
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      pointer-events: none;
    }

    body::before {
      inset: 0;
      z-index: 0;
      background-image:
        linear-gradient(90deg, oklch(0.992 0.006 350 / 0.94) 0%, oklch(0.992 0.006 350 / 0.80) 42%, oklch(0.992 0.006 350 / 0.90) 100%),
        linear-gradient(180deg, oklch(0.992 0.006 350 / 0.78) 0%, var(--bg) 88%),
        var(--anime-bg-image);
      background-size: cover;
      background-position: center top;
      opacity: 0.24;
      filter: saturate(0.62) brightness(1.20);
    }

    body::after {
      inset: 0;
      z-index: 0;
      background:
        linear-gradient(90deg, oklch(0.74 0.026 330 / 0.06) 1px, transparent 1px),
        linear-gradient(180deg, oklch(0.74 0.026 330 / 0.055) 1px, transparent 1px),
        radial-gradient(circle at 18px 18px, oklch(0.70 0.044 350 / 0.055) 1px, transparent 1.5px);
      background-size: 42px 42px, 42px 42px, 84px 84px;
      opacity: 0.24;
    }

    .anime-bg-art {
      position: fixed;
      inset: 0;
      z-index: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      object-position: center top;
      opacity: 0.055;
      filter: saturate(0.62) brightness(1.18);
      pointer-events: none;
      user-select: none;
    }

    .app-header,
    main {
      position: relative;
      z-index: 1;
    }

    img {
      max-width: 100%;
    }

    main {
      max-width: var(--page-max);
      margin-inline: auto;
      margin-top: var(--space-lg);
    }

    h1 {
      color: var(--text);
      font-size: var(--text-heading);
      font-weight: var(--weight-bold);
      line-height: var(--leading-title);
      letter-spacing: 0;
      margin: 0 0 14px;
    }

    h2 {
      color: var(--text);
      font-size: var(--text-title);
      font-weight: var(--weight-bold);
      line-height: var(--leading-title);
      letter-spacing: 0;
      margin: 0 0 14px;
    }

    h3 {
      color: var(--text);
      font-size: var(--text-body);
      font-weight: var(--weight-bold);
      line-height: var(--leading-ui);
      letter-spacing: 0;
      margin: 0 0 10px;
    }

    p,
    .workflow-note,
    .hint,
    .step-note,
    .empty {
      max-width: 72ch;
    }

    .app-header {
      position: relative;
      max-width: 760px;
      margin: 0 auto;
    }

    .app-header .sub {
      margin-top: -6px;
    }

    .app-header-title-led {
      max-width: var(--page-max);
      min-height: 196px;
      padding: 22px 28px 26px;
      border: 1px solid color-mix(in oklch, var(--selected-border) 26%, var(--border));
      border-radius: 18px;
      background:
        linear-gradient(102deg, rgb(var(--panel-rgb) / 0.72) 0%, rgb(var(--panel-rgb) / 0.54) 58%, rgb(var(--panel-rgb) / 0.32) 100%),
        radial-gradient(circle at 92% 18%, color-mix(in oklch, var(--sky-wash) 36%, transparent), transparent 16rem);
      box-shadow: 0 14px 40px rgb(var(--shadow-ink) / 0.055);
      overflow: hidden;
      isolation: isolate;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .app-header-title-led::before {
      content: "";
      position: absolute;
      inset: 9px;
      z-index: -1;
      border: 1px solid color-mix(in oklch, var(--selected-border) 20%, transparent);
      border-radius: 13px;
      opacity: 0.46;
    }

    .app-header-title-led::after {
      content: "";
      position: absolute;
      right: 22px;
      bottom: 18px;
      z-index: -1;
      width: min(42vw, 340px);
      height: 98px;
      background:
        radial-gradient(circle at 15% 34%, oklch(0.68 0.12 352 / 0.12) 0 3px, transparent 4px),
        radial-gradient(circle at 50% 70%, oklch(0.62 0.10 226 / 0.12) 0 2px, transparent 3px),
        linear-gradient(135deg, transparent 0 46%, oklch(0.80 0.08 352 / 0.20) 47% 48%, transparent 49% 100%);
      background-size: 38px 38px, 52px 52px, 100% 100%;
      opacity: 0.82;
    }

    .app-header-title-led .header-kicker {
      display: inline-flex;
      align-self: flex-start;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
      padding: 5px 10px;
      border: 1px solid color-mix(in oklch, var(--selected-border) 50%, transparent);
      border-radius: 999px;
      background: color-mix(in oklch, var(--selected-wash) 78%, var(--panel));
      color: var(--selected);
      font-size: var(--text-xs);
      font-weight: var(--weight-bold);
      line-height: var(--leading-ui);
      letter-spacing: 0;
    }

    .app-header-title-led .header-kicker::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--selected);
      box-shadow: 0 0 0 4px color-mix(in oklch, var(--selected-wash) 72%, transparent), 0 0 20px color-mix(in oklch, var(--selected) 34%, transparent);
    }

    .app-header-title-led h1 {
      margin: 0;
      max-width: 10em;
      color: var(--text);
      font-size: 3rem;
      font-weight: 800;
      line-height: var(--leading-tight);
      letter-spacing: 0;
    }

    .app-header-title-led .sub {
      margin: 14px 0 0;
      max-width: 42em;
      color: var(--muted);
      font-size: 1.0625rem;
      line-height: var(--leading-body);
    }

    @media (max-width: 480px) {
      .app-header-title-led h1 {
        max-width: 100%;
        font-size: 2rem;
        line-height: var(--leading-tight);
      }
    }

    .panel {
      position: relative;
      background:
        linear-gradient(180deg, rgb(var(--panel-rgb) / 0.96), rgb(var(--panel-rgb) / 0.92)),
        radial-gradient(circle at 100% 0%, color-mix(in oklch, var(--sky-wash) 58%, transparent), transparent 14rem);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: var(--space-md);
      margin-top: 0;
      box-shadow: 0 12px 34px rgb(var(--shadow-ink) / 0.055);
    }

    .motion-reveal {
      animation: motion-reveal var(--motion-slow) var(--ease-out-expo) both;
      transform-origin: top center;
    }

    @keyframes motion-reveal {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    main > .panel,
    main > .shared-status-panel,
    main > #bangumiResults:not(:empty),
    main > #subjectDetail:not(:empty),
    main > #fanCapsResults:not(:empty),
    main > #imagePanel:not(:empty) {
      margin-top: var(--space-md);
    }

    main > #selectedBasket:not(:empty) {
      margin-top: var(--space-xl);
    }

    main > .mode-panel {
      margin-top: 0;
    }

    .row,
    .toolbar {
      display: flex;
      gap: var(--space-xs);
      align-items: center;
      flex-wrap: wrap;
    }

    .toolbar-spaced {
      margin-top: var(--space-sm);
    }

    .toolbar-roomy {
      margin-top: var(--space-md);
    }

    .content-spaced-xs {
      margin-top: var(--space-xs);
    }

    .content-spaced-sm {
      margin-top: var(--space-sm);
    }

    .sub-spaced {
      margin-bottom: var(--space-xs);
    }

    input,
    select,
    textarea {
      min-height: var(--control-height);
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font: inherit;
      font-size: var(--text-control);
      line-height: var(--leading-ui);
      background: var(--panel);
      color: var(--text);
      transition: border-color 0.16s var(--ease-out), box-shadow 0.16s var(--ease-out), background-color 0.16s var(--ease-out);
    }

    input:focus,
    select:focus,
    textarea:focus {
      outline: 2px solid var(--focus-ring);
      outline-offset: 2px;
      border-color: var(--selected);
    }

    input::placeholder,
    textarea::placeholder {
      color: color-mix(in oklch, var(--muted) 78%, var(--panel));
      opacity: 1;
    }

    #keyword {
      flex: 1;
      min-width: 260px;
    }

    #searchPanel {
      display: grid;
      gap: var(--space-sm);
    }

    .search-panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--space-sm);
      flex-wrap: wrap;
    }

    #searchPanel .workflow-note {
      margin: 0;
    }

    #searchPanel .row {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) auto auto;
      gap: var(--space-xs);
      align-items: stretch;
    }

    #proxyInput {
      width: 100%;
    }

    #proxyPreset {
      width: 100%;
    }

    .proxy-settings-grid {
      display: grid;
      grid-template-columns: minmax(180px, 260px) 1fr;
      gap: var(--space-sm);
      margin-top: var(--space-sm);
      align-items: end;
    }

    .proxy-field label {
      display: block;
      color: var(--muted);
      font-size: var(--text-xs);
      font-weight: var(--weight-semibold);
      line-height: var(--leading-ui);
      margin-bottom: 5px;
    }

    @media (max-width: 720px) {
      .proxy-settings-grid {
        grid-template-columns: 1fr;
      }
    }

    button,
    a.button,
    label.button {
      min-height: var(--control-height);
      padding: 9px 12px;
      border: none;
      border-radius: 8px;
      background: var(--dark);
      color: var(--panel);
      cursor: pointer;
      font-family: var(--font-ui);
      font-size: var(--text-ui);
      font-weight: var(--weight-semibold);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      line-height: var(--leading-title);
      text-align: center;
      transition: background-color 0.16s var(--ease-out), border-color 0.16s var(--ease-out), color 0.16s var(--ease-out), box-shadow 0.16s var(--ease-out), transform 0.16s var(--ease-out);
    }

    button:hover,
    a.button:hover,
    label.button:hover {
      background: var(--dark-hover);
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    button:disabled:hover {
      background: var(--dark);
    }

    button.secondary:disabled:hover,
    a.secondary:disabled:hover,
    label.secondary:disabled:hover {
      background: var(--secondary);
    }

    button.light:disabled:hover,
    a.light:disabled:hover,
    label.light:disabled:hover {
      background: var(--panel-soft);
    }

    button.quiet:disabled:hover,
    a.quiet:disabled:hover,
    label.quiet:disabled:hover {
      background: transparent;
      border-color: var(--border);
      color: var(--muted);
    }

    button:active:not(:disabled),
    a.button:active,
    label.button:active {
      transform: translateY(1px);
    }

    button:focus-visible,
    a.button:focus-visible,
    label.button:focus-within,
    .image-card:focus-within,
    .card:focus-visible {
      outline: 2px solid var(--focus-ring);
      outline-offset: 2px;
    }

    button.secondary,
    a.secondary,
    label.secondary {
      background: var(--secondary);
    }

    button.secondary:hover,
    a.secondary:hover,
    label.secondary:hover {
      background: var(--secondary-hover);
    }

    button.light,
    a.light,
    label.light {
      background: var(--panel-soft);
      color: var(--text);
      border: 1px solid var(--border);
    }

    button.light:hover,
    a.light:hover,
    label.light:hover {
      background: var(--panel-soft-hover);
    }

    .status {
      margin: var(--space-sm) 0 0;
      color: var(--muted);
      font-size: var(--text-ui);
      line-height: var(--leading-body);
      min-height: 20px;
      overflow-wrap: anywhere;
      transition: color var(--motion-fast) var(--ease-out), transform var(--motion-fast) var(--ease-out);
    }

    .status.status-pulse {
      color: var(--text);
      transform: translateY(-1px);
    }

    details {
      margin-top: 10px;
    }

    summary {
      cursor: pointer;
      color: var(--muted);
      font-size: var(--text-sm);
      line-height: var(--leading-ui);
      user-select: none;
    }

    .proxy-current {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: var(--space-xs);
      flex-wrap: wrap;
      color: var(--muted);
      font-size: var(--text-xs);
      line-height: var(--leading-body);
      padding: 0;
      background: transparent;
      border: none;
      border-radius: 0;
    }

    .proxy-current span {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .proxy-current strong {
      color: var(--text);
      font-weight: var(--weight-bold);
    }

    .proxy-current button {
      min-height: 34px;
      padding: 6px 9px;
      font-size: var(--text-xs);
    }

    .proxy-summary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 11px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--panel-soft);
      color: var(--text);
      font-size: var(--text-sm);
      font-weight: var(--weight-semibold);
      list-style: none;
    }

    .proxy-summary:hover {
      background: var(--panel-soft-hover);
    }

    .proxy-summary::-webkit-details-marker {
      display: none;
    }

    .proxy-details[open] .proxy-summary {
      background: var(--soft);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 280px), 1fr));
      gap: var(--space-sm);
    }

    .card {
      width: 100%;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      cursor: pointer;
      display: flex;
      gap: 12px;
      align-items: flex-start;
      justify-content: flex-start;
      min-height: 112px;
      color: var(--text);
      font: inherit;
      text-align: left;
      transition: background-color 0.16s var(--ease-out), border-color 0.16s var(--ease-out), box-shadow 0.16s var(--ease-out);
    }

    .card:hover,
    .result-card:hover {
      border-color: var(--info-border);
    }

    .image-card:hover {
      border-color: var(--selected);
    }

    .card:hover {
      background: var(--info-wash);
      color: var(--text);
    }

    .cover {
      width: 64px;
      height: 90px;
      object-fit: cover;
      border-radius: 6px;
      background: var(--soft);
      flex-shrink: 0;
    }

    .bangumi-card-copy {
      flex: 1;
      min-width: 0;
      display: grid;
      gap: 2px;
      padding-top: 1px;
    }

    .bangumi-card-copy .sub {
      overflow-wrap: anywhere;
    }

    .title {
      font-size: var(--text-body);
      font-weight: var(--weight-bold);
      margin-bottom: 4px;
      line-height: var(--leading-ui);
    }

    .sub {
      color: var(--muted);
      font-size: var(--text-sm);
      line-height: var(--leading-body);
    }

    .tag {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--panel-soft);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 8px 6px 10px;
      margin: 4px;
      font-size: var(--text-ui);
      line-height: var(--leading-ui);
    }

    .tag.match-item {
      align-items: flex-start;
      border-radius: 12px;
    }

    .tag button,
    .tag a.button {
      padding: 4px 8px;
      font-size: var(--text-xs);
      border-radius: 999px;
    }

    .result-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 390px), 1fr));
      gap: var(--space-md);
    }

    .result-section {
      margin-top: var(--space-lg);
    }

    .result-section-title {
      font-size: var(--text-control);
      font-weight: var(--weight-bold);
      line-height: var(--leading-ui);
      margin: var(--space-sm) 0 var(--space-xs);
    }

    .result-details {
      margin-top: 14px;
      border-top: 1px solid var(--border);
      padding-top: 10px;
    }

    .result-details summary {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 11px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--panel-soft);
      color: var(--text);
      font-size: var(--text-sm);
      font-weight: var(--weight-semibold);
      list-style: none;
    }

    .result-details summary::-webkit-details-marker {
      display: none;
    }

    .result-details[open] summary {
      background: var(--soft);
    }

    .result-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: var(--space-sm);
      display: grid;
      grid-template-columns: 156px 1fr;
      gap: var(--space-sm);
      min-height: 124px;
      transition: border-color 0.16s var(--ease-out), background-color 0.16s var(--ease-out);
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
    }

    .preview-grid img {
      width: 100%;
      aspect-ratio: 16 / 9;
      height: auto;
      object-fit: cover;
      border-radius: 5px;
      background: var(--soft);
      display: block;
    }

    .preview-empty {
      width: 156px;
      height: 92px;
      border-radius: 8px;
      background: var(--soft);
      color: var(--muted);
      font-size: var(--text-xs);
      line-height: var(--leading-ui);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 8px;
    }

    .episode-block {
      margin-top: var(--space-xl);
      padding-top: var(--space-lg);
      border-top: 1px solid var(--border);
    }

    .episode-detail {
      display: none;
      margin-top: 12px;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel-soft);
    }

    .episode-detail-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    .episode-detail-page {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .page-selector {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
      margin: 10px 0 12px;
    }

    .page-btn {
      min-width: 44px;
      min-height: 44px;
      padding: 8px 10px;
      border-radius: 8px;
    }

    .page-btn.active {
      background: var(--selected);
      color: var(--panel);
      border-color: var(--selected);
    }


    .episode-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: var(--space-sm);
      flex-wrap: wrap;
      margin-bottom: var(--space-sm);
    }

    .episode-title {
      font-size: var(--text-body);
      font-weight: var(--weight-bold);
      line-height: var(--leading-ui);
    }

    .review-helper {
      margin: 6px 0 12px;
      color: var(--muted);
      font-size: var(--text-sm);
      line-height: var(--leading-body);
    }

    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 260px), 1fr));
      gap: var(--space-md);
    }

    .image-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 9px;
      display: block;
      cursor: pointer;
      transition: border-color 0.16s var(--ease-out), box-shadow 0.16s var(--ease-out), background-color 0.16s var(--ease-out), transform 0.16s var(--ease-out);
    }

    .image-card:hover {
      transform: translateY(-1px);
    }

    .image-card.selected {
      border-color: var(--selected);
      background: var(--selected-wash);
      box-shadow: 0 0 0 2px color-mix(in oklch, var(--selected-border) 35%, transparent);
    }

    .image-card img {
      width: 100%;
      aspect-ratio: 16 / 9;
      height: auto;
      object-fit: cover;
      border-radius: 6px;
      background: var(--soft);
      display: block;
      margin-bottom: 7px;
    }

    .image-card input {
      margin-right: 6px;
      min-height: auto;
      accent-color: var(--selected);
    }

    .image-state {
      display: flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      color: var(--muted);
      font-size: var(--text-sm);
      line-height: var(--leading-ui);
    }

    .image-card.selected .image-state {
      color: var(--text);
      font-weight: var(--weight-semibold);
    }

    .stats {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin: 10px 0 12px;
    }

    .pill {
      background: var(--panel-soft);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 5px 10px;
      font-size: var(--text-sm);
      line-height: var(--leading-ui);
      color: var(--text);
    }

    .selectedCount {
      color: var(--selected);
      font-weight: var(--weight-bold);
      display: inline-block;
      transform-origin: center;
    }

    .selectedCount.count-bump {
      animation: count-bump 0.42s var(--ease-out);
    }

    @keyframes count-bump {
      0% { transform: scale(1); }
      38% { transform: scale(1.22); }
      100% { transform: scale(1); }
    }


    .basket-panel {
      border-color: var(--border);
      background: color-mix(in oklch, var(--panel) 88%, var(--selected-wash));
    }

    .workflow-note {
      margin-bottom: var(--space-sm);
      color: var(--muted);
      font-size: var(--text-sm);
      line-height: var(--leading-body);
    }

    .workflow-note-nowrap {
      max-width: 100%;
      overflow-x: auto;
      white-space: nowrap;
    }

    .basket-quality {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .quality-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 999px;
      background: var(--panel-soft);
      color: var(--text);
      font-size: var(--text-xs);
      font-weight: var(--weight-semibold);
      line-height: var(--leading-ui);
    }

    .quality-pill.warning {
      background: var(--warning-wash);
      border-color: var(--warning-border);
      color: var(--warning);
    }

    .quality-pill.success {
      background: var(--success-wash);
      border-color: var(--success-border);
      color: var(--success);
    }

    .basket-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: var(--space-md);
      flex-wrap: wrap;
    }

    .basket-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 190px), 1fr));
      gap: var(--space-sm);
      margin-top: var(--space-md);
    }

    .basket-empty-simple {
      margin-top: var(--space-md);
      color: var(--muted);
      font-size: var(--text-ui);
      line-height: var(--leading-body);
    }

    .basket-card {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 7px;
      background: var(--panel);
      position: relative;
      transition: border-color 0.16s var(--ease-out), background-color 0.16s var(--ease-out), box-shadow 0.16s var(--ease-out);
    }

    .basket-card.is-picked,
    .image-card.is-picked {
      animation: picked-card 0.58s var(--ease-out);
    }

    @keyframes picked-card {
      0% {
        box-shadow: 0 0 0 0 color-mix(in oklch, var(--selected-border) 0%, transparent);
      }
      42% {
        box-shadow: 0 0 0 5px color-mix(in oklch, var(--selected-border) 28%, transparent);
      }
      100% {
        box-shadow: 0 0 0 0 color-mix(in oklch, var(--selected-border) 0%, transparent);
      }
    }

    .basket-card img {
      width: 100%;
      aspect-ratio: 16 / 9;
      height: auto;
      object-fit: cover;
      border-radius: 6px;
      background: var(--soft);
      display: block;
      margin-bottom: 6px;
    }

    .basket-remove {
      position: absolute;
      top: 5px;
      right: 5px;
      min-width: 26px;
      min-height: 26px;
      padding: 2px 7px;
      border-radius: 999px;
      font-size: var(--text-ui);
      line-height: 1;
      background: color-mix(in oklch, var(--danger) 78%, transparent);
      color: var(--panel);
    }

    .basket-remove:hover {
      background: var(--danger-hover);
    }

    .loading-line {
      height: 6px;
      border-radius: 999px;
      background: var(--soft);
      overflow: hidden;
      margin-top: var(--space-sm);
    }

    .loading-line > div {
      position: relative;
      height: 100%;
      width: 0%;
      background: var(--info);
      transition: width 0.22s var(--ease-out);
    }

    .loading-line.is-active > div::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(
        90deg,
        transparent,
        color-mix(in oklch, var(--panel) 45%, transparent),
        transparent
      );
      transform: translateX(-100%);
      animation: progress-sheen 1.05s var(--ease-out-quart) infinite;
    }

    @keyframes progress-sheen {
      to { transform: translateX(100%); }
    }

    .empty {
      color: var(--muted);
      font-size: var(--text-ui);
      line-height: var(--leading-body);
      padding: 12px;
      border: 1px dashed var(--info-border);
      border-radius: 10px;
      background: color-mix(in oklch, var(--info-wash) 72%, transparent);
    }

    .fineprint {
      color: var(--muted);
      font-size: var(--text-xs);
      line-height: var(--leading-body);
      margin-top: 8px;
    }



    .floating-nav {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: var(--z-floating);
      display: flex;
      gap: var(--space-xs);
      align-items: center;
      flex-wrap: wrap;
      padding: 10px;
      max-width: calc(100vw - 36px);
      border: 1px solid var(--border);
      border-radius: 14px;
      background: color-mix(in oklch, var(--panel) 88%, var(--selected-wash));
      box-shadow: 0 8px 28px rgb(var(--shadow-ink) / 0.12);
      backdrop-filter: blur(8px);
      animation: floating-nav-in var(--motion-base) var(--ease-out-expo) both;
    }

    @keyframes floating-nav-in {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .floating-nav button {
      padding: 8px 10px;
      font-size: var(--text-sm);
    }

    .floating-nav button .selectedCount {
      color: inherit;
    }

    .delight-toast-stack {
      position: fixed;
      right: 18px;
      bottom: 82px;
      z-index: calc(var(--z-floating) + 1);
      display: grid;
      gap: 8px;
      width: min(320px, calc(100vw - 36px));
      pointer-events: none;
    }

    .delight-toast {
      padding: 10px 12px;
      border: 1px solid var(--success-border);
      border-radius: 10px;
      background: color-mix(in oklch, var(--success-wash) 86%, var(--panel));
      color: var(--text);
      box-shadow: 0 8px 28px rgb(var(--shadow-ink) / 0.12);
      font-size: var(--text-sm);
      font-weight: var(--weight-semibold);
      line-height: var(--leading-body);
      opacity: 0;
      transform: translateY(8px);
      animation: toast-in 0.2s var(--ease-out) forwards, toast-out 0.22s var(--ease-out) 2.3s forwards;
    }

    @keyframes toast-in {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes toast-out {
      to {
        opacity: 0;
        transform: translateY(6px);
      }
    }

    .paper-burst {
      position: fixed;
      inset: 0;
      z-index: calc(var(--z-floating) + 2);
      pointer-events: none;
      overflow: hidden;
    }

    .paper-burst span {
      position: absolute;
      left: var(--burst-x);
      top: var(--burst-y);
      width: 8px;
      height: 12px;
      border-radius: 3px;
      border: 1px solid color-mix(in oklch, var(--selected-border) 70%, transparent);
      background: color-mix(in oklch, var(--selected-wash) 82%, var(--panel));
      opacity: 0;
      transform: translate(0, 0) rotate(0deg);
      animation: paper-fall 0.86s var(--ease-out) var(--burst-delay) forwards;
    }

    .paper-burst span:nth-child(3n) {
      background: color-mix(in oklch, var(--info-wash) 86%, var(--panel));
      border-color: var(--info-border);
    }

    @keyframes paper-fall {
      8% { opacity: 1; }
      100% {
        opacity: 0;
        transform: translate(var(--burst-tx), var(--burst-ty)) rotate(var(--burst-rot));
      }
    }

    .step-note {
      margin-top: 10px;
      color: var(--muted);
      font-size: var(--text-sm);
      line-height: var(--leading-body);
    }

    .hint {
      margin: 10px 0 8px;
      color: var(--text);
      font-size: var(--text-ui);
      line-height: var(--leading-body);
    }

    button.quiet,
    a.quiet,
    label.quiet {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }

    button.quiet:hover,
    a.quiet:hover,
    label.quiet:hover {
      background: var(--info-wash);
      border-color: var(--info-border);
      color: var(--text);
    }



    .subject-step-layout {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-md);
      margin-top: var(--space-md);
    }

    .subject-step-layout:has(.subject-side-flow:not([style*="display: none"])) {
      grid-template-columns: minmax(0, 1.4fr) minmax(280px, 0.8fr);
    }

    .subject-main-flow,
    .subject-side-flow {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: var(--space-sm);
      background: var(--panel);
    }

    .subject-main-flow {
      border-color: var(--border);
    }

    .subject-side-flow {
      background: var(--panel);
      color: var(--text);
    }

    .side-title {
      font-size: var(--text-control);
      font-weight: var(--weight-bold);
      line-height: var(--leading-ui);
      margin-bottom: 8px;
      color: var(--text);
    }

    .section-headline {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .source-note {
      color: var(--muted);
      font-size: var(--text-xs);
      line-height: var(--leading-body);
    }

    .side-action-stack {
      display: flex;
      gap: var(--space-xs);
      margin-top: var(--space-sm);
      flex-wrap: wrap;
    }

    .side-action-stack button,
    .side-action-stack a.button,
    .side-action-stack label.button {
      text-align: center;
      justify-content: center;
    }

    .compact-details {
      margin-top: 10px;
    }

    .compact-details summary {
      font-size: var(--text-xs);
      color: var(--muted);
    }

    @media (max-width: 640px) {
      body {
        margin-top: 0;
        padding-top: 22px;
        padding-left: 12px;
        padding-right: 12px;
        padding-bottom: 132px;
      }

      .grid,
      .result-list,
      .basket-grid {
        grid-template-columns: 1fr;
      }

      .result-card {
        grid-template-columns: 1fr;
      }

      .preview-empty {
        width: 100%;
      }

      .image-grid {
        grid-template-columns: 1fr;
      }

      button,
      a.button,
      label.button {
        min-height: 44px;
      }

      .floating-nav {
        left: 12px;
        right: 12px;
        bottom: 12px;
        align-items: stretch;
        justify-content: space-between;
      }

      .floating-nav button {
        flex: 1;
        min-width: 0;
        min-height: var(--touch-target);
        white-space: normal;
      }

      .delight-toast-stack {
        left: 12px;
        right: 12px;
        bottom: 74px;
        width: auto;
      }

      #searchPanel .row {
        grid-template-columns: 1fr;
      }

      .search-panel-head {
        align-items: flex-start;
      }

      .proxy-current {
        width: 100%;
        justify-content: space-between;
      }

      .proxy-current button,
      .draft-actions button,
      .tag button,
      .tag a.button {
        min-height: var(--touch-target);
      }

      .workflow-note-nowrap {
        overflow-x: visible;
        white-space: normal;
      }

      .subject-step-layout:has(.subject-side-flow:not([style*="display: none"])) {
        grid-template-columns: 1fr;
      }
    }


    .mode-panel {
      display: grid;
      grid-template-columns: auto auto minmax(220px, 1fr);
      gap: var(--space-xs);
      align-items: center;
      padding: var(--space-xs);
      background: color-mix(in oklch, var(--panel-soft) 82%, var(--info-wash));
      margin-top: 0;
    }

    .mode-button {
      min-width: 120px;
      border: 1px solid var(--border);
    }

    .mode-button.active {
      background: var(--selected);
      color: var(--panel);
      border-color: var(--selected);
      box-shadow: 0 0 0 3px color-mix(in oklch, var(--selected-border) 22%, transparent);
    }

    .auto-form-grid {
      display: grid;
      grid-template-columns: minmax(180px, 0.9fr) minmax(360px, 1.8fr) repeat(2, minmax(150px, 0.75fr));
      gap: var(--space-sm);
      align-items: end;
      margin-top: var(--space-sm);
    }

    .auto-field label {
      display: block;
      color: var(--muted);
      font-size: var(--text-xs);
      font-weight: var(--weight-semibold);
      line-height: var(--leading-ui);
      margin-bottom: 5px;
    }

    .auto-field input,
    .auto-field select {
      width: 100%;
    }

    .auto-draft-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 280px), 1fr));
      gap: var(--space-md);
      margin-top: var(--space-md);
    }

    .auto-draft-bottom-actions {
      display: flex;
      gap: var(--space-xs);
      align-items: center;
      justify-content: flex-start;
      flex-wrap: wrap;
      margin-top: var(--space-md);
      padding-top: var(--space-sm);
      border-top: 1px solid var(--border);
    }

    .auto-loading-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--info);
    }

    .auto-loading-pill::before {
      content: "";
      width: 10px;
      height: 10px;
      border: 2px solid var(--border);
      border-top-color: var(--info);
      border-radius: 999px;
      display: inline-block;
      animation: auto-spin 0.85s linear infinite;
    }

    @keyframes auto-spin {
      to { transform: rotate(360deg); }
    }


    .draft-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: var(--space-sm);
      transition: border-color 0.16s var(--ease-out), background-color 0.16s var(--ease-out), transform 0.16s var(--ease-out), opacity 0.16s var(--ease-out);
    }

    .draft-card.draft-enter {
      animation: draft-enter 0.32s var(--ease-out-expo) both;
      animation-delay: var(--stagger-delay, 0ms);
    }

    .draft-card.is-removing {
      opacity: 0;
      transform: translateY(6px) scale(0.985);
    }

    @keyframes draft-enter {
      from {
        opacity: 0;
        transform: translateY(12px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .draft-card:hover,
    .basket-card:hover,
    .modal-choice:hover {
      border-color: var(--info-border);
    }

    .draft-card img {
      width: 100%;
      aspect-ratio: 16 / 9;
      height: auto;
      object-fit: cover;
      border-radius: 7px;
      background: var(--soft);
      display: block;
      margin-bottom: 8px;
    }

    .draft-title {
      font-size: var(--text-control);
      font-weight: var(--weight-bold);
      line-height: var(--leading-ui);
      min-height: 38px;
      margin-bottom: 6px;
    }

    .draft-meta {
      color: var(--muted);
      font-size: var(--text-xs);
      line-height: var(--leading-body);
      margin-bottom: 8px;
    }

    .draft-actions {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .draft-actions button {
      flex: 1 1 74px;
      min-height: 32px;
      padding: 5px 9px;
      font-size: var(--text-xs);
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: var(--z-modal);
      background: oklch(0.22 0.012 65 / 0.38);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 18px;
    }

    .modal-backdrop.show {
      display: flex;
      animation: modal-backdrop-in 0.18s var(--ease-out) both;
    }

    body.modal-open {
      overflow: hidden;
    }

    .modal-box {
      width: min(980px, 100%);
      max-height: min(760px, 92vh);
      overflow: auto;
      background: var(--panel);
      border-radius: 14px;
      border: 1px solid var(--border);
      padding: 16px;
      box-shadow: 0 18px 50px rgb(var(--shadow-ink) / 0.22);
    }

    .modal-backdrop.show .modal-box {
      animation: modal-box-in 0.24s var(--ease-out-expo) both;
      transform-origin: center;
    }

    @keyframes modal-backdrop-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @keyframes modal-box-in {
      from {
        opacity: 0;
        transform: translateY(10px) scale(0.985);
      }
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 12px;
    }

    .modal-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 10px;
    }

    .modal-choice {
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px;
      background: var(--panel);
      transition: border-color 0.16s var(--ease-out), background-color 0.16s var(--ease-out), transform 0.16s var(--ease-out);
    }

    .modal-choice.choice-enter {
      animation: choice-enter 0.26s var(--ease-out-expo) both;
      animation-delay: var(--stagger-delay, 0ms);
    }

    .modal-choice:hover {
      transform: translateY(-1px);
    }

    @keyframes choice-enter {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .modal-choice img {
      width: 100%;
      height: 105px;
      object-fit: cover;
      border-radius: 7px;
      background: var(--soft);
      display: block;
      margin-bottom: 8px;
    }

    .modal-choice-title {
      font-size: var(--text-sm);
      font-weight: var(--weight-bold);
      line-height: var(--leading-ui);
      min-height: 36px;
      margin-bottom: 6px;
    }

    .modal-choice button {
      width: 100%;
      min-height: 44px;
      padding: 8px 10px;
      font-size: var(--text-xs);
    }


    .mode-prompt {
      color: var(--muted);
      font-size: var(--text-sm);
      line-height: var(--leading-body);
      justify-self: end;
      padding-inline: var(--space-xs);
      text-align: right;
    }

    .shared-status-panel {
      padding: var(--space-sm) var(--space-md);
      border: 1px solid var(--info-border);
      border-radius: 12px;
      background: color-mix(in oklch, var(--info-wash) 78%, var(--panel));
    }

    .shared-status-panel .status {
      margin: 0;
    }

    .auto-year-range {
      min-width: min(100%, 520px);
    }

    .year-range-line {
      display: grid;
      grid-template-columns: auto minmax(220px, 1fr) auto;
      gap: 12px;
      align-items: center;
      margin-top: 8px;
    }

    .year-range-label {
      white-space: nowrap;
      color: var(--muted);
      font-size: var(--text-sm);
      line-height: var(--leading-ui);
    }

    .year-range-label strong {
      color: var(--text);
      font-weight: var(--weight-bold);
    }

    .dual-range-wrap {
      position: relative;
      height: 28px;
    }

    .dual-range-track,
    .dual-range-active {
      position: absolute;
      left: 0;
      right: 0;
      top: 13px;
      height: 3px;
      border-radius: 999px;
      background: var(--border);
      pointer-events: none;
    }

    .dual-range-active {
      left: var(--year-active-left, 0%);
      right: var(--year-active-right, 0%);
      background: var(--info);
    }

    .dual-range-input {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 28px;
      padding: 0;
      border: none;
      background: transparent;
      pointer-events: none;
      appearance: none;
      -webkit-appearance: none;
    }

    .dual-range-input::-webkit-slider-runnable-track {
      height: 3px;
      background: transparent;
    }

    .dual-range-input::-webkit-slider-thumb {
      width: 15px;
      height: 15px;
      border-radius: 999px;
      border: 2px solid var(--info);
      background: var(--panel);
      cursor: pointer;
      pointer-events: auto;
      appearance: none;
      -webkit-appearance: none;
      margin-top: -6px;
    }

    .dual-range-input:focus-visible::-webkit-slider-thumb {
      box-shadow: 0 0 0 5px var(--focus-ring-soft);
    }

    .dual-range-input::-moz-range-track {
      height: 3px;
      background: transparent;
    }

    .dual-range-input::-moz-range-thumb {
      width: 15px;
      height: 15px;
      border-radius: 999px;
      border: 2px solid var(--info);
      background: var(--panel);
      cursor: pointer;
      pointer-events: auto;
    }

    .dual-range-input:focus-visible::-moz-range-thumb {
      box-shadow: 0 0 0 5px var(--focus-ring-soft);
    }

    #autoYearFromRange { z-index: 2; }
    #autoYearToRange { z-index: 3; }

    @media (max-width: 980px) {
      .auto-form-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .auto-year-range {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 640px) {
      .mode-panel {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .mode-prompt {
        grid-column: 1 / -1;
        justify-self: start;
        padding: 0;
        text-align: left;
      }

      .auto-year-range {
        grid-column: span 1;
      }
      .auto-form-grid {
        grid-template-columns: 1fr;
      }
      .year-range-line {
        grid-template-columns: 1fr;
        gap: 6px;
      }
      .year-range-label:last-child {
        text-align: right;
      }

      .draft-actions button {
        min-height: var(--touch-target);
      }

      .modal-backdrop {
        padding: 10px;
      }

      .modal-head {
        flex-direction: column;
      }

      .modal-head .toolbar,
      .modal-head .toolbar button {
        width: 100%;
      }

      .modal-grid {
        grid-template-columns: repeat(auto-fill, minmax(138px, 1fr));
      }
    }

    /* Anime workbench polish: visual-only layer, business logic stays untouched. */
    .app-header {
      max-width: var(--page-max);
    }

    .app-header-title-led .sub {
      color: color-mix(in oklch, var(--muted) 88%, var(--text));
    }

    main {
      display: grid;
      gap: var(--space-md);
    }

    main > .panel,
    main > .shared-status-panel,
    main > #bangumiResults:not(:empty),
    main > #subjectDetail:not(:empty),
    main > #fanCapsResults:not(:empty),
    main > #imagePanel:not(:empty),
    main > #selectedBasket:not(:empty) {
      margin-top: 0;
    }

    input,
    select,
    textarea {
      background:
        linear-gradient(180deg, rgb(var(--panel-rgb) / 0.98), color-mix(in oklch, var(--panel) 88%, var(--sky-wash)));
      border-color: color-mix(in oklch, var(--border) 82%, var(--selected-border));
      box-shadow: inset 0 1px 0 rgb(var(--panel-rgb) / 0.72);
    }

    input:hover,
    select:hover,
    textarea:hover {
      border-color: color-mix(in oklch, var(--info-border) 74%, var(--selected-border));
    }

    button,
    a.button,
    label.button {
      border: 1px solid color-mix(in oklch, var(--dark) 68%, var(--selected-border));
      background:
        linear-gradient(180deg, color-mix(in oklch, var(--dark) 88%, oklch(0.72 0.08 328)), var(--dark));
      box-shadow: 0 6px 16px rgb(var(--shadow-ink) / 0.10);
    }

    button:hover,
    a.button:hover,
    label.button:hover {
      box-shadow: 0 8px 18px rgb(var(--shadow-ink) / 0.14);
    }

    button.light,
    a.light,
    label.light,
    button.quiet,
    a.quiet,
    label.quiet {
      box-shadow: none;
    }

    button.light,
    a.light,
    label.light {
      background:
        linear-gradient(180deg, color-mix(in oklch, var(--panel) 86%, var(--lilac-wash)), var(--panel-soft));
      border-color: color-mix(in oklch, var(--border) 78%, var(--info-border));
    }

    button.light:hover,
    a.light:hover,
    label.light:hover,
    button.quiet:hover,
    a.quiet:hover,
    label.quiet:hover {
      background: color-mix(in oklch, var(--sky-wash) 72%, var(--panel));
      border-color: color-mix(in oklch, var(--info-border) 78%, var(--selected-border));
    }

    a.button.source-link,
    button.source-link {
      background: transparent;
      color: var(--muted);
      border-color: color-mix(in oklch, var(--border) 88%, transparent);
      box-shadow: none;
      font-weight: var(--weight-medium);
    }

    a.button.source-link:hover,
    button.source-link:hover {
      background: color-mix(in oklch, var(--panel) 76%, var(--sky-wash));
      color: var(--text);
      border-color: color-mix(in oklch, var(--info-border) 70%, var(--border));
      box-shadow: none;
    }

    .mode-panel {
      border-color: color-mix(in oklch, var(--selected-border) 36%, var(--border));
      background:
        linear-gradient(90deg, color-mix(in oklch, var(--panel) 91%, var(--selected-wash)), color-mix(in oklch, var(--panel) 92%, var(--sky-wash)));
      box-shadow: 0 8px 22px rgb(var(--shadow-ink) / 0.045);
    }

    .mode-button.active {
      background:
        linear-gradient(180deg, color-mix(in oklch, var(--selected) 92%, oklch(0.78 0.10 330)), var(--selected));
      box-shadow: 0 0 0 3px color-mix(in oklch, var(--selected-border) 25%, transparent), 0 8px 20px color-mix(in oklch, var(--selected) 24%, transparent);
    }

    .shared-status-panel {
      position: relative;
      overflow: hidden;
      border-color: color-mix(in oklch, var(--info-border) 70%, var(--selected-border));
      background:
        linear-gradient(90deg, color-mix(in oklch, var(--sky-wash) 40%, var(--panel)), color-mix(in oklch, var(--selected-wash) 22%, var(--panel)));
      box-shadow: 0 7px 18px rgb(var(--shadow-ink) / 0.04);
    }

    .shared-status-panel::after {
      content: "";
      position: absolute;
      inset: auto 12px 7px auto;
      width: 86px;
      height: 22px;
      background:
        radial-gradient(circle at 10px 50%, color-mix(in oklch, var(--selected) 32%, transparent) 0 2px, transparent 3px),
        radial-gradient(circle at 34px 50%, color-mix(in oklch, var(--info) 28%, transparent) 0 2px, transparent 3px),
        radial-gradient(circle at 58px 50%, color-mix(in oklch, var(--success) 24%, transparent) 0 2px, transparent 3px);
      opacity: 0.78;
    }

    .card,
    .result-card,
    .image-card,
    .basket-card,
    .draft-card,
    .modal-choice,
    .subject-main-flow,
    .subject-side-flow {
      background:
        linear-gradient(180deg, rgb(var(--panel-rgb) / 0.97), rgb(var(--panel-rgb) / 0.91));
      border-color: color-mix(in oklch, var(--border) 82%, var(--selected-border));
      box-shadow: 0 8px 22px rgb(var(--shadow-ink) / 0.045);
    }

    .card:hover,
    .result-card:hover,
    .draft-card:hover,
    .basket-card:hover,
    .modal-choice:hover {
      border-color: color-mix(in oklch, var(--info-border) 70%, var(--selected-border));
      background:
        linear-gradient(180deg, color-mix(in oklch, var(--panel) 86%, var(--sky-wash)), rgb(var(--panel-rgb) / 0.93));
    }

    .image-card {
      border-radius: 13px;
    }

    .image-card img,
    .basket-card img,
    .draft-card img,
    .preview-grid img,
    .modal-choice img {
      border: 1px solid color-mix(in oklch, var(--border) 78%, var(--selected-border));
      box-shadow: 0 4px 14px rgb(var(--shadow-ink) / 0.08);
    }

    .image-card.selected {
      border-color: var(--selected);
      background:
        linear-gradient(180deg, color-mix(in oklch, var(--selected-wash) 74%, var(--panel)), rgb(var(--panel-rgb) / 0.94));
      box-shadow: 0 0 0 2px color-mix(in oklch, var(--selected-border) 38%, transparent), 0 10px 24px color-mix(in oklch, var(--selected) 13%, transparent);
    }

    .title,
    .draft-title,
    .episode-title,
    .side-title,
    .result-section-title {
      color: color-mix(in oklch, var(--text) 86%, var(--dark));
    }

    .pill,
    .tag,
    .quality-pill,
    .result-details summary,
    .proxy-summary {
      background:
        linear-gradient(180deg, color-mix(in oklch, var(--panel) 82%, var(--lilac-wash)), color-mix(in oklch, var(--panel-soft) 86%, var(--panel)));
      border-color: color-mix(in oklch, var(--border) 78%, var(--info-border));
    }

    .basket-panel {
      background:
        linear-gradient(180deg, color-mix(in oklch, var(--panel) 78%, var(--selected-wash)), color-mix(in oklch, var(--panel) 84%, var(--sky-wash)));
      border-color: color-mix(in oklch, var(--selected-border) 50%, var(--border));
    }

    .loading-line {
      background: color-mix(in oklch, var(--panel-soft) 76%, var(--sky-wash));
    }

    .loading-line > div {
      background:
        linear-gradient(90deg, var(--info), color-mix(in oklch, var(--selected) 58%, var(--info)));
    }

    .floating-nav {
      border-color: color-mix(in oklch, var(--selected-border) 44%, var(--border));
      background: color-mix(in oklch, var(--panel) 78%, var(--selected-wash));
      box-shadow: 0 16px 42px rgb(var(--shadow-ink) / 0.16);
    }

    .delight-toast {
      border-color: color-mix(in oklch, var(--success-border) 70%, var(--selected-border));
      background:
        linear-gradient(180deg, color-mix(in oklch, var(--success-wash) 72%, var(--panel)), color-mix(in oklch, var(--panel) 84%, var(--selected-wash)));
    }

    @media (prefers-reduced-motion: no-preference) {
      body::after {
        animation: workbench-paper-drift 18s linear infinite;
      }

      .app-header-title-led::after {
        animation: header-cel-drift 8s var(--ease-out-quart) infinite alternate;
      }
    }

    @keyframes workbench-paper-drift {
      to { background-position: 42px 42px, 42px 42px, 84px 84px; }
    }

    @keyframes header-cel-drift {
      to { transform: translate3d(-10px, -4px, 0); opacity: 0.62; }
    }

    @media (max-width: 760px) {
      body {
        padding-top: 14px;
      }

      body::before {
        background-position: 56% top;
        opacity: 0.18;
      }

      .anime-bg-art {
        opacity: 0.04;
        object-position: 56% top;
      }

      .app-header-title-led {
        min-height: 174px;
        padding: 18px 16px;
        border-radius: 16px;
        background:
          linear-gradient(115deg, rgb(var(--panel-rgb) / 0.72) 0%, rgb(var(--panel-rgb) / 0.58) 72%, rgb(var(--panel-rgb) / 0.38) 100%),
          radial-gradient(circle at 88% 20%, color-mix(in oklch, var(--sky-wash) 30%, transparent), transparent 12rem);
      }
    }

    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
      }
    }

  </style>
</head>
<body>
  <div id="topAnchor"></div>
  <img class="anime-bg-art" src="background.jpg" alt="" aria-hidden="true" onerror="this.remove()">
  <header class="app-header app-header-title-led">
    <div class="header-kicker">动漫高手·一眼顶针</div>
    <h1>动画截图出题工具</h1>
    <p class="sub">从 FanCaps 截图库中挑选画面，生成可导出的题单。</p>
  </header>

  <main>

  <div id="modePanel" class="panel mode-panel" role="group" aria-label="出题方式" aria-describedby="modePrompt">
    <button id="manualModeBtn" class="mode-button active" type="button" aria-pressed="true" aria-controls="searchPanel" onclick="switchMode('manual')">手动出题</button>
    <button id="autoModeBtn" class="mode-button light" type="button" aria-pressed="false" aria-controls="autoPanel" onclick="switchMode('auto')">自动出题</button>
    <span class="mode-prompt" id="modePrompt">手动适合精挑截图，自动适合批量起草。</span>
  </div>

  <div class="shared-status-panel" aria-label="工作状态">
    <div id="status" class="status" role="status" aria-live="polite">搜索动画开始手动出题，或切换到自动出题。</div>
    <div id="progressWrap" class="loading-line" style="display: none;" role="progressbar" aria-label="当前任务进度" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
      <div id="progressBar"></div>
    </div>
  </div>

  <div id="autoPanel" class="panel" style="display: none;">
    <h2>自动出题</h2>
    <div class="workflow-note workflow-note-nowrap">填写 Bangumi 用户 ID 后，只从该用户标记“看过”的动画里抽题；留空则从全部可用动画里抽题。</div>

    <div class="auto-form-grid">
      <div class="auto-field">
        <label for="autoBangumiUser">Bangumi 用户 ID（可选）</label>
        <input id="autoBangumiUser" placeholder="例如：123456" />
      </div>
      <div class="auto-field auto-year-range">
        <label>年份范围</label>
        <div class="year-range-line">
          <span class="year-range-label">起始：<strong id="autoYearFromLabel">2010</strong></span>
          <div class="dual-range-wrap" id="autoYearRangeWrap">
            <div class="dual-range-track"></div>
            <div class="dual-range-active" id="autoYearActiveTrack"></div>
            <input id="autoYearFromRange" class="dual-range-input" type="range" min="1999" max="2026" step="1" value="2010" oninput="syncAutoYearRangeLabels('from')" aria-label="起始年份" />
            <input id="autoYearToRange" class="dual-range-input" type="range" min="2000" max="2027" step="1" value="2027" oninput="syncAutoYearRangeLabels('to')" aria-label="结束年份" />
          </div>
          <span class="year-range-label">结束：<strong id="autoYearToLabel">不限</strong></span>
        </div>
      </div>
      <div class="auto-field">
        <label for="autoMinDone">最低看过人数（Bangumi）</label>
        <input id="autoMinDone" type="number" min="0" step="1000" placeholder="不限" />
      </div>
      <div class="auto-field">
        <label for="autoQuestionCount">题目数量</label>
        <input id="autoQuestionCount" type="number" min="1" max="100" value="20" />
      </div>
    </div>

    <div class="toolbar toolbar-spaced">
      <button id="generateAutoDraftBtn" onclick="generateAutoDraft()">生成题单草稿</button>
      <button class="light" onclick="addAutoDraftToSelected()" id="addAutoDraftBtn" disabled>把草稿加入已选</button>
      <span class="pill" id="autoPoolInfo">等待生成</span>
      <span class="pill auto-loading-pill" id="autoGenerateStatus" style="display: none;">正在生成草稿...</span>
    </div>

    <div id="autoDraftArea"></div>
  </div>

  <div id="autoChoiceModal" class="modal-backdrop" aria-hidden="true" onclick="handleModalBackdropClick(event)">
    <div class="modal-box" role="dialog" aria-modal="true" aria-labelledby="autoModalTitle" tabindex="-1">
      <div class="modal-head">
        <div>
          <h2 id="autoModalTitle">请选择一个选项</h2>
          <div class="sub" id="autoModalHint"></div>
        </div>
        <div class="toolbar">
          <button class="quiet" onclick="refreshAutoModalBatch()">换一批</button>
          <button onclick="closeAutoModal()">关闭</button>
        </div>
      </div>
      <div id="autoModalChoices" class="modal-grid"></div>
    </div>
  </div>


  <div id="searchPanel" class="panel">
    <div class="search-panel-head">
      <div class="workflow-note">搜索动画并选择正确条目，工具会自动查找可用截图。</div>
      <div class="proxy-current">
        <span>连接：<strong id="currentProxyLabel">默认连接（推荐）</strong></span>
        <button class="quiet" type="button" onclick="toggleProxyPanel()" aria-controls="proxyDetails" aria-expanded="false">高级连接设置</button>
      </div>
    </div>
    <div class="row">
      <input id="keyword" placeholder="输入中文名，例如：芙莉莲、金牌得主、孤独摇滚" aria-label="动画关键词" />
      <button id="searchBangumiBtn" type="button">搜索动画</button>
      <button class="light" type="button" onclick="clearAll()">清空当前流程</button>
    </div>

    <div id="proxyDetails" class="proxy-details" style="display: none;">
      <div class="proxy-settings-grid">
        <div class="proxy-field">
          <label for="proxyPreset">连接方式</label>
          <select id="proxyPreset">
            <option value="/proxy?url=">Cloudflare Pages Function /proxy?url=（推荐）</option>
            <option value="https://corsproxy.io/?url=">corsproxy.io（公共备用）</option>
            <option value="https://api.allorigins.win/raw?url=">AllOrigins raw（公共备用）</option>
            <option value="https://api.codetabs.com/v1/proxy?quest=">CodeTabs Proxy（公共备用）</option>
            <option value="custom">自定义</option>
          </select>
        </div>
        <div class="proxy-field">
          <label for="proxyInput">自定义连接前缀</label>
          <input id="proxyInput" />
        </div>
      </div>
      <div class="toolbar toolbar-spaced">
        <button class="light" onclick="resetProxyToDefault()">恢复推荐连接</button>
      </div>
      <div class="fineprint">默认连接最稳定。公共备用连接只适合临时尝试，速度和成功率不保证。</div>
    </div>

  </div>
  <div id="bangumiResults" class="grid"></div>
  <div id="subjectDetail"></div>
  <div id="fanCapsResults"></div>
  <div id="imagePanel"></div>
  <div id="selectedBasket"></div>

  </main>

  <div class="floating-nav" id="floatingNav" aria-label="快速导航" style="display: none;">
    <button type="button" onclick="scrollToTopSearch()">继续搜索</button>
    <button type="button" onclick="scrollToBasket()">查看已选并导出（<span id="floatSelectedCount" class="selectedCount">0</span>）</button>
  </div>

  <script>
    const BGM_API = "https://api.bgm.tv";
    const FANCAPS_BASE = "https://fancaps.net";
    const ANIDB_TITLES_URL = "https://anidb.net/api/anime-titles.xml.gz";
    const ANIDB_LOCAL_DUMP_MONTH = "2026-05";
    const ANIDB_LOCAL_TITLE_PATHS = [
      "./anime-titles.xml",
      "./anime-titles.xml.gz"
    ];
    const ANIME_MAP_PATH = "./anime_map.json";
    const FANCAPS_AUTO_DATA_PATH = "./fancaps_anime_images.jsonl";
    const DEFAULT_PROXY = "/proxy?url=";
    const TOP_IMAGES_PER_EPISODE = 4;
    const MAX_SHOW_PAGES = 30;

    const keywordInput = document.getElementById("keyword");
    const proxyInput = document.getElementById("proxyInput");
    const proxyPreset = document.getElementById("proxyPreset");
    const currentProxyLabel = document.getElementById("currentProxyLabel");
    const statusEl = document.getElementById("status");
    const progressWrapEl = document.getElementById("progressWrap");
    const progressBarEl = document.getElementById("progressBar");
    const bangumiResultsEl = document.getElementById("bangumiResults");
    const subjectDetailEl = document.getElementById("subjectDetail");
    const fanCapsResultsEl = document.getElementById("fanCapsResults");
    const imagePanelEl = document.getElementById("imagePanel");
    const selectedBasketEl = document.getElementById("selectedBasket");
    const floatingNavEl = document.getElementById("floatingNav");
    const searchPanelEl = document.getElementById("searchPanel");
    const modePanelEl = document.getElementById("modePanel");
    const manualModeBtn = document.getElementById("manualModeBtn");
    const autoModeBtn = document.getElementById("autoModeBtn");
    const autoPanelEl = document.getElementById("autoPanel");
    const autoDraftAreaEl = document.getElementById("autoDraftArea");
    const autoPoolInfoEl = document.getElementById("autoPoolInfo");
    const generateAutoDraftBtn = document.getElementById("generateAutoDraftBtn");
    const autoGenerateStatusEl = document.getElementById("autoGenerateStatus");
    const addAutoDraftBtn = document.getElementById("addAutoDraftBtn");
    const autoChoiceModalEl = document.getElementById("autoChoiceModal");
    const autoModalTitleEl = document.getElementById("autoModalTitle");
    const autoModalHintEl = document.getElementById("autoModalHint");
    const autoModalChoicesEl = document.getElementById("autoModalChoices");
    const autoYearFromRangeEl = document.getElementById("autoYearFromRange");
    const autoYearToRangeEl = document.getElementById("autoYearToRange");
    const autoYearFromLabelEl = document.getElementById("autoYearFromLabel");
    const autoYearToLabelEl = document.getElementById("autoYearToLabel");

    let selectedImages = new Map();
    let imageItemsById = new Map();
    let episodeDetailStates = new Map();
    let currentSubject = null;
    let currentLoadedAnimeLabel = "";
    let anidbTitleIndex = null;
    let anidbTitleIndexPromise = null;
    let anidbTitleIndexSource = "";
    let animeMapIndex = null;

    function switchMode(mode) {
      const isAuto = mode === "auto";

      autoPanelEl.style.display = isAuto ? "" : "none";
      searchPanelEl.style.display = isAuto ? "none" : "";
      revealElement(isAuto ? autoPanelEl : searchPanelEl);

      const manualEls = [bangumiResultsEl, subjectDetailEl, fanCapsResultsEl, imagePanelEl];
      for (const el of manualEls) {
        if (isAuto) hideElement(el);
        else showElement(el, false);
      }

      manualModeBtn.className = isAuto ? "mode-button light" : "mode-button active";
      autoModeBtn.className = isAuto ? "mode-button active" : "mode-button light";
      manualModeBtn.setAttribute("aria-pressed", String(!isAuto));
      autoModeBtn.setAttribute("aria-pressed", String(isAuto));

      setStatus(isAuto ? "已切换到自动出题。" : "已切换到手动出题。");
      renderSelectedBasket();
      scrollToElement(isAuto ? autoPanelEl : searchPanelEl);
    }


    function syncAutoYearRangeLabels(changed = "") {
      if (!autoYearFromRangeEl || !autoYearToRangeEl) return;

      let from = Number(autoYearFromRangeEl.value || 1999);
      let to = Number(autoYearToRangeEl.value || 2027);
      const fromLimit = from === 1999 ? 0 : from;
      const toLimit = to === 2027 ? 0 : to;

      if (fromLimit && toLimit && fromLimit > toLimit) {
        if (changed === "from") {
          autoYearToRangeEl.value = String(fromLimit);
          to = fromLimit;
        } else {
          autoYearFromRangeEl.value = String(toLimit);
          from = toLimit;
        }
      }

      if (autoYearFromLabelEl) autoYearFromLabelEl.textContent = from === 1999 ? "不限" : String(from);
      if (autoYearToLabelEl) autoYearToLabelEl.textContent = to === 2027 ? "不限" : String(to);

      updateAutoYearActiveTrack();
    }

    function updateAutoYearActiveTrack() {
      const track = document.getElementById("autoYearActiveTrack");
      if (!track || !autoYearFromRangeEl || !autoYearToRangeEl) return;

      const min = 1999;
      const max = 2027;
      const fromRaw = Number(autoYearFromRangeEl.value || min);
      const toRaw = Number(autoYearToRangeEl.value || max);
      const fromForTrack = fromRaw === 1999 ? min : fromRaw;
      const toForTrack = toRaw === 2027 ? max : toRaw;
      const left = ((fromForTrack - min) / (max - min)) * 100;
      const right = 100 - ((toForTrack - min) / (max - min)) * 100;

      track.style.setProperty("--year-active-left", `${Math.max(0, Math.min(100, left))}%`);
      track.style.setProperty("--year-active-right", `${Math.max(0, Math.min(100, right))}%`);
    }

    function getAutoYearFromValue() {
      const value = Number(autoYearFromRangeEl?.value || 1999);
      return value === 1999 ? 0 : value;
    }

    function getAutoYearToValue() {
      const value = Number(autoYearToRangeEl?.value || 2027);
      return value === 2027 ? 0 : value;
    }

    async function loadAutoDataset() {
      if (autoDataset) return autoDataset;
      if (autoDatasetPromise) return autoDatasetPromise;

      autoDatasetPromise = (async () => {
        const res = await fetch(FANCAPS_AUTO_DATA_PATH, { cache: "force-cache" });
        if (!res.ok) throw new Error(`FanCaps 截图读取失败：HTTP ${res.status}`);

        const text = await res.text();
        const records = [];
        const lines = text.split(/\r?\n/);

        for (let i = 0; i < lines.length; i++) {
          const line = lines[i].trim();
          if (!line) continue;

          try {
            const raw = JSON.parse(line);
            const images = Array.isArray(raw.images)
              ? raw.images.map(x => String(x || "").trim()).filter(Boolean)
              : [];
            if (!images.length) continue;

            const bgmId = String(raw.bgm_id || raw.bangumi_id || "").trim();
            if (!bgmId) continue;

            const year = extractYear(raw.date);
            const doneCount = Number(raw.done_count || 0) || 0;

            records.push({
              bgmId,
              anidbId: raw.anidb_id ? String(raw.anidb_id) : "",
              title: clean(raw.label_text || raw.name_cn || raw.name || `Bangumi ${bgmId}`),
              date: raw.date || "",
              year,
              doneCount,
              ratingCount: Number(raw.rating_count || 0) || 0,
              imageCount: images.length,
              images
            });
          } catch (err) {}

          if (i > 0 && i % 250 === 0) {
            await sleep(0);
          }
        }

        autoDataset = records;
        return records;
      })();

      return autoDatasetPromise;
    }

    function extractYear(dateText) {
      const m = String(dateText || "").match(/(19|20)\d{2}/);
      return m ? Number(m[0]) : 0;
    }

    function setAutoGenerating(isGenerating) {
      autoGenerating = Boolean(isGenerating);
      if (generateAutoDraftBtn) {
        generateAutoDraftBtn.disabled = autoGenerating;
        generateAutoDraftBtn.textContent = autoGenerating ? "生成中..." : "生成题单草稿";
      }
      if (autoGenerateStatusEl) {
        if (autoGenerating) {
          autoGenerateStatusEl.textContent = pickOne([
            "正在从截图池里抽一组题...",
            "正在避开重复动画...",
            "正在把候选截图排成草稿..."
          ]);
        }
        autoGenerateStatusEl.style.display = autoGenerating ? "inline-flex" : "none";
      }
    }

    async function generateAutoDraft() {
      if (autoGenerating) return;

      setAutoGenerating(true);
      setStatus("正在生成题单草稿...");
      setProgress(8, true);

      try {
        const dataset = await loadAutoDataset();
        setProgress(32, true);

        const pool = await buildAutoCandidatePool(dataset);
        autoFilteredPool = pool;

        const count = clampNumber(Number(document.getElementById("autoQuestionCount").value || 20), 1, 100);
        const sampleCount = Math.min(count, pool.length);

        if (!pool.length) {
          autoDraft = [];
          renderAutoDraft();
          setStatus("当前条件下没有可用截图。可以放宽年份、看过人数或清空 Bangumi 用户筛选。");
          setProgress(100, false);
          return;
        }

        setProgress(72, true);
        autoDraft = sampleUnique(pool, sampleCount).map(record => makeAutoDraftItem(record));
        renderAutoDraft();
        setStatus(`已生成 ${autoDraft.length} 题草稿。可以换图、换动画，或加入已选截图。`);
        setProgress(100, false);
        scrollToElement(autoDraftAreaEl);
      } catch (err) {
        setProgress(0, false);
        setStatus("自动出题失败。请调整条件后重试，或稍后再试。详情：" + err.message);
      } finally {
        setAutoGenerating(false);
      }
    }

    async function buildAutoCandidatePool(dataset) {
      const yearFrom = getAutoYearFromValue();
      const yearTo = getAutoYearToValue();
      const minDone = Number(document.getElementById("autoMinDone").value || 0) || 0;
      const user = clean(document.getElementById("autoBangumiUser").value || "");

      let allowedIds = null;
      if (user) {
        setStatus("正在读取这个 Bangumi 用户看过的动画...");
        allowedIds = await fetchBangumiWatchedIds(user);
      }

      const pool = dataset.filter(record => {
        if (allowedIds && !allowedIds.has(record.bgmId)) return false;
        if (minDone && record.doneCount < minDone) return false;
        if (yearFrom && (!record.year || record.year < yearFrom)) return false;
        if (yearTo && (!record.year || record.year > yearTo)) return false;
        return record.images && record.images.length;
      });

      const scope = user ? `符合用户看过：${pool.length} 部` : `可用动画：${pool.length} 部`;
      if (autoPoolInfoEl) autoPoolInfoEl.textContent = scope;
      return pool;
    }

    async function fetchBangumiWatchedIds(username) {
      const ids = new Set();
      const limit = 50;
      let offset = 0;
      let guard = 0;

      while (guard < 80) {
        guard += 1;
        const url = `${BGM_API}/v0/users/${encodeURIComponent(username)}/collections?subject_type=2&type=2&limit=${limit}&offset=${offset}`;
        const res = await fetch(url, { headers: { "Accept": "application/json" } });
        if (!res.ok) throw new Error(`读取用户收藏失败：HTTP ${res.status}`);
        const json = await res.json();
        const data = Array.isArray(json.data) ? json.data : [];

        for (const item of data) {
          const id = item.subject_id || item.subject?.id || item.id;
          if (id) ids.add(String(id));
        }

        if (data.length < limit) break;
        offset += limit;
        await sleep(160);
      }

      return ids;
    }

    function makeAutoDraftItem(record, imageUrl = "") {
      const chosen = imageUrl || randomOne(record.images) || "";
      return {
        uid: `draft_${record.bgmId}_${hashString(chosen)}_${Math.random().toString(36).slice(2, 7)}`,
        bgmId: record.bgmId,
        title: record.title,
        date: record.date,
        year: record.year,
        doneCount: record.doneCount,
        imageUrl: chosen,
        record
      };
    }

    function renderAutoDraft() {
      if (addAutoDraftBtn) addAutoDraftBtn.disabled = !autoDraft.length;

      if (!autoDraft.length) {
        autoDraftAreaEl.innerHTML = `<div class="empty content-spaced-sm">还没有题单草稿。设置条件后，点击“生成题单草稿”。</div>`;
        return;
      }

      autoDraftAreaEl.innerHTML = `
        <div class="result-section">
          <div class="section-headline">
            <div>
              <h2>题单草稿</h2>
            </div>
            <span class="pill">${autoDraft.length} 题</span>
          </div>
          <div class="auto-draft-grid">
            ${autoDraft.map((item, idx) => renderAutoDraftCard(item, idx)).join("")}
          </div>
          <div class="auto-draft-bottom-actions">
            <button type="button" class="light" onclick="addAutoDraftToSelected()">把草稿加入已选</button>
            <button type="button" onclick="copyAutoDraftJsonl()">复制草稿题单</button>
            <button type="button" onclick="exportAutoDraftJsonl()">导出草稿题单</button>

    function renderAutoDraftCard(item, idx) {
      return `
        <div class="draft-card draft-enter" id="${escapeHtml(item.uid)}" style="--stagger-delay: ${Math.min(idx * 24, 168)}ms;">
          <img src="${escapeHtml(originalToFanCapsThumbnailUrl(item.imageUrl))}" alt="${escapeHtml(item.title)} 截图候选" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.display='none'">
          <div class="draft-title">${idx + 1}. ${escapeHtml(item.title)}</div>
          <div class="draft-meta">${escapeHtml(item.date || "日期未知")} · 看过 ${Number(item.doneCount || 0).toLocaleString()}</div>
