    function regenerateAutoDraft() {
      if (!autoFilteredPool.length) {
        generateAutoDraft();
        return;
      }
      const count = clampNumber(Number(document.getElementById("autoQuestionCount").value || 20), 1, 100);
      autoDraft = sampleUnique(autoFilteredPool, Math.min(count, autoFilteredPool.length)).map(record => makeAutoDraftItem(record));
      renderAutoDraft();
      setStatus("已重新随机。");
    }

    function removeAutoDraftItem(uid) {
      const card = document.getElementById(uid);
      if (card && !prefersReducedMotion()) {
        card.classList.add("is-removing");
        window.setTimeout(() => removeAutoDraftItemNow(uid), 170);
        return;
      }
      removeAutoDraftItemNow(uid);
      return;
    }

    function removeAutoDraftItemNow(uid) {
      autoDraft = autoDraft.filter(item => item.uid !== uid);
      renderAutoDraft();
      setStatus("已移除 1 题。");
    }

    function openChangeImageModal(uid) {
      const item = autoDraft.find(x => x.uid === uid);
      if (!item) return;

      autoModalState = {
        type: "image",
        uid,
        shownImageUrls: new Set([item.imageUrl])
      };
      autoModalTitleEl.textContent = "选择一张图";
      autoModalHintEl.textContent = item.title;
      renderChangeImageChoices(item);
      showAutoModal();
    }

    function renderChangeImageChoices(item) {
      const state = autoModalState && autoModalState.type === "image" && autoModalState.uid === item.uid
        ? autoModalState
        : null;
      const allImages = unique((item.record.images || []).map(url => String(url || "").trim()).filter(Boolean));
      const candidates = allImages.filter(url => url !== item.imageUrl);

      if (!candidates.length) {
        autoModalHintEl.textContent = item.title;
        autoModalChoicesEl.innerHTML = `<div class="empty">这部动画暂时没有其它候选截图。可以改换动画，或保留当前截图。</div>`;
        return;
      }

      let unseen = candidates.filter(url => !state || !state.shownImageUrls.has(url));
      let restarted = false;
      if (!unseen.length) {
        restarted = true;
        if (state) state.shownImageUrls = new Set([item.imageUrl]);
        unseen = candidates;
      }

      const finalChoices = sampleUnique(unseen, Math.min(5, unseen.length));
      if (state) {
        for (const url of finalChoices) state.shownImageUrls.add(url);
      }

      autoModalHintEl.textContent = restarted
        ? `${item.title} · 所有图片都随机完了，开始重新随机。`
        : item.title;

      autoModalChoicesEl.innerHTML = finalChoices.map((url, idx) => `
        <div class="modal-choice choice-enter" style="--stagger-delay: ${Math.min(idx * 22, 132)}ms;">
          <img src="${escapeHtml(originalToFanCapsThumbnailUrl(url))}" alt="${escapeHtml(item.title)} 可替换截图" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.display='none'">
          <div class="modal-choice-title">${escapeHtml(item.title)}</div>
          <button onclick="chooseAutoImage('${escapeJsString(item.uid)}', '${escapeJsString(url)}')">选择</button>
        </div>
      `).join("");
    }

    function chooseAutoImage(uid, url) {
      const idx = autoDraft.findIndex(x => x.uid === uid);
      if (idx < 0) return;
      const record = autoDraft[idx].record;
      autoDraft[idx] = makeAutoDraftItem(record, url);
      autoDraft[idx].uid = uid;
      replaceAutoDraftCard(uid, idx);
      closeAutoModal();
      setStatus("已更换图片。");
    }

    function openChangeAnimeModal(uid) {
      const item = autoDraft.find(x => x.uid === uid);
      if (!item) return;

      autoModalState = {
        type: "anime",
        uid,
        currentBgmId: item.bgmId,
        shownAnimeIds: new Set([item.bgmId])
      };
      autoModalTitleEl.textContent = "选择一部动画";
      autoModalHintEl.textContent = "从当前筛选范围中随机给出 5 部。";
      renderChangeAnimeChoices(uid);
      showAutoModal();
    }

    function renderChangeAnimeChoices(uid) {
      const state = autoModalState && autoModalState.type === "anime" && autoModalState.uid === uid
        ? autoModalState
        : null;
      const currentBgmId = state?.currentBgmId || "";
      const used = new Set(autoDraft.filter(item => item.uid !== uid).map(item => item.bgmId));
      const pool = autoFilteredPool.filter(record => !used.has(record.bgmId) && record.bgmId !== currentBgmId);

      if (!pool.length) {
        autoModalHintEl.textContent = "当前筛选范围里没有更多可替换动画。";
        autoModalChoicesEl.innerHTML = `<div class="empty">当前筛选范围里没有更多可替换动画。可以放宽条件后重新生成草稿。</div>`;
        return;
      }

      let unseen = pool.filter(record => !state || !state.shownAnimeIds.has(record.bgmId));
      let restarted = false;
      if (!unseen.length) {
        restarted = true;
        if (state) state.shownAnimeIds = new Set([currentBgmId].filter(Boolean));
        unseen = pool;
      }

      const choices = sampleUnique(unseen, Math.min(5, unseen.length));
      if (state) {
        for (const record of choices) state.shownAnimeIds.add(record.bgmId);
      }

      autoModalHintEl.textContent = restarted
        ? "所有动画都随机完了，开始重新随机。"
        : "从当前筛选范围中随机给出 5 部。";

      autoModalChoicesEl.innerHTML = choices.map((record, idx) => {
        const image = randomOne(record.images);
        return `
          <div class="modal-choice choice-enter" style="--stagger-delay: ${Math.min(idx * 22, 132)}ms;">
            <img src="${escapeHtml(originalToFanCapsThumbnailUrl(image))}" alt="${escapeHtml(record.title)} 截图候选" loading="lazy" referrerpolicy="no-referrer" onerror="this.style.display='none'">
            <div class="modal-choice-title">${escapeHtml(record.title)}</div>
            <div class="draft-meta">${escapeHtml(record.date || "日期未知")} · 看过 ${Number(record.doneCount || 0).toLocaleString()}</div>
            <button onclick="chooseAutoAnime('${escapeJsString(uid)}', '${escapeJsString(record.bgmId)}', '${escapeJsString(image)}')">选择</button>
          </div>
        `;
      }).join("");
    }

    function chooseAutoAnime(uid, bgmId, imageUrl) {
      const idx = autoDraft.findIndex(x => x.uid === uid);
      const record = autoFilteredPool.find(x => x.bgmId === bgmId);
      if (idx < 0 || !record) return;
      autoDraft[idx] = makeAutoDraftItem(record, imageUrl || randomOne(record.images));
      autoDraft[idx].uid = uid;
      replaceAutoDraftCard(uid, idx);
      closeAutoModal();
      setStatus("已更换动画。");
    }

    function replaceAutoDraftCard(uid, idx) {
      const card = document.getElementById(uid);
      const item = autoDraft[idx];
      if (!card || !item) {
        renderAutoDraft();
        return;
      }

      card.outerHTML = renderAutoDraftCard(item, idx);
    }

    function refreshAutoModalBatch() {
      if (!autoModalState) return;
      if (autoModalState.type === "image") {
        const item = autoDraft.find(x => x.uid === autoModalState.uid);
        if (item) renderChangeImageChoices(item);
      } else if (autoModalState.type === "anime") {
        renderChangeAnimeChoices(autoModalState.uid);
      }
    }

    function showAutoModal() {
      lastModalFocus = document.activeElement instanceof HTMLElement ? document.activeElement : null;
      autoChoiceModalEl.classList.add("show");
      autoChoiceModalEl.setAttribute("aria-hidden", "false");
      document.body.classList.add("modal-open");
      setTimeout(() => {
        const firstAction = getAutoModalFocusable()[0];
        (firstAction || autoChoiceModalEl.querySelector(".modal-box"))?.focus();
      }, 0);
    }

    function closeAutoModal() {
      autoChoiceModalEl.classList.remove("show");
      autoChoiceModalEl.setAttribute("aria-hidden", "true");
      document.body.classList.remove("modal-open");
      autoModalState = null;
      if (lastModalFocus && document.contains(lastModalFocus)) {
        lastModalFocus.focus();
      }
      lastModalFocus = null;
    }

    function handleModalBackdropClick(event) {
      if (event.target === autoChoiceModalEl) closeAutoModal();
    }

    function handleGlobalKeydown(event) {
      if (!autoChoiceModalEl.classList.contains("show")) return;

      if (event.key === "Escape") {
        closeAutoModal();
        return;
      }

      if (event.key === "Tab") {
        trapAutoModalFocus(event);
      }
    }

    function getAutoModalFocusable() {
      const selector = [
        "button:not([disabled])",
        "[href]",
        "input:not([disabled])",
        "select:not([disabled])",
        "textarea:not([disabled])",
        "[tabindex]:not([tabindex='-1'])"
      ].join(", ");

      return [...autoChoiceModalEl.querySelectorAll(selector)]
        .filter(el => el instanceof HTMLElement && !el.hasAttribute("hidden") && el.offsetParent !== null);
    }

    function trapAutoModalFocus(event) {
      const focusable = getAutoModalFocusable();
      const modalBox = autoChoiceModalEl.querySelector(".modal-box");

      if (!focusable.length) {
        event.preventDefault();
        modalBox?.focus();
        return;
      }

      const first = focusable[0];
      const last = focusable[focusable.length - 1];
      const active = document.activeElement;

      if (!autoChoiceModalEl.contains(active)) {
        event.preventDefault();
        first.focus();
        return;
      }

      if (event.shiftKey && active === first) {
        event.preventDefault();
        last.focus();
      } else if (!event.shiftKey && active === last) {
        event.preventDefault();
        first.focus();
      }
    }


    function getAutoDraftJsonlRecords() {
      return autoDraft
        .map(item => ({
          image_url: item.imageUrl || "",
          label_text: item.title || ""
        }))
        .filter(record => record.image_url);
    }

    function getAutoDraftJsonlText() {
      return getAutoDraftJsonlRecords()
        .map(record => JSON.stringify(record))
        .join("\n");
    }

    async function copyAutoDraftJsonl() {
      if (!autoDraft.length) {
        setStatus("还没有题单草稿。请先生成题单草稿。");
        return;
      }
      const text = getAutoDraftJsonlText();
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        fallbackCopyText(text);
      }
      announceDelight("copyDraft", autoDraft.length, false);
    }

    function exportAutoDraftJsonl() {
      if (!autoDraft.length) {
        setStatus("还没有题单草稿。请先生成题单草稿。");
        return;
      }
      const text = getAutoDraftJsonlText();
      downloadBlob(new Blob([text], { type: "application/x-ndjson" }), "fancaps-auto-question-list.jsonl");
      announceDelight("exportDraft", autoDraft.length);
    }

    async function downloadAutoDraftImages() {
      if (!autoDraft.length) {
        setStatus("还没有题单草稿。请先生成题单草稿。");
        return;
      }

      const entries = autoDraft
        .map((item, index) => ({
          item,
          index,
          url: item.imageUrl || ""
        }))
        .filter(entry => entry.url);

      if (!entries.length) {
        setStatus("草稿里没有可下载的图片地址。");
        return;
      }

      let successCount = 0;
      let failCount = 0;
      setProgress(0, true);

      for (let i = 0; i < entries.length; i++) {
        const entry = entries[i];
        const current = i + 1;
        setProgress(Math.round((i / entries.length) * 100), true);
        setStatus(`正在下载草稿图片 ${current}/${entries.length}...`);

        try {
          const blob = await fetchImageBlob(entry.url);
          const filename = makeAutoDraftImageFilename(entry.item, current, entry.url, blob);
          downloadBlob(blob, filename, "");
          successCount++;
          await sleep(280);
        } catch {
          failCount++;
        }
      }

      setProgress(100, false);

    function originalToFanCapsThumbnailUrl(url) {
      const text = String(url || "").trim();
      if (!text) return "";
      if (/^https?:\/\/ant\.fancaps\.net\/\d+\.jpg(?:[?#].*)?$/i.test(text)) return text;

      const id = getFanCapsImageIdFromUrl(text);
      if (id) return `https://ant.fancaps.net/${id}.jpg`;

      return text;
    }

    function getFanCapsImageIdFromUrl(url) {
      const text = String(url || "");
      const direct = text.match(/\/([0-9]{4,})\.jpg(?:[?#].*)?$/i);
      if (direct) return direct[1];

      const encoded = decodeURIComponentSafe(text);
      const decoded = encoded.match(/\/([0-9]{4,})\.jpg(?:[?#].*)?$/i);
      return decoded ? decoded[1] : "";
    }

    function sampleUnique(items, count) {
      const arr = [...items];
      shuffleArray(arr);
      return arr.slice(0, Math.max(0, count));
    }

    function shuffleArray(arr) {
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function randomOne(items) {
      if (!items || !items.length) return "";
      return items[Math.floor(Math.random() * items.length)];
    }

    function clampNumber(value, min, max) {
      if (!Number.isFinite(value)) return min;
      return Math.max(min, Math.min(max, value));
    }

    async function autoResolveAndSearchFanCaps(subject) {
      if (!subject) {
        setStatus("请先从搜索结果里选择一部动画。");
        return false;
      }

      const bangumiTitles = getBangumiAllTitleCandidates(subject);

      setProgress(8, true);
      setStatus("正在自动查找可用截图...");
      setAutoMatchMessage("正在查找可用截图...");

      try {
        const mapHit = await findAniDbIdFromAnimeMap(subject);

        if (mapHit && mapHit.anidbId) {
          setAutoMatchMessage("已找到可能匹配，正在读取截图...");
          setStatus("已找到可能匹配，正在读取截图...");

          const results = await searchFanCaps(String(mapHit.anidbId), {
            auto: true,
            autoLoadImages: true,
            quiet: true,
            sourceLabel: "auto-map"
          });

          if (Array.isArray(results) && results.length > 0) {
            setProgress(100, false);
            return true;
          }

          setAutoMatchMessage("还没有找到可用截图，正在尝试备用标题...");
        } else {
          setAutoMatchMessage("还没有找到可用截图，正在尝试备用标题...");
        }
      } catch (err) {
        setAutoMatchMessage("还没有找到可用截图，正在尝试备用标题...");
      }

      if (!bangumiTitles.length) {
        setProgress(0, false);
        setStatus("没有自动找到截图。请用备用标题手动搜索。");
        setAutoMatchMessage("没有自动找到截图。请选择一个备用标题继续搜索。", "empty");
        showManualTitleSearch();
        return false;
      }

      try {
        setProgress(38, true);
        setStatus("正在尝试备用标题...");
        const index = await loadAniDbTitleIndex();
        setProgress(72, true);

        const best = findBestAniDbMatchByExactTitles(bangumiTitles, index);
        renderAutoTitleExactMatchResult(best, bangumiTitles);

        if (!best) {
          setProgress(0, false);
          setStatus("没有自动找到截图。请用备用标题手动搜索。");
          setAutoMatchMessage("没有自动找到截图。请选择一个备用标题继续搜索。", "empty");
          showManualTitleSearch();
          return false;
        }

        setStatus("已找到可能匹配，正在读取截图...");
        setAutoMatchMessage("已找到可能匹配，正在读取截图...");

        const results = await searchFanCaps(String(best.aid), {
          auto: true,
          autoLoadImages: true,
          quiet: true,
          sourceLabel: "auto-title"
        });

        setProgress(100, false);

        if (Array.isArray(results) && results.length > 0) {
          return true;
        }

        setStatus("没有自动找到截图。请用备用标题手动搜索。");
        setAutoMatchMessage("没有自动找到截图。请选择一个备用标题继续搜索。", "empty");
        showManualTitleSearch();
        return false;
      } catch (err) {
        setProgress(0, false);
        setStatus("没有自动找到截图。请用备用标题手动搜索。");
        setAutoMatchMessage("没有自动找到截图。请选择一个备用标题继续搜索。", "empty");
        showManualTitleSearch();
        return false;
      }
    }

    async function loadAnimeMapIndex() {
      if (animeMapIndex) return animeMapIndex;
      if (animeMapIndexPromise) return await animeMapIndexPromise;

      animeMapIndexPromise = (async () => {
        const res = await fetch(ANIME_MAP_PATH, { method: "GET", cache: "force-cache" });
        if (!res.ok) throw new Error(`anime_map.json 请求失败：HTTP ${res.status}`);

        const text = await res.text();
        await sleep(0);

        const data = JSON.parse(text);
        await sleep(0);

        const rows = Array.isArray(data)
          ? data
          : Array.isArray(data?.items)
            ? data.items
            : Object.values(data || {});

        const byBgmId = new Map();
        for (let i = 0; i < rows.length; i++) {
          const row = rows[i];
          if (!row) continue;
          const bgmId = row.bgm_id ?? row.bangumi_id ?? row.bgmId ?? row.id;
          if (bgmId === undefined || bgmId === null || bgmId === "") continue;
          byBgmId.set(String(bgmId), row);

          if (i > 0 && i % 1000 === 0) {
            await sleep(0);
          }
        }

        animeMapIndexSource = `同目录 ${ANIME_MAP_PATH.replace(/^\.\//, "")}`;
        return {
          byBgmId,
          rowCount: rows.length
        };
      })();

      try {
        animeMapIndex = await animeMapIndexPromise;
        return animeMapIndex;
      } catch (err) {
        animeMapIndexPromise = null;
        throw err;
      }
    }

    async function findAniDbIdFromAnimeMap(subject) {
      const bgmId = String(subject?.id ?? "");
      if (!bgmId) return null;

      const index = await loadAnimeMapIndex();
      const row = index.byBgmId.get(bgmId);
      if (!row) return null;

      const anidbId = row.anidb_id ?? row.anidbId ?? row.aid ?? "";
      if (anidbId === undefined || anidbId === null || String(anidbId).trim() === "") {
        return { bgmId, row, anidbId: "" };
      }

      return {
        bgmId,
        row,
        anidbId: String(anidbId).trim()
      };
    }

    function findBestAniDbMatchByExactTitles(bangumiTitles, index) {
      const matchesByAid = new Map();

      for (let order = 0; order < bangumiTitles.length; order++) {
        const queryTitle = bangumiTitles[order];
        const key = normalizeTitleForFullMatch(queryTitle);
        if (!key) continue;

        const hits = index.titleMap.get(key) || [];
        for (const hit of hits) {
          if (!matchesByAid.has(hit.aid)) {
            matchesByAid.set(hit.aid, {
              aid: hit.aid,
              matched: [],
              queryKeys: new Set(),
              matchCount: 0,
              score: 0,
              firstOrder: order
            });
          }

          const item = matchesByAid.get(hit.aid);
          const duplicate = item.matched.some(x =>
            x.queryTitle === queryTitle &&
            x.anidbTitle === hit.title &&
            x.type === hit.type &&
            x.lang === hit.lang
          );

          if (!duplicate) {
            item.matched.push({
              queryTitle,
              anidbTitle: hit.title,
              type: hit.type,
              lang: hit.lang
            });
          }

          item.queryKeys.add(key);
          item.matchCount = item.queryKeys.size;
          item.score += scoreAniDbHit(hit, queryTitle);
          item.firstOrder = Math.min(item.firstOrder, order);
        }
      }

      const matches = [...matchesByAid.values()].sort((a, b) => {
        if (b.matchCount !== a.matchCount) return b.matchCount - a.matchCount;
        if (b.score !== a.score) return b.score - a.score;
        if (a.firstOrder !== b.firstOrder) return a.firstOrder - b.firstOrder;
        return Number(a.aid) - Number(b.aid);
      });

      return matches[0] || null;
    }

    async function fetchAniDbTitlesXmlPreferLocal() {
      const failures = [];

      try {
        return await fetchAniDbTitlesXmlFromSameDir();
      } catch (err) {
        failures.push(`同目录文件：${err.message}`);
      }

      throw new Error(
        `无法加载备用标题库。${failures.join("；")}。` +
        `请确认网站同目录存在 anime-titles.xml 或 anime-titles.xml.gz；如果默认文件不可用，请下载最新 GZ 后上传。`
      );
    }

    async function fetchAniDbTitlesXmlFromSameDir() {
      const failures = [];

      for (const path of ANIDB_LOCAL_TITLE_PATHS) {
        try {
          const res = await fetch(path, { method: "GET", cache: "force-cache" });
          if (!res.ok) {
            failures.push(`${path}: HTTP ${res.status}`);
            continue;
          }

          const buffer = await res.arrayBuffer();
          const xmlText = await decodeMaybeGzipText(buffer);
          return { xmlText, sourceLabel: `同目录 ${path.replace(/^\.\//, "")}` };
        } catch (err) {
          failures.push(`${path}: ${err.message}`);
        }
      }

      throw new Error(failures.join("；") || "未找到同目录 AniDB 文件");
    }

    async function fetchAniDbTitlesXmlViaProxy() {
      const proxy = proxyInput.value.trim();
      if (!proxy) throw new Error("没有设置连接方式。请恢复推荐连接后重试。");

      const url = proxy + encodeURIComponent(ANIDB_TITLES_URL);
      const res = await fetch(url, { method: "GET" });
      if (!res.ok) throw new Error(`备用标题库请求失败：HTTP ${res.status}`);

      const buffer = await res.arrayBuffer();
      return {
        xmlText: await decodeMaybeGzipText(buffer),
        sourceLabel: "远程备用标题库"
      };
    }

          panel.innerHTML = `<div class="empty content-spaced-xs">读取备用标题文件失败：${escapeHtml(err.message)}</div>`;
        }
        setStatus("读取备用标题文件失败。请确认文件完整后重试。详情：" + err.message);
      }
    }

    async function decodeMaybeGzipText(buffer) {
      const bytes = new Uint8Array(buffer);
      const decoded = new TextDecoder("utf-8").decode(buffer);
      if (decoded.trimStart().startsWith("<")) return decoded;

      const isGzip = bytes.length >= 2 && bytes[0] === 0x1f && bytes[1] === 0x8b;
      if (!isGzip) {
        throw new Error("返回内容不像可用的标题库文件。请检查文件或连接方式。");
      }

      if (typeof DecompressionStream === "undefined") {
        throw new Error("当前浏览器无法直接解压 .gz。请换用新版 Chrome/Edge，或上传解压后的 XML 文件。");
      }

      const stream = new Blob([buffer]).stream().pipeThrough(new DecompressionStream("gzip"));
      return await new Response(stream).text();
    }

    async function buildAniDbTitleIndex(xmlText) {
      const xml = new DOMParser().parseFromString(xmlText, "application/xml");
      const parseError = xml.querySelector("parsererror");
      if (parseError) throw new Error("备用标题库解析失败。请确认文件格式正确。");

      const titleMap = new Map();
      const aidMap = new Map();
      const animeNodes = [...xml.querySelectorAll("anime")];

      for (let i = 0; i < animeNodes.length; i++) {
        const anime = animeNodes[i];
        const aid = anime.getAttribute("aid");
        if (!aid) continue;

        const titles = [];
        for (const titleNode of [...anime.querySelectorAll("title")]) {
          const title = clean(titleNode.textContent);
          if (!title) continue;

          const type = titleNode.getAttribute("type") || "";
          const lang = titleNode.getAttribute("xml:lang") ||
            titleNode.getAttributeNS("http://www.w3.org/XML/1998/namespace", "lang") ||
            titleNode.getAttribute("lang") || "";
          const record = { aid, title, type, lang };
          titles.push(record);

          const key = normalizeTitleForFullMatch(title);
          if (!key) continue;
          if (!titleMap.has(key)) titleMap.set(key, []);
          titleMap.get(key).push(record);
        }

        if (titles.length) {
          aidMap.set(aid, { aid, titles });
        }

        if (i > 0 && i % 500 === 0) {
          await sleep(0);
        }
      }

      return {
        titleMap,
        aidMap,
        animeCount: aidMap.size,
        titleCount: [...titleMap.values()].reduce((sum, items) => sum + items.length, 0)
      };
    }

    function findAniDbMatchesByTitles(bangumiTitles, index) {
      const matchesByAid = new Map();

      for (const queryTitle of bangumiTitles) {
        const key = normalizeTitleForFullMatch(queryTitle);
        if (!key) continue;

        const hits = index.titleMap.get(key) || [];
        for (const hit of hits) {
          if (!matchesByAid.has(hit.aid)) {
            matchesByAid.set(hit.aid, {
              aid: hit.aid,
              matched: [],
              score: 0
            });
          }

          const item = matchesByAid.get(hit.aid);
          const duplicated = item.matched.some(x =>
            x.queryTitle === queryTitle && x.anidbTitle === hit.title && x.type === hit.type && x.lang === hit.lang
          );
          if (!duplicated) {
            item.matched.push({
              queryTitle,
              anidbTitle: hit.title,
              type: hit.type,
              lang: hit.lang
            });
          }
          item.score = Math.max(item.score, scoreAniDbHit(hit, queryTitle));
        }
      }

      return [...matchesByAid.values()].sort((a, b) => {
        if (b.score !== a.score) return b.score - a.score;
        return Number(a.aid) - Number(b.aid);
      });
    }

    function scoreAniDbHit(hit, queryTitle) {
      let score = 0;
      if (hit.type === "main") score += 10;
      if (hit.type === "official") score += 7;
      if (hit.type === "synonym" || hit.type === "short") score += 4;
      if (["ja", "zh-Hans", "zh-Hant", "zh", "x-jat", "en"].includes(hit.lang)) score += 2;
      if (hit.title === queryTitle) score += 3;
      return score;
    }

          setStatus(isAuto ? "还没有找到截图来源，继续尝试备用标题..." : "没有找到截图来源。可以换一个标题搜索。");

    function parseFanCapsAnimeResults(doc, baseUrl) {
      const map = new Map();
      const links = [...doc.querySelectorAll("a")];

      for (const a of links) {
        const href = a.getAttribute("href") || "";
        const lowerHref = href.toLowerCase();
        if (!lowerHref.includes("anime/showimages.php") && !lowerHref.includes("/anime/showimages.php")) continue;

        const url = toAbsoluteUrl(href, baseUrl);
        const title = clean(a.textContent) || titleFromFanCapsUrl(url) || "Anime Result";
        if (!url || !title) continue;
        if (isBadResultTitle(title)) continue;

        const previews = extractSearchResultPreviews(a, baseUrl);

        if (!map.has(url)) {
          map.set(url, {
            title,
            url,
            previews
          });
        } else {
          const item = map.get(url);
          if (title.length > item.title.length && !isBadResultTitle(title)) item.title = title;
          item.previews = unique([...item.previews, ...previews]).slice(0, 4);
        }
      }

      return [...map.values()]
        .filter(item => !isBadResultTitle(item.title))
        .map(item => ({
          ...item,
          previews: unique(item.previews).slice(0, 4)
        }));
    }

    function extractSearchResultPreviews(anchor, baseUrl) {
      const collected = [];

      // 先向上找局部结果块。限制图片数量，避免拿到整个页面的广告或导航图。
      let node = anchor.parentElement;
      for (let depth = 0; depth < 8 && node; depth++) {
        const imgs = collectImageUrlsFromRoot(node, baseUrl).filter(url => !isBadUiImage(url));
        const showLinks = [...node.querySelectorAll("a")].filter(a => {
          const href = (a.getAttribute("href") || "").toLowerCase();
          return href.includes("anime/showimages.php") || href.includes("/anime/showimages.php");
        });

        if (imgs.length >= 1 && imgs.length <= 16 && showLinks.length <= 4) {
          collected.push(...imgs);
          break;
        }

        node = node.parentElement;
      }

      // 兜底：从当前链接后面的少量相邻节点里找图，直到下一个 showimages 标题出现。
      if (!collected.length) {
        let block = anchor.closest("div,td,li,section,article,p") || anchor.parentElement;
        let next = block ? block.nextElementSibling : null;
        let guard = 0;

        while (next && guard < 8 && collected.length < 4) {
          const hasOtherShow = [...next.querySelectorAll("a")].some(a => {
            const href = (a.getAttribute("href") || "").toLowerCase();
            return href.includes("anime/showimages.php") || href.includes("/anime/showimages.php");
          });

          if (hasOtherShow && collected.length) break;

          collected.push(...collectImageUrlsFromRoot(next, baseUrl).filter(url => !isBadUiImage(url)));
          next = next.nextElementSibling;
          guard += 1;
        }
      }

      return unique(collected).slice(0, 4);
    }

    function collectImageUrlsFromRoot(root, baseUrl) {
      const urls = [];

      for (const img of [...root.querySelectorAll("img")]) {
        const src =
          img.getAttribute("data-src") ||
          img.getAttribute("data-original") ||
          img.getAttribute("data-lazy-src") ||
          img.getAttribute("src") ||
          "";

        if (!src) continue;
        const url = toAbsoluteUrl(src, baseUrl);
        if (!looksLikeFanCapsImage(url)) continue;
        urls.push(url);
      }

      return unique(urls);
    }

    async function collectEpisodeTopImages(pageUrl) {
      const allGroups = [];
      const visitedPages = new Set();
      let currentUrl = pageUrl;
      let pageIndex = 1;

      while (currentUrl && !visitedPages.has(currentUrl) && pageIndex <= MAX_SHOW_PAGES) {
        visitedPages.add(currentUrl);
        setStatus(`正在读取第 ${pageIndex} 页截图，已找到 ${allGroups.length} 个分组...`);

        const html = await fetchViaProxy(currentUrl);
        const doc = parseHtml(html);

        const isEpisodeOrMovieImagePage =
          currentUrl.includes("episodeimages.php") ||
          currentUrl.includes("MovieImages.php") ||
          currentUrl.includes("movieimages.php");

        if (isEpisodeOrMovieImagePage) {
          const group = parseSingleEpisodeTopImages(doc, currentUrl, "Current Page", 1);
          return group.images.length ? [group] : [];
        }

        const pageGroups = parseShowPageEpisodeTopImagesSequential(doc, currentUrl, allGroups.length);
        allGroups.push(...pageGroups);

        const nextPageUrl = findNextShowImagesPageUrl(doc, currentUrl);
        if (!nextPageUrl || visitedPages.has(nextPageUrl)) break;

        currentUrl = nextPageUrl;
        pageIndex += 1;
        setProgress(Math.min(95, pageIndex * 8), true);
        await sleep(300);
      }

      if (allGroups.length) return allGroups;

      const html = await fetchViaProxy(pageUrl);
      const doc = parseHtml(html);
      const group = parseSingleEpisodeTopImages(doc, pageUrl, "Current Page", 1);
      return group.images.length ? [group] : [];
    }

    function parseShowPageEpisodeTopImagesSequential(doc, baseUrl, startIndex = 0) {
      const links = [...doc.querySelectorAll("a")];
      const groups = [];
      const seenEpisodeUrls = new Set();
      let currentGroup = null;

      function flushCurrentGroup() {
        if (!currentGroup) return;

        currentGroup.images = dedupeImageCandidates(currentGroup.images)
          .filter(item => !isBadUiImage(item.thumbUrl))
          .slice(0, TOP_IMAGES_PER_EPISODE);

        if (currentGroup.images.length) {
          currentGroup.index = startIndex + groups.length + 1;
          groups.push(currentGroup);
        }

        currentGroup = null;
      }

      for (const a of links) {
        const href = a.getAttribute("href") || "";
        const text = clean(a.textContent);
        const lowerHref = href.toLowerCase();

        if (isShowPageStopLinkOrSection(a)) break;

        const isEpisodeLink =
          lowerHref.includes("episodeimages.php") ||
          lowerHref.includes("movieimages.php");

        if (isEpisodeLink) {
          const episodeUrl = toAbsoluteUrl(href, baseUrl);
          if (!episodeUrl || episodeUrl.toLowerCase().includes("search.php")) continue;

          if (currentGroup && currentGroup.url === episodeUrl) continue;
          if (seenEpisodeUrls.has(episodeUrl)) continue;

          flushCurrentGroup();

          seenEpisodeUrls.add(episodeUrl);
          currentGroup = {
            title: normalizeEpisodeTitle(text, episodeUrl),
            url: episodeUrl,
            index: 0,
            images: []
          };

          continue;
        }

        if (!currentGroup) continue;
        if (currentGroup.images.length >= TOP_IMAGES_PER_EPISODE) continue;

        const imageItem = parseImageCandidateFromAnchor(a, baseUrl);
        if (!imageItem) continue;

        imageItem.sourcePage = baseUrl;
        imageItem.episodePageUrl = currentGroup.url;
        currentGroup.images.push(imageItem);
      }

      flushCurrentGroup();
      return groups;
    }

    function parseImageCandidateFromAnchor(a, baseUrl) {
      const href = a.getAttribute("href") || "";
      const img = a.querySelector("img");
      if (!img) return null;

      const src =
        img.getAttribute("data-src") ||
        img.getAttribute("data-original") ||
        img.getAttribute("data-lazy-src") ||
        img.getAttribute("src") ||
        "";

      if (!src) return null;

      const thumbUrl = toAbsoluteUrl(src, baseUrl);
      if (!looksLikeFanCapsImage(thumbUrl)) return null;
      if (isBadUiImage(thumbUrl)) return null;

      const picturePageUrl = href.toLowerCase().includes("picture.php")
        ? toAbsoluteUrl(href, baseUrl)
        : "";

      return {
        id: "",
        episodeTitle: "",
        thumbUrl,
        picturePageUrl,
        originalUrl: "",
        sourcePage: baseUrl
      };
    }

    function findNextShowImagesPageUrl(doc, baseUrl) {
      const links = [...doc.querySelectorAll("a")];

      for (const a of links) {
        const text = clean(a.textContent).toLowerCase();
        const href = a.getAttribute("href") || "";
        const lowerHref = href.toLowerCase();
        if (!href) continue;

        const isNextText = text === "next >" || text === "next" || text.includes("next");
        if (!isNextText) continue;

        if ((lowerHref.includes("showimages.php") || lowerHref.includes("movieimages.php")) && !lowerHref.includes("episodeimages.php")) {
          return toAbsoluteUrl(href, baseUrl);
        }
      }

      return "";
    }

    function isShowPageStopLinkOrSection(a) {
      const text = clean(a.textContent).toLowerCase();
      if (!text) return false;

      return (
        text.includes("more popular images") ||
        text.includes("banning media") ||
        text.includes("privacy policy") ||
        text.includes("support us") ||
        text.includes("advertising")
      );
    }

    function normalizeEpisodeTitle(text, url) {
      let title = clean(text);
      const decoded = decodeURIComponentSafe(url);

      if (!title || title.length < 2 || /see more|images|view/i.test(title)) {
        const m1 = decoded.match(/Episode[_\s-]*(\d+)/i);
        if (m1) title = `Episode ${m1[1]}`;
      }

      if (!title) title = "Episode";
      return title;
    }

    function parseSingleEpisodeTopImages(doc, pageUrl, episodeTitle, episodeIndex) {
      const images = parseImageCandidatesFromRoot(doc.body || doc, pageUrl)
        .filter(item => !isBadUiImage(item.thumbUrl))
        .slice(0, TOP_IMAGES_PER_EPISODE);

      return {
        title: episodeTitle,
        url: pageUrl,
        index: episodeIndex,
        images
      };
    }

    function parseImageCandidatesFromRoot(root, baseUrl) {
      const images = [];

      for (const a of [...root.querySelectorAll("a")]) {
        const item = parseImageCandidateFromAnchor(a, baseUrl);
        if (item) images.push(item);
      }

      return dedupeImageCandidates(images);
    }

    async function toggleImageById(id, checked) {
      const item = imageItemsById.get(id);
      if (!item) return;

      const card = document.getElementById(`card_${id}`);

      if (!checked) {
        selectedImages.delete(id);
        updateImageState(id, "未选择");
        if (card) card.classList.remove("selected");
        updateSelectedCount();
        renderSelectedBasket();
        return;
      }

      selectedImages.set(id, item);
      if (card) card.classList.add("selected");
      updateSelectedCount();
      renderSelectedBasket();
      playPickedFeedback(id);

      if (item.originalUrl) {
        updateImageState(id, "已选择");
        return;
      }

      updateImageState(id, "解析中");

      try {
        item.originalUrl = await resolveOriginalImageUrl(item);
        selectedImages.set(id, item);
        updateImageState(id, "已选择");
        renderSelectedBasket();
      } catch (err) {
        item.originalUrl = upgradeFanCapsThumbUrl(item.thumbUrl) || item.thumbUrl;
        selectedImages.set(id, item);
        updateImageState(id, "已选择");
        renderSelectedBasket();
      }

      updateSelectedCount();
    }

    async function resolveOriginalImageUrl(item) {
      if (item.picturePageUrl) {
        const html = await fetchViaProxy(item.picturePageUrl);
        const doc = parseHtml(html);

        const fromMeta = parseOriginalFromPicturePageMeta(doc, item.picturePageUrl);
        if (fromMeta) return fromMeta;

        const fromImgs = parseOriginalFromPicturePageImages(doc, item.picturePageUrl, item.thumbUrl);
        if (fromImgs) return fromImgs;

        const fromLinks = parseOriginalFromPicturePageLinks(doc, item.picturePageUrl, item.thumbUrl);
        if (fromLinks) return fromLinks;
      }

      return upgradeFanCapsThumbUrl(item.thumbUrl) || item.thumbUrl;
    }

    function parseOriginalFromPicturePageMeta(doc, baseUrl) {
      const metaSelectors = [
        'meta[property="og:image"]',
        'meta[name="twitter:image"]',
        'link[rel="image_src"]'
      ];

      for (const selector of metaSelectors) {
        const el = doc.querySelector(selector);
        if (!el) continue;

        const raw = el.getAttribute("content") || el.getAttribute("href") || "";
        if (!raw) continue;

        const url = toAbsoluteUrl(raw, baseUrl);
        if (looksLikeFanCapsImage(url)) return url;
      }

      return "";
    }

    function parseOriginalFromPicturePageImages(doc, baseUrl, thumbUrl) {
      const candidates = [];

      for (const img of [...doc.querySelectorAll("img")]) {
        const src =
          img.getAttribute("data-src") ||
          img.getAttribute("data-original") ||
          img.getAttribute("data-lazy-src") ||
          img.getAttribute("src") ||
          "";

        if (!src) continue;
        const url = toAbsoluteUrl(src, baseUrl);
        if (!looksLikeFanCapsImage(url)) continue;
        if (isBadUiImage(url)) continue;
        candidates.push(url);
      }

      return pickBestOriginalCandidate(candidates, thumbUrl);
    }

    function parseOriginalFromPicturePageLinks(doc, baseUrl, thumbUrl) {
      const candidates = [];

      for (const a of [...doc.querySelectorAll("a")]) {
        const href = a.getAttribute("href") || "";
        if (!href) continue;
        const url = toAbsoluteUrl(href, baseUrl);
        if (!looksLikeFanCapsImage(url)) continue;
        if (isBadUiImage(url)) continue;
        candidates.push(url);
      }

      return pickBestOriginalCandidate(candidates, thumbUrl);
    }

    function pickBestOriginalCandidate(candidates, thumbUrl) {
      const uniqueCandidates = unique(candidates);
      if (!uniqueCandidates.length) return "";

      const nonThumb = uniqueCandidates.find(url => !isLikelyThumbnailUrl(url));
      if (nonThumb) return nonThumb;

      const different = uniqueCandidates.find(url => url !== thumbUrl);
      if (different) return different;

      return uniqueCandidates[0];
    }

    function isLikelyThumbnailUrl(url) {
      const u = String(url).toLowerCase();
      return (
        u.includes("/thumb") ||
        u.includes("thumb_") ||
        u.includes("_thumb") ||
        u.includes("small") ||
        u.includes("thumbnail") ||
        u.includes("/mini")
      );
    }

    function upgradeFanCapsThumbUrl(url) {
      if (!url) return "";
      let u = String(url);
      const replacements = [
        ["/thumbs/", "/"],
        ["/thumb/", "/"],
        ["/thumbnail/", "/"],
        ["/thumbnails/", "/"],
        ["_thumb.", "."],
        ["-thumb.", "."],
        ["_small.", "."],
        ["-small.", "."],
        ["_mini.", "."],
        ["-mini.", "."]
      ];

      for (const [from, to] of replacements) {
        if (u.includes(from)) return u.replace(from, to);
      }

      return u;
    }

    function updateImageState(id, text) {
      const el = document.getElementById(`state_${id}`);

    function updateSelectedCount() {
      const nextCount = selectedImages.size;
      for (const el of [...document.querySelectorAll(".selectedCount")]) {

      if (basketCount) basketCount.textContent = nextCount;
      const floatCount = document.getElementById("floatSelectedCount");
      if (floatCount) floatCount.textContent = nextCount;

      lastSelectedCount = nextCount;

    function updateAutoActionButtons() {
      for (const button of [...document.querySelectorAll("[data-auto-add-selected]")]) {
        button.disabled = !autoDraft.length;

    async function toggleEpisodeDetail(detailId, episodeUrl, episodeTitle, labelText = "") {
      const container = document.getElementById(detailId);
      const button = document.getElementById(`btn_${detailId}`);
      if (!container) return;

      if (container.dataset.open === "1") {
        hideEpisodeDetail(detailId);
        return;
      }

      container.style.display = "block";
      container.dataset.open = "1";
      revealElement(container);
      if (button) button.textContent = "收起本集截图";

      if (!episodeDetailStates.has(detailId)) {
        const pageUrl = buildEpisodeDetailPageUrl(episodeUrl, 1);
        episodeDetailStates.set(detailId, {
          detailId,
          episodeTitle,
          labelText: labelText || currentLoadedAnimeLabel || getAnimationLabelText(""),
          baseEpisodeUrl: stripFanCapsPageParam(episodeUrl),
          currentPage: 1,
          totalPages: null,
          knownPages: new Set([1]),
          pageUrls: new Map([[1, pageUrl]]),
          pageCache: new Map(),
          loadingPage: null,
          error: ""
        });
      }

      scrollToElement(container, { block: "start" });
      await goEpisodeDetailPage(detailId, 1);
    }

    function hideEpisodeDetail(detailId) {
      const container = document.getElementById(detailId);
      const button = document.getElementById(`btn_${detailId}`);
      if (!container) return;
      container.style.display = "none";
      container.dataset.open = "0";
      if (button) button.textContent = "查看更多本集截图";
    }

    async function goEpisodeDetailPage(detailId, pageNum) {
      const state = episodeDetailStates.get(detailId);
      const container = document.getElementById(detailId);
      if (!state || !container) return;

      pageNum = Math.max(1, Number(pageNum) || 1);
      state.currentPage = pageNum;
      state.error = "";

      if (state.pageCache.has(pageNum)) {
        episodeDetailStates.set(detailId, state);
        renderEpisodeDetail(detailId);
        scrollToElement(container, { block: "start" });
        return;
      }

      state.loadingPage = pageNum;
      episodeDetailStates.set(detailId, state);
      renderEpisodeDetail(detailId, `正在读取第 ${pageNum} 页截图...`);

      try {
        const pageUrl = state.pageUrls.get(pageNum) || buildEpisodeDetailPageUrl(state.baseEpisodeUrl, pageNum);
        const html = await fetchViaProxy(pageUrl);
        const doc = parseHtml(html);
        const images = parseDetailedEpisodeImages(doc, pageUrl, state.episodeTitle);

        for (let i = 0; i < images.length; i++) {
          const item = images[i];
          const id = makeImageId(item, "detail");
          item.id = id;
          item.episodeTitle = state.episodeTitle;
          item.labelText = state.labelText || currentLoadedAnimeLabel || getAnimationLabelText("");
          item.kind = "detail";
          item.pageNumber = pageNum;
          const existing = selectedImages.get(id);
          if (existing) {
            if (existing.originalUrl) item.originalUrl = existing.originalUrl;
            if (existing.labelText) item.labelText = existing.labelText;
          }
          imageItemsById.set(id, item);
        }

        const pagination = parseEpisodePagination(doc, pageUrl, state.baseEpisodeUrl);
        for (const [num, url] of pagination.pageUrls.entries()) {
          state.knownPages.add(num);
          state.pageUrls.set(num, url);
        }

        if (pagination.totalPages) {
          state.totalPages = Math.max(state.totalPages || 1, pagination.totalPages);
          for (let n = 1; n <= state.totalPages; n++) {
            state.knownPages.add(n);
            if (!state.pageUrls.has(n)) {
              state.pageUrls.set(n, buildEpisodeDetailPageUrl(state.baseEpisodeUrl, n));
            }
          }
        } else {
          state.knownPages.add(pageNum);
          state.pageUrls.set(pageNum, pageUrl);
        }

        state.pageCache.set(pageNum, {
          index: pageNum,
          url: pageUrl,
          images
        });
        state.loadingPage = null;
        state.error = "";
        episodeDetailStates.set(detailId, state);
        renderEpisodeDetail(detailId);
        scrollToElement(container, { block: "start" });
      } catch (err) {
        state.loadingPage = null;
        state.error = err.message;
        episodeDetailStates.set(detailId, state);
        renderEpisodeDetail(detailId, `读取失败。请稍后重试，或打开原页面查看。详情：${err.message}`);
      }
    }

    function renderEpisodeDetail(detailId, message = "") {
      const state = episodeDetailStates.get(detailId);
      const container = document.getElementById(detailId);
      if (!state || !container) return;

      const current = state.pageCache.get(state.currentPage);
      const currentCount = current ? current.images.length : 0;
      const pageButtons = renderEpisodePageButtons(state);

      container.innerHTML = `
        <div class="episode-detail-head">
          <div>
            <b>${escapeHtml(state.episodeTitle)} 详细截图</b>
            <span class="sub">当前第 ${state.currentPage} 页${current ? ` / ${currentCount} 张` : ""}</span>
          </div>
          <button onclick="hideEpisodeDetail('${escapeJsString(detailId)}')">收起</button>
        </div>

        ${pageButtons}
        ${message ? `<div class="sub sub-spaced">${escapeHtml(message)}</div>` : ""}

        ${
          current
            ? renderEpisodeDetailPage(current)
            : `<div class="empty">${state.loadingPage ? "正在加载本页截图..." : "还没有加载到截图。"}</div>`
        }

        <div class="episode-detail-bottom">

    function renderEpisodePageButtons(state) {
      const pages = getEpisodePageList(state);
      if (!pages.length) return "";

      return `
        <div class="page-selector">
          <span class="sub">页数：</span>
          ${pages.map(num => `
            <button
              class="page-btn light ${num === state.currentPage ? "active" : ""}"
              onclick="goEpisodeDetailPage('${escapeJsString(state.detailId)}', ${num})"
              ${state.loadingPage ? "disabled" : ""}
            >${num}</button>
          `).join("")}
        </div>
      `;
    }

    function getEpisodePageList(state) {
      if (state.totalPages && state.totalPages > 0) {
        return Array.from({ length: state.totalPages }, (_, i) => i + 1);
      }

      const known = [...state.knownPages].filter(n => Number.isFinite(n) && n > 0);
      if (!known.includes(1)) known.push(1);
      return known.sort((a, b) => a - b);
    }

    function renderEpisodeDetailPage(page) {
      return `
        <div class="episode-detail-page">
          <div class="sub sub-spaced">第 ${page.index} 页 · ${page.images.length} 张</div>
          <div class="image-grid">
            ${
              page.images.length
                ? page.images.map(item => renderEpisodeImageCard(item)).join("")
                : `<div class="empty">本页没有读取到截图。可以换一页或稍后重试。</div>`
            }
          </div>
        </div>
      `;
    }

    function parseDetailedEpisodeImages(doc, pageUrl, episodeTitle) {
      const images = [];
      let collecting = false;

      const walker = document.createTreeWalker(doc.body || doc, NodeFilter.SHOW_ELEMENT);
      let node;

      while ((node = walker.nextNode())) {
        const tag = (node.tagName || "").toLowerCase();
        const text = clean(node.textContent).toLowerCase();

        if (/^h[1-4]$/.test(tag) && text.includes("episode screencaps")) {
          collecting = true;
          continue;
        }

        if (collecting) {
          const shouldStop =
            (tag === "a" && text.includes("next episode")) ||
            (/^h[1-4]$/.test(tag) && (
              text.includes("more popular images") ||
              text === "ad" ||
              text.includes("top images")
            ));

          if (shouldStop) break;

          if (tag === "a") {
            const href = (node.getAttribute("href") || "").toLowerCase();
            if (!href.includes("picture.php")) continue;

            const item = parseImageCandidateFromAnchor(node, pageUrl);
            if (!item) continue;

            item.sourcePage = pageUrl;
            item.episodePageUrl = pageUrl;
            item.episodeTitle = episodeTitle;
            images.push(item);
          }
        }
      }

      // 兜底：如果页面结构变化导致没命中 Episode Screencaps，就退回到旧解析，
      // 但跳过前 4 张 Top Images，避免每页重复显示同一组 Top 图。
      if (!images.length) {
        const all = [];
        for (const a of [...doc.querySelectorAll("a")]) {
          const href = (a.getAttribute("href") || "").toLowerCase();
          if (!href.includes("picture.php")) continue;
          const item = parseImageCandidateFromAnchor(a, pageUrl);
          if (!item) continue;
          item.sourcePage = pageUrl;
          item.episodePageUrl = pageUrl;
          item.episodeTitle = episodeTitle;
          all.push(item);
        }
        return dedupeImageCandidates(all)
          .filter(item => !isBadUiImage(item.thumbUrl))
          .slice(TOP_IMAGES_PER_EPISODE);
      }

      return dedupeImageCandidates(images).filter(item => !isBadUiImage(item.thumbUrl));
    }

    function parseEpisodePagination(doc, pageUrl, baseEpisodeUrl) {
      const pageUrls = new Map();
      const currentPage = getFanCapsPageNumber(pageUrl);
      pageUrls.set(1, buildEpisodeDetailPageUrl(baseEpisodeUrl, 1));
      pageUrls.set(currentPage, pageUrl);

      for (const a of [...doc.querySelectorAll("a")]) {
        const text = clean(a.textContent);
        const href = a.getAttribute("href") || "";
        const lowerHref = href.toLowerCase();

        if (!/^\d+$/.test(text)) continue;
        if (!lowerHref.includes("episodeimages.php") && !lowerHref.includes("movieimages.php")) continue;

        const num = Number(text);
        if (!Number.isFinite(num) || num < 1) continue;

        pageUrls.set(num, normalizeFanCapsPageUrl(toAbsoluteUrl(href, pageUrl)));
      }

      // FanCaps 的当前页通常是纯文本，不是链接；从 URL 补进去。
      pageUrls.set(currentPage, buildEpisodeDetailPageUrl(baseEpisodeUrl, currentPage));

      const totalPages = pageUrls.size ? Math.max(...pageUrls.keys()) : currentPage;

      return {
        pageUrls,
        totalPages
      };
    }

    function buildEpisodeDetailPageUrl(baseEpisodeUrl, pageNum) {
      const cleaned = stripFanCapsPageParam(baseEpisodeUrl);
      if (pageNum <= 1) return cleaned;

      try {
        const u = new URL(cleaned);
        u.searchParams.set("page", String(pageNum));
        return u.toString();
      } catch {
        const joiner = cleaned.includes("?") ? "&" : "?";
        return `${cleaned}${joiner}page=${pageNum}`;
      }
    }

    function stripFanCapsPageParam(url) {
      try {
        const u = new URL(url);
        u.searchParams.delete("page");
        return u.toString();
      } catch {
        return String(url).replace(/([?&])page=\d+/i, "").replace(/[?&]$/, "");
      }
    }

    function normalizeFanCapsPageUrl(url) {
      const page = getFanCapsPageNumber(url);
      return buildEpisodeDetailPageUrl(url, page);
    }

    function getFanCapsPageNumber(url) {
      try {
        const u = new URL(url);
        const page = Number(u.searchParams.get("page") || "1");
        return Number.isFinite(page) && page > 0 ? page : 1;
      } catch {
        const m = String(url).match(/[?&]page=(\d+)/i);
        return m ? Number(m[1]) : 1;
      }
    }


    function getAnimationLabelText(fallbackTitle = "") {
      return clean(
        currentSubject?.name_cn ||
        currentSubject?.name ||
        fallbackTitle ||
        currentLoadedAnimeLabel ||
        ""
      );
    }

    function makeImageId(item, prefix = "img") {
      const key = item.picturePageUrl || item.originalUrl || item.thumbUrl || `${prefix}_${Math.random()}`;
      return `${prefix}_${hashString(key)}`;
    }

    function hashString(str) {
      let h = 2166136261;
      const s = String(str);
      for (let i = 0; i < s.length; i++) {
        h ^= s.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      return (h >>> 0).toString(36);
    }

    function renderSelectedBasket() {

        selectedBasketEl.innerHTML = "";
        updateFloatingNavVisibility();
        updateSelectedCount();
        return;
      }

      const quality = getSelectedQuality(items);
      const hasWarnings = quality.duplicateCount;

      selectedBasketEl.innerHTML = `
        <div class="panel basket-panel">

              <div class="basket-quality" aria-label="题单质量检查">
                <span class="quality-pill">题数：${items.length}</span>
                <span class="quality-pill ${quality.duplicateCount ? "warning" : ""}">重复动画：${quality.duplicateCount}</span>
                <span class="quality-pill ${hasWarnings ? "warning" : "success"}">${hasWarnings ? "导出前建议复查" : "可导出"}</span>
              </div>
            </div>
            <div class="toolbar">

              <button onclick="exportJsonl()" ${items.length ? "" : "disabled"}>导出题单</button>
              <button onclick="downloadSelectedImages()" ${items.length ? "" : "disabled"}>下载图片</button>
              <button onclick="clearSelectedImages()" ${items.length ? "" : "disabled"}>清空已选</button>
              <button class="quiet" onclick="scrollToTopSearch()">继续搜索</button>
              <span class="pill">已选：<span id="basketCount" class="selectedCount">${items.length}</span></span>
            </div>
          </div>

          ${
            items.length
              ? `<div class="basket-grid">${items.map(({ id, item }) => renderBasketCard(id, item)).join("")}</div>`
              : `<div class="basket-empty-simple">还没有选择截图</div>`
          }

    function updateFloatingNavVisibility() {
      if (!floatingNavEl) return;
      if (!selectedImages.size) {
        floatingNavEl.style.display = "none";
        return;
      }
      floatingNavEl.style.display = "flex";
    }

    function isBasketInView() {
      if (!selectedBasketEl || !selectedBasketEl.innerHTML.trim()) return false;
      const rect = selectedBasketEl.getBoundingClientRect();
      const viewportHeight = window.innerHeight || document.documentElement.clientHeight || 0;
      return rect.top < viewportHeight - 120 && rect.bottom > 120;
    }

    function getSelectedQuality(items) {
      const labelCounts = new Map();

      for (const { item } of items) {
        const label = clean(item.labelText || "未命名动画");
        labelCounts.set(label, (labelCounts.get(label) || 0) + 1);
      }

      let duplicateCount = 0;
      for (const count of labelCounts.values()) {
        if (count > 1) duplicateCount += count - 1;
      }

      return { duplicateCount };
    }

          <div class="sub">${escapeHtml(label)}</div>

    async function copySelectedJsonl() {
      if (!selectedImages.size) {
        setStatus("还没有选择截图。请先勾选想加入题单的截图。");
        return;
      }

      await resolveAllSelectedOriginals();
      const text = getSelectedJsonlText();

      try {
        await navigator.clipboard.writeText(text);
      } catch {
        fallbackCopyText(text);
      }
      announceDelight("copySelected", selectedImages.size, false);
    }

    function getSelectedJsonlText() {
      return getSelectedJsonlRecords()
        .map(record => JSON.stringify(record))
        .join("\n");
    }

    function getSelectedJsonlRecords() {
      return [...selectedImages.values()]
        .map(item => ({
          image_url: item.originalUrl || item.thumbUrl || "",
          label_text: item.labelText || getAnimationLabelText("") || ""
        }))
        .filter(record => record.image_url);
    }

    function fallbackCopyText(text) {
      const textarea = document.createElement("textarea");
      textarea.value = text;
      textarea.setAttribute("readonly", "");
      textarea.style.position = "fixed";
      textarea.style.left = "-9999px";
      document.body.appendChild(textarea);
      textarea.select();
      document.execCommand("copy");
      textarea.remove();
    }

    function cssEscape(value) {
      if (window.CSS && typeof window.CSS.escape === "function") {
        return window.CSS.escape(value);
      }
      return String(value).replace(/(["\\])/g, "\\$1");
    }

    async function selectAllImages() {
      const checks = [...document.querySelectorAll(".imageCheck")];

      for (const input of checks) {
        if (!input.checked) {
          input.checked = true;
          await toggleImageById(input.value, true);
          await sleep(100);
        }
      }
    }

    function clearSelectedImages() {
      if (selectedImages.size && !window.confirm(`清空 ${selectedImages.size} 张已选截图？此操作不能撤销。`)) {
        setStatus("已取消清空。");
        return;
      }

      selectedImages.clear();
      document.querySelectorAll(".imageCheck").forEach(input => { input.checked = false; });

      for (const id of imageItemsById.keys()) {
        updateImageState(id, "未选择");
        const card = document.getElementById(`card_${id}`);
        if (card) card.classList.remove("selected");
      }

      updateSelectedCount();
      renderSelectedBasket();
      setStatus("已清空已选截图。");
    }

    async function exportJsonl() {
      if (!selectedImages.size) {
        setStatus("还没有选择截图。请先勾选想加入题单的截图。");
        return;
      }

      await resolveAllSelectedOriginals();
      const text = getSelectedJsonlText();
      downloadBlob(new Blob([text], { type: "application/x-ndjson" }), "fancaps-selected-images.jsonl");
      announceDelight("exportSelected", selectedImages.size);
    }

    async function downloadSelectedImages() {
      if (!selectedImages.size) {
        setStatus("还没有选择截图。请先勾选想下载的截图。");
        return;
      }

      await resolveAllSelectedOriginals();

      const entries = [...selectedImages.entries()]
        .map(([id, item]) => ({
          id,
          item,
          url: item.originalUrl || item.thumbUrl || ""
        }))
        .filter(entry => entry.url);

      if (!entries.length) {
        setStatus("没有找到可下载的图片地址。");
        return;
      }

      let successCount = 0;
      let failCount = 0;
      setProgress(0, true);

      for (let i = 0; i < entries.length; i++) {
        const entry = entries[i];
        const current = i + 1;
        setProgress(Math.round((i / entries.length) * 100), true);
        setStatus(`正在下载图片 ${current}/${entries.length}...`);

        try {
          const blob = await fetchImageBlob(entry.url);
          const filename = makeSelectedImageFilename(entry.item, current, entry.url, blob);
          downloadBlob(blob, filename, "");
          successCount++;
          await sleep(280);
        } catch (err) {
          failCount++;
          updateImageState(entry.id, "下载失败");
        }
      }

      setProgress(100, false);

      if (successCount && !failCount) {
        announceDelight("downloadSelectedImages", successCount);
        return;
      }

      if (successCount) {
        const text = `已开始下载 ${successCount} 张图片，${failCount} 张失败。`;
        setStatus(text);
        showDelightToast(text);
        return;
      }

      setStatus("图片下载失败。请检查连接方式后重试。");
    }

    async function exportJson() {
      if (!selectedImages.size) {
        setStatus("还没有选择截图。请先勾选想加入题单的截图。");
        return;
      }

      await resolveAllSelectedOriginals();
      const data = getSelectedJsonlRecords();

      downloadBlob(
        new Blob([data.map(record => JSON.stringify(record)).join("\n")], { type: "application/x-ndjson" }),
        "fancaps-selected-images.jsonl"
      );
      announceDelight("exportSelected", selectedImages.size);
    }

    async function resolveAllSelectedOriginals() {
      const entries = [...selectedImages.entries()];
      setProgress(0, true);

      for (let i = 0; i < entries.length; i++) {
        const [id, item] = entries[i];
        setProgress(Math.round((i / entries.length) * 100), true);

        if (!item.originalUrl) {
          updateImageState(id, "解析中");
          try {
            item.originalUrl = await resolveOriginalImageUrl(item);
          } catch {
            item.originalUrl = upgradeFanCapsThumbUrl(item.thumbUrl) || item.thumbUrl;
          }
          selectedImages.set(id, item);
          updateImageState(id, "已选择");
          await sleep(100);
        }
      }

      setProgress(100, false);
      renderSelectedBasket();
    }

    async function fetchImageBlob(targetUrl) {
      const proxy = proxyInput.value.trim();
      let proxyError = null;

      if (proxy) {
        try {
          const proxied = proxy + encodeURIComponent(targetUrl);
          const res = await fetch(proxied, { method: "GET" });
          if (!res.ok) throw new Error(`图片下载失败：HTTP ${res.status}`);
          return await res.blob();
        } catch (err) {
          proxyError = err;
        }
      }

      try {
        const res = await fetch(targetUrl, { method: "GET", mode: "cors", referrerPolicy: "no-referrer" });
        if (!res.ok) throw new Error(`图片下载失败：HTTP ${res.status}`);
        return await res.blob();
      } catch (err) {
        throw proxyError || err;
      }
    }

    function makeSelectedImageFilename(item, index, url, blob) {
      const padded = String(index).padStart(3, "0");
      const key = url || item.originalUrl || item.thumbUrl || padded;
      const ext = getImageExtension(key, blob?.type);
      return `fancaps-selected-${padded}-${hashString(key)}.${ext}`;
    }

    function makeAutoDraftImageFilename(item, index, url, blob) {
      const padded = String(index).padStart(3, "0");
      const key = url || item.imageUrl || padded;
      const ext = getImageExtension(key, blob?.type);
      return `fancaps-draft-${padded}-${hashString(key)}.${ext}`;
    }

    function getImageExtension(url, contentType = "") {
      const type = String(contentType || "").split(";")[0].trim().toLowerCase();
      const byType = {
        "image/jpeg": "jpg",
        "image/jpg": "jpg",
        "image/png": "png",
        "image/webp": "webp",
        "image/gif": "gif",
        "image/avif": "avif"
      };
      if (byType[type]) return byType[type];

      try {
        const pathname = new URL(url).pathname;
        const match = pathname.match(/\.([a-z0-9]{2,5})$/i);
        const ext = match ? match[1].toLowerCase() : "";
        if (["jpg", "jpeg", "png", "webp", "gif", "avif"].includes(ext)) {
          return ext === "jpeg" ? "jpg" : ext;
        }
      } catch {}

      return "jpg";
    }

    function downloadBlob(blob, filename, statusText = `已导出题单：${filename}`) {
      const a = document.createElement("a");
      const url = URL.createObjectURL(blob);
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      window.setTimeout(() => URL.revokeObjectURL(url), 1000);
      if (statusText) setStatus(statusText);
    }

    function announceDelight(type, count, burst = true) {
      const text = getDelightMessage(type, count);
      setStatus(text);
      showDelightToast(text);
      if (burst) launchPaperBurst();
    }

    function getDelightMessage(type, count) {
      const safeCount = Number(count || 0);
      const messages = {
        copyDraft: [
          `已复制 ${safeCount} 条草稿题单，可以先贴到游戏里试跑。`,
          `草稿已复制，${safeCount} 题待你最后定稿。`
        ],
        exportDraft: [
          `已导出 ${safeCount} 条草稿题单。`,
          `草稿题单已落盘，${safeCount} 题可以继续复查。`
        ],
        downloadDraftImages: [
          `已开始下载 ${safeCount} 张草稿图片。`,
          `草稿图片下载已开始，${safeCount} 张已排进浏览器下载。`
        ],
        copySelected: [
          `已复制 ${safeCount} 条题单数据，可以直接粘贴使用。`,
          `题单已复制，${safeCount} 张截图准备就绪。`
        ],
        exportSelected: [
          `已导出 ${safeCount} 题，截图题单装好了。`,
          `题单已导出，${safeCount} 张截图可以开局。`
        ],
        downloadSelectedImages: [
          `已开始下载 ${safeCount} 张图片。`,
          `图片下载已开始，${safeCount} 张已排进浏览器下载。`
        ],
        addDraft: [
          `已把 ${safeCount} 张草稿截图放入已选，导出前再扫一眼。`,
          `草稿已进入已选，${safeCount} 张截图等你定稿。`
        ]
      };
      return pickOne(messages[type] || [`已完成 ${safeCount} 项。`]);
    }

    function showDelightToast(text) {
      if (!text) return;
      let stack = document.querySelector(".delight-toast-stack");
      if (!stack) {
        stack = document.createElement("div");
        stack.className = "delight-toast-stack";
        stack.setAttribute("aria-live", "polite");
        stack.setAttribute("aria-atomic", "false");
        document.body.appendChild(stack);
      }

      const toast = document.createElement("div");
      toast.className = "delight-toast";
      toast.setAttribute("role", "status");
      toast.textContent = text;
      stack.appendChild(toast);
      window.setTimeout(() => toast.remove(), 2800);
    }

    function launchPaperBurst() {
      if (prefersReducedMotion()) return;
      const burst = document.createElement("div");
      burst.className = "paper-burst";
      const originX = Math.min(window.innerWidth - 42, Math.max(42, window.innerWidth - 146));
      const originY = Math.min(window.innerHeight - 90, Math.max(72, window.innerHeight - 160));

      for (let i = 0; i < 12; i++) {
        const piece = document.createElement("span");
        piece.style.setProperty("--burst-x", `${originX}px`);
        piece.style.setProperty("--burst-y", `${originY}px`);
        piece.style.setProperty("--burst-tx", `${Math.round((Math.random() - 0.5) * 180)}px`);
        piece.style.setProperty("--burst-ty", `${Math.round(42 + Math.random() * 92)}px`);
        piece.style.setProperty("--burst-rot", `${Math.round((Math.random() - 0.5) * 220)}deg`);
        piece.style.setProperty("--burst-delay", `${(i * 0.018).toFixed(3)}s`);
        burst.appendChild(piece);
      }

      document.body.appendChild(burst);
      window.setTimeout(() => burst.remove(), 1200);
    }

    function playPickedFeedback(id) {
      if (prefersReducedMotion()) return;
      const targets = [
        document.getElementById(`card_${id}`),
        document.getElementById(`basket_${id}`)
      ].filter(Boolean);

      for (const el of targets) {
        el.classList.remove("is-picked");
        void el.offsetWidth;
        el.classList.add("is-picked");
        window.setTimeout(() => el.classList.remove("is-picked"), 700);
      }
    }

    function bumpSelectedCounts() {
      if (prefersReducedMotion()) return;
      for (const el of [...document.querySelectorAll(".selectedCount")]) {
        el.classList.remove("count-bump");
        void el.offsetWidth;
        el.classList.add("count-bump");
        window.setTimeout(() => el.classList.remove("count-bump"), 520);
      }
    }

    function prefersReducedMotion() {
      return window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    }

    function pickOne(items) {
      if (!Array.isArray(items) || !items.length) return "";
      return items[Math.floor(Math.random() * items.length)];
    }

    async function fetchViaProxy(targetUrl) {
      const proxy = proxyInput.value.trim();
      if (!proxy) throw new Error("没有设置连接方式。请恢复推荐连接后重试。");

      const url = proxy + encodeURIComponent(targetUrl);
      const res = await fetch(url, { method: "GET" });
      if (!res.ok) throw new Error(`连接请求失败：HTTP ${res.status}`);
      return await res.text();
    }

    function parseHtml(html) {
      return new DOMParser().parseFromString(html, "text/html");
    }

    function getBangumiAllTitleCandidates(subject) {
      const titles = [subject?.name, subject?.name_cn];

      for (const item of subject?.infobox || []) {
        const key = String(item?.key || "").trim();
        if (!isBangumiTitleLikeKey(key)) continue;
        titles.push(...flattenInfoboxValue(item.value));
      }

      // Bangumi 的“别名”通常已经包含英文名、日文名、罗马字、简称等子字段。
      titles.push(...extractAliases(subject));
      return unique(titles.map(x => clean(x)).filter(Boolean));
    }

    function isBangumiTitleLikeKey(key) {
      if (!key) return false;
      return (
        key === "别名" ||
        key.includes("别名") ||
        key.includes("中文名") ||
        key.includes("日文名") ||
        key.includes("英文名") ||
        key.includes("原名") ||
        key.includes("罗马") ||
        key.includes("简体") ||
        key.includes("繁体") ||
        key.toLowerCase().includes("title")
      );
    }

    function extractAliases(subject) {
      const infobox = subject?.infobox || [];
      const aliasItems = infobox.filter(item => String(item?.key || "").includes("别名"));
      if (!aliasItems.length) return [];
      return aliasItems
        .flatMap(item => flattenInfoboxValue(item.value))
        .map(x => String(x).trim())
        .filter(Boolean);
    }

    function normalizeTitleForFullMatch(text) {
      return String(text || "")
        .normalize("NFKC")
        .replace(/[\u0000-\u001f\u007f]/g, " ")
        .replace(/[\u3000]/g, " ")
        .replace(/[‐‑‒–—―]/g, "-")
        .replace(/[‘’]/g, "'")
        .replace(/[“”]/g, '"')
        .replace(/\s+/g, " ")
        .trim()
        .toLowerCase();
    }

    function flattenInfoboxValue(value) {
      if (!value) return [];
      if (typeof value === "string") return [value];
      if (Array.isArray(value)) return value.flatMap(flattenInfoboxValue);
      if (typeof value === "object") {
        const out = [];
        if (value.v) out.push(value.v);
        if (value.value) out.push(...flattenInfoboxValue(value.value));
        if (value.name) out.push(value.name);
        return out;
      }
      return [];
    }

    function isLatinTitle(text) {
      if (!text) return false;
      const hasLatin = /[A-Za-z]/.test(text);
      const hasCJK = /[\u3400-\u9FFF]/.test(text);
      const hasKana = /[\u3040-\u30FF]/.test(text);
      return hasLatin && !hasCJK && !hasKana;
    }

    function rankFanCapsCandidates(titles) {
      return unique(titles).sort((a, b) => scoreFanCapsTitle(b) - scoreFanCapsTitle(a));
    }

    function scoreFanCapsTitle(title) {
      let score = 0;
      if (title.length <= 24) score += 2;
      if (title.length <= 14) score += 1;
      if (/\b(no|wa|wo|to|ni|de|ga|o|e|kara|made|yori|soshite|mono|hito)\b/i.test(title)) score += 3;
      if (title.includes(":")) score -= 1;
      if (title.length >= 45) score -= 2;
      return score;
    }

    function dedupeImageCandidates(items) {
      const map = new Map();
      for (const item of items) {
        const key = item.picturePageUrl || item.thumbUrl;
        if (!map.has(key)) map.set(key, item);
      }
      return [...map.values()];
    }

    function looksLikeFanCapsImage(url) {
      const u = String(url).toLowerCase();
      if (!u.match(/\.(jpg|jpeg|png|webp)(\?|$)/)) return false;
      return (
        u.includes("fancaps") ||
        u.includes("cdni.") ||
        u.includes("moviestillsdb") ||
        u.includes("fanart")
      );
    }

    function isBadUiImage(url) {
      const u = String(url).toLowerCase();
      return (
        u.includes("logo") ||
        u.includes("icon") ||
        u.includes("avatar") ||
        u.includes("button") ||
        u.includes("ads") ||
        u.includes("banner") ||
        u.includes("spacer") ||
        u.includes("loading")
      );
    }

    function isBadResultTitle(title) {
      const t = clean(title).toLowerCase();
      if (!t) return true;
      return (
        t === "anime" ||
        t === "images" ||
        t === "see more images" ||
        t.includes("search") ||
        t.includes("privacy") ||
        t.includes("advert")
      );
    }

    function titleFromFanCapsUrl(url) {
      const decoded = decodeURIComponentSafe(url);
      const showMatch = decoded.match(/showimages\.php\?\d+-([^=&#]+)/i);
      const movieMatch = decoded.match(/[?&]name=([^&#]+)/i);
      const match = showMatch || movieMatch;
      if (!match) return "";
      return match[1]
        .replaceAll("__", ": ")
        .replaceAll("_", " ")
        .replace(/\s+/g, " ")
        .trim();
    }

    function toAbsoluteUrl(href, base) {
      try { return new URL(href, base).toString(); }
      catch { return href; }
    }

    function unique(arr) {
      return [...new Set(arr.map(x => String(x).trim()).filter(Boolean))];
    }

    function clean(s) {
      return String(s).replace(/\s+/g, " ").trim();
    }

    function sleep(ms) {
      return new Promise(resolve => setTimeout(resolve, ms));
    }

    function decodeURIComponentSafe(s) {
      try { return decodeURIComponent(s); }
      catch { return s; }
    }

    function setStatus(text) {
      statusEl.textContent = text;
      pulseElement(statusEl, "status-pulse", 190);
    }

    function setProgress(percent, show) {
      if (!show) {
        progressWrapEl.style.display = "none";
        progressWrapEl.classList.remove("is-active");
        progressBarEl.style.width = "0%";
        progressWrapEl.setAttribute("aria-valuenow", "0");
        return;
      }
      const value = Math.max(0, Math.min(100, Number(percent) || 0));
      progressWrapEl.style.display = "block";
      progressWrapEl.classList.add("is-active");
      progressBarEl.style.width = `${value}%`;
      progressWrapEl.setAttribute("aria-valuenow", String(Math.round(value)));
    }


    function showElement(el, animate = true) {
      if (!el) return;
      el.style.display = "";
      if (animate) revealElement(el);
    }

    function hideElement(el) {
      if (!el) return;
      el.style.display = "none";
    }

    function revealElement(el) {
      if (!el || prefersReducedMotion()) return;
      el.classList.remove("motion-reveal");
      void el.offsetWidth;
      el.classList.add("motion-reveal");
      window.setTimeout(() => el.classList.remove("motion-reveal"), 380);
    }

    function pulseElement(el, className, duration = 220) {
      if (!el || prefersReducedMotion()) return;
      el.classList.remove(className);
      void el.offsetWidth;
      el.classList.add(className);
      window.setTimeout(() => el.classList.remove(className), duration);
    }

    function showBangumiResults() {
      if (!bangumiResultsEl.innerHTML.trim()) {
        setStatus("当前没有可显示的候选动画。请重新搜索。");
        scrollToTopSearch();
        return;
      }
      showElement(bangumiResultsEl);
      scrollToElement(bangumiResultsEl);
    }

    function showSubjectDetail() {
      if (!subjectDetailEl.innerHTML.trim()) return;
      showElement(subjectDetailEl);
      scrollToElement(subjectDetailEl);
    }

    function showFanCapsResults() {
      if (!fanCapsResultsEl.innerHTML.trim()) return;
      showElement(fanCapsResultsEl);
      scrollToElement(fanCapsResultsEl);
    }

    function scrollToTopSearch() {
      const target = autoPanelEl.style.display !== "none"
        ? autoPanelEl
        : (searchPanelEl.style.display !== "none" ? searchPanelEl : modePanelEl);
      scrollToElement(target || modePanelEl || document.getElementById("topAnchor"), { block: "start" });
    }

    function scrollToBasket() {
      scrollToElement(selectedBasketEl);
    }

    function scrollToElement(el, options = {}) {
      if (!el) return;
      setTimeout(() => {
        const block = options.block || "focus";
        if (block === "focus") {
          const rect = el.getBoundingClientRect();
          const viewportHeight = window.innerHeight || document.documentElement.clientHeight || 0;
          const targetTop = window.scrollY + rect.top - (viewportHeight * 0.42);
          window.scrollTo({
            top: Math.max(0, targetTop),
            behavior: getScrollBehavior()
          });
          return;
        }

        el.scrollIntoView({ behavior: getScrollBehavior(), block });
      }, 80);
    }

    function getScrollBehavior() {
      return prefersReducedMotion() ? "auto" : "smooth";
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeJsString(str) {
      return String(str)
        .replaceAll("\\", "\\\\")
        .replaceAll("'", "\\'")
        .replaceAll("\n", "\\n")
        .replaceAll("\r", "\\r");
    }
  </script>
